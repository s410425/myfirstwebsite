<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>簡易對話框範例</title>
    <style>
        #chat-box {
            border: 1px solid #ccc;
            padding: 10px;
            width: 400px;
            height: 200px;
            overflow-y: auto; /* 超出高度時可以滾動 */
            white-space: pre-line; /* 保留換行 */
            margin-bottom: 10px;
        }
        input[type="text"] {
            width: 300px;
            padding: 5px;
        }
        button {
            padding: 5px 10px;
        }
    </style>
</head>
<body>
    <h1>簡易對話框範例</h1>

    <div id="chat-box">
        <!-- 對話內容會出現在這裡 -->
    </div>

    <input type="text" id="user-input" placeholder="輸入你的訊息">
    <button onclick="sendMessage()">送出</button>

    <script>
        function sendMessage() {
            const input = document.getElementById("user-input");
            const chatBox = document.getElementById("chat-box");
            const message = input.value.trim();

            if(message !== "") {
                chatBox.innerHTML += "你說: " + message + "\n"; // 新增訊息
                input.value = ""; // 清空輸入框
                chatBox.scrollTop = chatBox.scrollHeight; // 自動滾動到最底
            }
        }

        // 按 Enter 也可以送出訊息
        document.getElementById("user-input").addEventListener("keypress", function(e) {
            if(e.key === "Enter") {
                sendMessage();
            }
        });
    </script>
</body>
</html>
