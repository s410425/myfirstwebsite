<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>Snake.io Arena - 死亡修復版</title>
<style>
    body{margin:0;overflow:hidden;background:#050505;font-family:'Segoe UI', sans-serif;user-select:none}
    canvas{display:block}
    #ui-layer{position:absolute;top:20px;right:20px;color:white;background:rgba(0,0,0,0.85);padding:15px;border-radius:12px;border:1px solid #0f4;pointer-events:none;display:none}
    #score-ui{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);color:#0f4;font-size:32px;font-weight:bold;display:none}
    #menu{position:absolute;width:100%;height:100%;background:rgba(0,0,0,0.95);display:flex;flex-direction:column;align-items:center;justify-content:center;color:white;z-index:100}
    #skill-ui{position:absolute;bottom:20px;left:20px;display:none;flex-direction:column;gap:10px}
    .skill-slot{background:rgba(0,0,0,0.7);padding:8px 15px;border-radius:8px;border:1px solid #555;width:160px;position:relative;overflow:hidden;color:white}
    .skill-bar{position:absolute;bottom:0;left:0;height:4px;background:#f0f;width:0%}
    .mode-card{padding:15px;border:1px solid #333;cursor:pointer;margin:5px;width:100px;text-align:center}
    .mode-card.active{border-color:#0f4;background:rgba(0,255,68,0.1)}
</style>
</head>
<body>

<div id="menu">
    <h1>SNAKE.IO <span style="color:#f0f">ARENA</span></h1>
    <input type="text" id="player-name-input" placeholder="你的名字" maxlength="10" style="padding:10px;margin:20px">
    <div style="display:flex">
        <div class="mode-card active" id="card-magic" onclick="selectMode('magic')">魔法</div>
        <div class="mode-card" id="card-classic" onclick="selectMode('classic')">經典</div>
    </div>
    <button onclick="startGame()" style="padding:10px 40px;margin-top:20px;background:#0f4;border:none;cursor:pointer">開始遊戲</button>
</div>

<div id="skill-ui">
    <div class="skill-slot">瞬移 [SPACE] <div class="skill-bar" id="bar-blink"></div></div>
    <div class="skill-slot">魔球 [Q] <div class="skill-bar" id="bar-syphon"></div></div>
</div>

<div id="score-ui">SCORE: 0</div>
<div id="ui-layer"></div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const MAP = 4000;
let started = false;
let animationId = null;
let currentMode = 'magic';
let player, foods = [], ai_bots = [];
let mouse = {x:0, y:0, down:false, right:false}, keys = {};
let cooldowns = { blink: 0, syphon: 0 };

function selectMode(m) {
    currentMode = m;
    document.querySelectorAll('.mode-card').forEach(c => c.classList.remove('active'));
    document.getElementById(`card-${m}`).classList.add('active');
}

class Snake {
    constructor(x, y, color, isPlayer = false) {
        this.body = [{x, y}];
        this.length = 150;
        this.color = color;
        this.isPlayer = isPlayer;
        this.angle = Math.random() * 6.28;
        this.dead = false;
        this.birth = Date.now();
    }
    get radius() { return (15 + Math.sqrt(this.length) * 0.6) / 2; }
    
    update() {
        if (this.dead) return;
        let speed = (this.isPlayer && (mouse.down || keys['Shift'])) ? 8 : 4;
        if (speed > 4) this.length -= 0.5;
        this.length = Math.max(150, this.length);

        let head = {
            x: this.body[0].x + Math.cos(this.angle) * speed,
            y: this.body[0].y + Math.sin(this.angle) * speed
        };
        this.body.unshift(head);

        let dist = 0;
        for (let i = 0; i < this.body.length - 1; i++) {
            dist += Math.hypot(this.body[i+1].x - this.body[i].x, this.body[i+1].y - this.body[i].y);
            if (dist > this.length) { this.body.splice(i + 1); break; }
        }
    }
}

function checkCollision() {
    let allSnakes = [player, ...ai_bots];
    
    for (let s of allSnakes) {
        if (s.dead) continue;
        
        // 檢查是否出界
        if (Math.abs(s.body[0].x) > MAP || Math.abs(s.body[0].y) > MAP) {
            s.dead = true;
            continue;
        }

        // 檢查頭部碰撞
        for (let target of allSnakes) {
            if (s === target || (Date.now() - s.birth < 2000)) continue; // 2秒無敵

            let head = s.body[0];
            let r_sum = s.radius + target.radius;

            // 只跟目標的身體節點比對
            for (let i = 0; i < target.body.length; i += 5) {
                let p = target.body[i];
                let d = Math.hypot(head.x - p.x, head.y - p.y);
                if (d < target.radius * 0.8) { // 碰撞判定關鍵：進入對方半徑的 80%
                    s.dead = true;
                    return;
                }
            }
        }
    }
}

function loop() {
    if (!started) return;
    ctx.fillStyle = "#050505";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    let camX = player.body[0].x, camY = player.body[0].y;
    let zoom = Math.max(0.3, 1.2 - player.length/10000);

    // 更新與繪製
    player.angle = Math.atan2(mouse.y - canvas.height/2, mouse.x - canvas.width/2);
    player.update();
    
    ai_bots.forEach(ai => {
        if (Math.random() > 0.98) ai.angle += (Math.random() - 0.5);
        ai.update();
    });

    checkCollision();

    if (player.dead) {
        alert("你死了！分數：" + Math.floor(player.length));
        location.reload(); 
        return;
    }

    // 濾掉死掉的 AI
    ai_bots = ai_bots.filter(ai => !ai.dead);
    while(ai_bots.length < 20) ai_bots.push(new Snake((Math.random()-0.5)*MAP, (Math.random()-0.5)*MAP, "red"));

    // 繪製
    const drawSnake = (s) => {
        ctx.strokeStyle = s.color;
        ctx.lineWidth = s.radius * 2 * zoom;
        ctx.lineCap = "round";
        ctx.beginPath();
        s.body.forEach((p, i) => {
            let sx = (p.x - camX) * zoom + canvas.width/2;
            let sy = (p.y - camY) * zoom + canvas.height/2;
            if (i === 0) ctx.moveTo(sx, sy); else ctx.lineTo(sx, sy);
        });
        ctx.stroke();
    };

    ai_bots.forEach(drawSnake);
    drawSnake(player);

    document.getElementById("score-ui").innerText = "SCORE: " + Math.floor(player.length);
    animationId = requestAnimationFrame(loop);
}

function startGame() {
    started = true;
    document.getElementById("menu").style.display = "none";
    document.getElementById("score-ui").style.display = "block";
    player = new Snake(0, 0, "#0f4", true);
    for(let i=0; i<20; i++) ai_bots.push(new Snake((Math.random()-0.5)*MAP, (Math.random()-0.5)*MAP, "red"));
    loop();
}

window.addEventListener("mousemove", e => { mouse.x = e.clientX; mouse.y = e.clientY; });
window.addEventListener("mousedown", () => mouse.down = true);
window.addEventListener("mouseup", () => mouse.down = false);
window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
window.onresize();
</script>
</body>
</html>
