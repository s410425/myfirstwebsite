<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>Snake.io Arena - 死亡返回版</title>
<style>
    body{margin:0;overflow:hidden;background:#050505;font-family:'Segoe UI', sans-serif;user-select:none}
    canvas{display:block}
    
    /* UI 層 */
    #ui-layer{position:absolute;top:20px;right:20px;color:white;background:rgba(0,0,0,0.85);padding:15px;border-radius:12px;border:1px solid #0f4;backdrop-filter:blur(10px);pointer-events:none;min-width:180px;display:none}
    #score-ui{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);color:#0f4;font-size:32px;font-weight:bold;text-shadow:0 0:15px #0f4;display:none}
    
    /* 永久排行榜 (左側) */
    #permanent-rank{position:absolute;top:20px;left:20px;color:#eee;background:rgba(20,20,20,0.9);padding:15px;border-radius:12px;font-size:13px;border:1px solid #444;width:200px}
    
    /* 選單 */
    #menu{position:absolute;width:100%;height:100%;background:rgba(0,0,0,0.95);display:flex;flex-direction:column;align-items:center;justify-content:center;color:white;z-index:100}
    .input-box{margin-bottom: 25px; text-align: center;}
    #player-name-input{background: transparent; border: 2px solid #333; border-radius: 8px; padding: 10px 20px; color: #0f4; font-size: 20px; text-align: center; outline: none; transition: 0.3s;}
    #player-name-input:focus{border-color: #0f4; box-shadow: 0 0 15px rgba(0,255,68,0.3);}
    
    .btn-group{display:flex;gap:15px;margin-top:10px;flex-wrap: wrap;justify-content: center;}
    .mode-card{background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; border: 1px solid #333; text-align: center; width: 160px; transition: 0.3s; cursor: pointer;}
    .mode-card:hover{border-color: #0f4; background: rgba(0,255,68,0.05); transform: translateY(-5px);}
    .mode-card.active{border-color: #0f4; background: rgba(0,255,68,0.1);}
    
    #start-btn{font-size:22px;padding:12px 60px;cursor:pointer;background:#0f4;border:none;color:#000;border-radius:50px;font-weight:bold;transition:0.3s;margin-top:30px}
    #start-btn:hover{box-shadow:0 0 30px #0f4; transform: scale(1.05);}
    
    h1{font-size:50px;margin:0;letter-spacing:3px;text-shadow:0 0 20px #0f4}
    .hint{color: #555; font-size: 12px; margin-top: 15px;}
    hr{border:0;border-top:1px solid #333;margin:10px 0}
</style>
</head>
<body>

<div id="menu">
    <h1 style="color:#0f4">SNAKE.IO <span style="color:white">ARENA</span></h1>
    
    <div class="input-box" style="margin-top: 30px;">
        <p style="color: #888; margin-bottom: 10px;">ENTER YOUR NAME</p>
        <input type="text" id="player-name-input" placeholder="GUEST" maxlength="12">
    </div>

    <div class="btn-group">
        <div class="mode-card" id="card-evo" onclick="selectMode('evo', 3000)">
            <b style="color: #0f4;">練習：覺醒</b>
            <p style="color:#666; font-size: 11px; margin-top:5px;">磁力 3000</p>
        </div>
        <div class="mode-card" id="card-classic" onclick="selectMode('classic', 300)">
            <b style="color: #fff;">練習：經典</b>
            <p style="color:#666; font-size: 11px; margin-top:5px;">磁力 300</p>
        </div>
        <div class="mode-card" id="card-online" onclick="selectMode('online', 300)">
            <b style="color: #0af;">連機：對戰</b>
            <p style="color:#666; font-size: 11px; margin-top:5px;">全球模擬</p>
        </div>
    </div>
    
    <button id="start-btn" onclick="startGame()">START GAME</button>
    <p class="hint">撞擊死亡後將自動返回選單存檔</p>
</div>

<div id="permanent-rank">
    <b id="rank-title" style="color:#0f4">🏆 EVO 紀錄</b><hr>
    <div id="p-list">尚無紀錄</div>
</div>

<div id="score-ui">SCORE: 150</div>
<div id="ui-layer"></div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const MAP = 6000;
const FOOD_MAX = 800;
const AI_COUNT = 30;

let started = false;
let currentMode = 'evo'; 
let currentMagnetLimit = 3000;
let camera = {x:0, y:0, zoom:1};
let foods = [], ai_bots = [], toDie = [];
let mouse = {x:0, y:0, down:false}, keys = {};
let playerName = "GUEST";

// --- 排行榜 ---
function selectMode(mode, magnet) {
    currentMode = mode;
    currentMagnetLimit = magnet;
    document.querySelectorAll('.mode-card').forEach(c => c.classList.remove('active'));
    document.getElementById(`card-${mode}`).classList.add('active');
    updatePermanentUI();
}

function updatePermanentUI() {
    const title = document.getElementById('rank-title');
    title.innerText = `🏆 ${currentMode.toUpperCase()} 紀錄`;
    let storageKey = `snake_rank_final_${currentMode}`;
    let records = JSON.parse(localStorage.getItem(storageKey) || '[]');
    const list = document.getElementById('p-list');
    if(records.length === 0) { list.innerHTML = "<div style='color:#555'>尚無紀錄</div>"; return; }
    list.innerHTML = records.map((r, i) => 
        `<div style="margin:5px 0">${i+1}. <span style="color:#888">${r.name}</span> <span style="float:right;color:#0f4;font-weight:bold">${r.score}</span></div>`
    ).join('');
}

function saveRecord(score) {
    if (score < 10) return; 
    let storageKey = `snake_rank_final_${currentMode}`;
    let records = JSON.parse(localStorage.getItem(storageKey) || '[]');
    records.push({ score: Math.floor(score), name: playerName, date: new Date().toLocaleDateString() });
    records.sort((a,b) => b.score - a.score);
    localStorage.setItem(storageKey, JSON.stringify(records.slice(0, 5)));
    updatePermanentUI();
}

selectMode('evo', 3000);

// --- 核心類別 ---
class Snake {
    constructor(x, y, color, isPlayer = false, startLen = 150) {
        this.body = [{x, y}];
        this.length = startLen;
        this.color = color;
        this.isPlayer = isPlayer;
        this.speed = 4.5;
        this.angle = Math.random() * Math.PI * 2;
        this.dead = false;
        this.name = isPlayer ? playerName : (currentMode === 'online' ? "PLAYER_" + Math.floor(Math.random()*999) : "AI_BOT");
    }
    getWidth() { return Math.min(100, 15 + Math.sqrt(this.length) * 0.7); }
    update() {
        if (this.dead) return;
        let boosting = (this.isPlayer && (keys["Shift"] || mouse.down)) && this.length > 300;
        this.speed = boosting ? 9 : 4.5;
        if (boosting) this.length -= 0.8;
        this.length = Math.max(150, this.length);
        let head = { x: this.body[0].x + Math.cos(this.angle) * this.speed, y: this.body[0].y + Math.sin(this.angle) * this.speed };
        this.body.unshift(head);
        let curLen = 0;
        for (let i = 0; i < this.body.length - 1; i++) {
            curLen += Math.hypot(this.body[i+1].x - this.body[i].x, this.body[i+1].y - this.body[i].y);
            if (curLen > this.length) { this.body.splice(i + 1); break; }
        }
    }
    draw() {
        const toSX = x => (x - camera.x) * camera.zoom + canvas.width/2;
        const toSY = y => (y - camera.y) * camera.zoom + canvas.height/2;
        let thickness = this.getWidth() * camera.zoom;
        ctx.strokeStyle = this.color; ctx.lineWidth = thickness;
        ctx.lineCap = "round"; ctx.lineJoin = "round";
        if (this.isPlayer) { ctx.shadowBlur = 15 * camera.zoom; ctx.shadowColor = this.color; }
        ctx.beginPath();
        ctx.moveTo(toSX(this.body[0].x), toSY(this.body[0].y));
        for(let p of this.body) ctx.lineTo(toSX(p.x), toSY(p.y));
        ctx.stroke(); ctx.shadowBlur = 0;
        if (camera.zoom > 0.45) {
            ctx.fillStyle = "white"; ctx.font = `bold ${12 * camera.zoom}px Arial`;
            ctx.textAlign = "center";
            ctx.fillText(this.name, toSX(this.body[0].x), toSY(this.body[0].y) - thickness);
        }
    }
}

let player;

function initGame() {
    foods = []; ai_bots = []; toDie = [];
    player = new Snake(0, 0, "#0f4", true);
    for(let i=0; i<FOOD_MAX; i++) spawnFood();
    for(let i=0; i<AI_COUNT; i++) spawnAI();
}

function spawnFood(x, y, big = false, color = null) {
    foods.push({
        x: x ?? (Math.random() * MAP * 2 - MAP), y: y ?? (Math.random() * MAP * 2 - MAP),
        val: big ? 80 : 20, size: big ? 12 : 6,
        color: color ?? `hsl(${Math.random() * 360}, 100%, 65%)`,
    });
}

function spawnAI() {
    let startLen = 150;
    if (player && player.length > 5000) startLen = player.length * (0.3 + Math.random()*0.4);
    ai_bots.push(new Snake((Math.random()-0.5)*MAP*2, (Math.random()-0.5)*MAP*2, `hsl(${Math.random()*360}, 75%, 60%)`, false, startLen));
}

function loop() {
    if (!started) return;
    ctx.fillStyle = "#050505"; ctx.fillRect(0, 0, canvas.width, canvas.height);

    let targetZoom = Math.max(0.35, 1.1 - (player.length / 10000));
    camera.zoom += (targetZoom - camera.zoom) * 0.05;
    camera.x = player.body[0].x; camera.y = player.body[0].y;

    let magnetRange = Math.min(currentMagnetLimit, 10 * player.length);

    for (let i = foods.length - 1; i >= 0; i--) {
        let f = foods[i];
        let dx = player.body[0].x - f.x, dy = player.body[0].y - f.y;
        let distSq = dx*dx + dy*dy;
        if (distSq < magnetRange * magnetRange) {
            f.x += dx * 0.15; f.y += dy * 0.15;
            if (distSq < (player.getWidth()**2)) {
                player.length += f.val + (player.length * 0.015);
                foods.splice(i, 1); spawnFood();
            }
        }
        ai_bots.forEach(s => {
            let adx = s.body[0].x - f.x, ady = s.body[0].y - f.y;
            if (adx*adx + ady*ady < 800) {
                s.length += f.val;
                if(foods[i]) { foods.splice(i, 1); spawnFood(); }
            }
        });
    }

    const toSX = x => (x - camera.x) * camera.zoom + canvas.width/2;
    const toSY = y => (y - camera.y) * camera.zoom + canvas.height/2;
    foods.forEach(f => {
        ctx.fillStyle = f.color; ctx.beginPath();
        ctx.arc(toSX(f.x), toSY(f.y), f.size * camera.zoom, 0, 7); ctx.fill();
    });

    player.angle = Math.atan2(mouse.y - canvas.height/2, mouse.x - canvas.width/2);
    player.update();
    if (Math.abs(player.body[0].x) > MAP || Math.abs(player.body[0].y) > MAP) player.dead = true;

    ai_bots.forEach(s => {
        if (Math.random() > 0.98) {
            let target = foods[Math.floor(Math.random()*foods.length)];
            s.angle = Math.atan2(target.y - s.body[0].y, target.x - s.body[0].x);
        }
        s.update();
        [player, ...ai_bots].forEach(other => {
            if (other === s || other.dead) return;
            let minDist = (s.getWidth() + other.getWidth()) * 0.45;
            for (let j = 0; j < other.body.length; j += 10) {
                let dx = s.body[0].x - other.body[j].x, dy = s.body[0].y - other.body[j].y;
                if (dx*dx + dy*dy < minDist * minDist) s.dead = true;
            }
        });
        if (s.dead) toDie.push(s);
    });

    // 玩家死亡判斷 -> 回選單
    ai_bots.forEach(s => {
        let minDist = (player.getWidth() + s.getWidth()) * 0.45;
        for (let j = 0; j < s.body.length; j += 6) {
            let dx = player.body[0].x - s.body[j].x, dy = player.body[0].y - s.body[j].y;
            if (dx*dx + dy*dy < minDist * minDist) player.dead = true;
        }
    });

    if (player.dead) {
        exitToMenu(); // 這裡執行結算並返回
        return; 
    }

    toDie.forEach(s => {
        let count = Math.min(40, Math.floor(s.length/50));
        for(let k=0; k<count; k++) spawnFood(s.body[0].x+(Math.random()-0.5)*300, s.body[0].y+(Math.random()-0.5)*300, true, s.color);
        ai_bots.splice(ai_bots.indexOf(s), 1); spawnAI();
    });
    toDie = [];

    ai_bots.forEach(a => a.draw()); player.draw();

    document.getElementById("score-ui").innerText = `SCORE: ${Math.floor(player.length)}`;
    let ranking = [player, ...ai_bots].sort((a,b)=>b.length - a.length).slice(0, 8);
    document.getElementById("ui-layer").innerHTML = `<b>🏆 ${currentMode.toUpperCase()} RANK</b><hr>` + 
        ranking.map((s,i)=>`<div style="color:${s.isPlayer?'#0f4':'#fff'}">${i+1}. ${s.name} <span style="float:right">${Math.floor(s.length)}</span></div>`).join("");
    
    requestAnimationFrame(loop);
}

function startGame() {
    let inputName = document.getElementById("player-name-input").value.trim();
    playerName = inputName || "GUEST";
    initGame();
    started = true;
    document.getElementById("menu").style.display = "none";
    document.getElementById("score-ui").style.display = "block";
    document.getElementById("ui-layer").style.display = "block";
    loop();
}

function exitToMenu() {
    if (!started) return;
    saveRecord(player.length);
    started = false;
    document.getElementById("menu").style.display = "flex";
    document.getElementById("score-ui").style.display = "none";
    document.getElementById("ui-layer").style.display = "none";
}

window.addEventListener("keydown", e => {
    keys[e.key] = true;
    if (e.key === "Escape") exitToMenu();
});
window.addEventListener("keyup", e => keys[e.key] = false);
addEventListener("mousemove", e => { mouse.x = e.clientX; mouse.y = e.clientY; });
addEventListener("mousedown", () => mouse.down = true);
addEventListener("mouseup", () => mouse.down = false);
resize();
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resize);
</script>
</body>
</html>
