<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake Arena - Full Logic Edition</title>
    <style>
        :root { --neon: #0f4; --magic: #f0f; --alert: #ff4444; }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial Black', sans-serif; }
        canvas { display: block; }

        /* UI 層級 */
        #hud { position: absolute; inset: 0; pointer-events: none; color: white; }
        #top-ui { position: absolute; top: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; }
        #score-box { font-size: 40px; color: var(--neon); text-shadow: 0 0 20px var(--neon); }
        
        #leaderboard { background: rgba(0,0,0,0.8); border: 1px solid var(--neon); padding: 15px; border-radius: 10px; min-width: 200px; }
        .entry { display: flex; justify-content: space-between; font-family: monospace; font-size: 14px; margin-bottom: 2px; }
        .entry.me { color: var(--neon); font-weight: bold; background: rgba(0,255,68,0.1); }

        /* 技能欄位 */
        #skills { position: absolute; bottom: 30px; left: 30px; display: flex; flex-direction: column; gap: 10px; pointer-events: auto; }
        .skill { width: 220px; background: rgba(20,20,20,0.9); border: 2px solid #444; padding: 12px; border-radius: 12px; position: relative; overflow: hidden; }
        .skill b { font-size: 14px; display: block; margin-bottom: 4px; letter-spacing: 1px; }
        .cd-bar { position: absolute; bottom: 0; left: 0; height: 5px; background: #00f2ff; width: 0%; }
        .warp-bar { background: var(--magic); box-shadow: 0 0 10px var(--magic); }

        /* 手機控制 */
        #joy-base { position: absolute; bottom: 50px; left: 50px; width: 150px; height: 150px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); border-radius: 50%; display: none; pointer-events: auto; }
        #joy-stick { position: absolute; width: 60px; height: 60px; background: var(--neon); border-radius: 50%; top: 45px; left: 45px; opacity: 0.5; }
        #m-actions { position: absolute; bottom: 50px; right: 50px; display: none; gap: 20px; pointer-events: auto; }
        .m-btn { width: 80px; height: 80px; border: 3px solid #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; background: rgba(0,0,0,0.6); }

        #start-mask { position: absolute; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; pointer-events: auto; }
        #start-btn { padding: 25px 80px; font-size: 32px; background: var(--neon); border: none; border-radius: 60px; font-weight: bold; cursor: pointer; box-shadow: 0 0 40px rgba(0,255,68,0.5); }
    </style>
</head>
<body>

<div id="start-mask">
    <h1 style="color:white; font-size: 70px; margin: 0; letter-spacing: 10px;">SNAKE <span style="color:var(--neon)">ARENA</span></h1>
    <p style="color: #666; margin-bottom: 40px;">MAGIC FUSION & CLASSIC PHYSICS</p>
    <button id="start-btn" onclick="startApp()">START MISSION</button>
</div>

<div id="hud">
    <div id="top-ui">
        <div id="score-box">0</div>
        <div id="leaderboard"></div>
    </div>
    <div id="skills">
        <div class="skill"><b>⚡ BLINK [SPACE]</b><div id="cd-blink" class="cd-bar"></div></div>
        <div class="skill"><b>💎 SYPHON [Q]</b><div id="cd-syphon" class="cd-bar"></div></div>
        <div class="skill"><b>🌀 WARP [RIGHT-CLICK]</b><div id="cd-warp" class="cd-bar warp-bar"></div></div>
    </div>
    <div id="joy-base"><div id="joy-stick"></div></div>
    <div id="m-actions">
        <div class="m-btn" id="mb-boost">加速</div>
        <div class="m-btn" id="mb-blink">閃現</div>
    </div>
</div>

<canvas id="stage"></canvas>

<script>
/** 1. 核心配置 **/
const canvas = document.getElementById("stage"), ctx = canvas.getContext("2d");
const MAP = 6000, GRID_STEP = 100;
let isRunning = false, player, snakes = [], foods = [], particles = [];
let cd = { blink: 0, syphon: 0, warp: 100 };
let mouse = { x: 0, y: 0, left: false, right: false }, keys = {};
let joy = { active: false, ang: 0, boost: false };
const mobile = 'ontouchstart' in window;

/** 2. 蛇類別實體 (包含所有省略細節) **/
class Snake {
    constructor(x, y, color, name, isMe = false, startLen = 400) {
        this.body = [{x, y}];
        this.len = startLen;
        this.color = color;
        this.name = name;
        this.isMe = isMe;
        this.ang = Math.random() * Math.PI * 2;
        this.r = 15;
        this.dead = false;
        this.speed = 5;
    }

    update(slowFactor) {
        if(this.dead) return;

        // --- 操控模式融合 ---
        if(this.isMe) {
            if(joy.active) this.ang = joy.ang;
            else if(!mobile) this.ang = Math.atan2(mouse.y - canvas.height/2, mouse.x - canvas.width/2);
            this.boost = (mouse.left || keys['shift'] || joy.boost) && this.len > 500;
        } else {
            // AI 邏輯：自動避開地圖邊緣 + 隨機巡航
            let h = this.body[0];
            if(Math.abs(h.x) > MAP/2 - 500 || Math.abs(h.y) > MAP/2 - 500) this.ang += 0.15;
            if(Math.random() > 0.98) this.ang += (Math.random()-0.5) * 2;
        }

        // --- 速度計算 (魔法減速影響) ---
        let v = (this.boost ? 10 : 5);
        if(slowFactor && !this.isMe) v *= 0.35; // 魔法效果：全場慢動作
        if(this.boost) this.len -= 1.8;

        let head = this.body[0];
        let nX = head.x + Math.cos(this.ang) * v;
        let nY = head.y + Math.sin(this.ang) * v;
        
        this.body.unshift({x: nX, y: nY});
        this.r = 12 + Math.sqrt(this.len) * 0.42;

        // --- 長度物理裁切 ---
        let totalD = 0;
        for(let i=0; i<this.body.length-1; i++) {
            let segD = Math.hypot(this.body[i+1].x - this.body[i].x, this.body[i+1].y - this.body[i].y);
            totalD += segD;
            if(totalD > this.len) { this.body.splice(i+1); break; }
        }
    }

    draw(camX, camY, zoom) {
        if(this.dead) return;
        ctx.lineCap = "round"; ctx.lineJoin = "round";
        ctx.shadowBlur = this.isMe ? 20 * zoom : 0;
        ctx.shadowColor = this.color;
        ctx.strokeStyle = this.color;
        ctx.lineWidth = this.r * 2 * zoom;
        
        ctx.beginPath();
        this.body.forEach((p, i) => {
            let sx = (p.x - camX) * zoom + canvas.width/2;
            let sy = (p.y - camY) * zoom + canvas.height/2;
            if(i === 0) ctx.moveTo(sx, sy); else ctx.lineTo(sx, sy);
        });
        ctx.stroke();
        ctx.shadowBlur = 0;
    }
}

/** 3. 核心邏輯補完：死亡判定與能量噴發 **/
function checkPhysics() {
    let all = [player, ...snakes];
    all.forEach(s => {
        if(s.dead) return;
        let head = s.body[0];

        // 邊界死亡
        if(Math.abs(head.x) > MAP/2 || Math.abs(head.y) > MAP/2) kill(s);

        // 碰撞死亡 (經典：頭撞別人身體)
        all.forEach(other => {
            if(s === other || other.dead) return;
            // 優化檢索：距離太遠不計算
            if(Math.hypot(head.x - other.body[0].x, head.y - other.body[0].y) > other.len + 500) return;

            for(let i=0; i<other.body.length; i+=8) {
                let d = Math.hypot(head.x - other.body[i].x, head.y - other.body[i].y);
                if(d < (s.r * 0.8 + other.r * 0.8)) {
                    kill(s, other);
                    return;
                }
            }
        });
    });
}

function kill(victim, killer) {
    victim.dead = true;
    // 能量噴發：死亡處產生大量食物
    for(let i=0; i < Math.floor(victim.len/80); i++) {
        let p = victim.body[Math.floor(Math.random()*victim.body.length)];
        foods.push({
            x: p.x + (Math.random()-0.5)*100,
            y: p.y + (Math.random()-0.5)*100,
            c: victim.color,
            v: 180
        });
    }
    if(victim.isMe) {
        setTimeout(() => location.reload(), 2000);
    } else {
        snakes = snakes.filter(n => n !== victim);
        spawnBot();
    }
}

function spawnBot() {
    // 融合指令：新蛇長度為玩家的 0.6 倍
    let L = isRunning ? player.len * 0.6 : 400;
    snakes.push(new Snake((Math.random()-0.5)*4000, (Math.random()-0.5)*4000, `hsl(${Math.random()*360},80%,60%)`, "BOT", false, L));
}

/** 4. 遊戲主循環 **/
function startApp() {
    isRunning = true;
    document.getElementById("start-mask").style.display = "none";
    if(mobile) {
        document.getElementById("joy-base").style.display = "block";
        document.getElementById("m-actions").style.display = "flex";
    }
    player = new Snake(0, 0, "#0f4", "YOU", true, 500);
    for(let i=0; i<15; i++) spawnBot();
    for(let i=0; i<300; i++) foods.push({x:(Math.random()-0.5)*MAP, y:(Math.random()-0.5)*MAP, c:"#fff", v:40});
    tick();
}

function tick() {
    // 魔法冷卻更新
    let warping = (mouse.right || keys['r']) && cd.warp > 0;
    if(warping) cd.warp -= 0.85; else if(cd.warp < 100) cd.warp += 0.25;
    if(cd.blink > 0) cd.blink -= 16;
    if(cd.syphon > 0) cd.syphon -= 16;

    // 繪製背景 (魔法發動時變色)
    ctx.fillStyle = warping ? "#150020" : "#050505";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    const head = player.body[0], zoom = Math.max(0.2, 1.1 - player.len/25000);

    // 格線
    ctx.strokeStyle = "#111"; ctx.lineWidth = 1;
    for(let i=-MAP/2; i<=MAP/2; i+=GRID_STEP) {
        ctx.beginPath(); ctx.moveTo((i-head.x)*zoom+canvas.width/2, (-MAP/2-head.y)*zoom+canvas.height/2);
        ctx.lineTo((i-camX=head.x)*zoom+canvas.width/2, (MAP/2-head.y)*zoom+canvas.height/2); ctx.stroke();
    }

    // 更新與判定
    player.update(false);
    snakes.forEach(s => s.update(warping));
    checkPhysics();

    // 魔法：磁力吸取 (自動向玩家靠近)
    foods.forEach((f, i) => {
        let d = Math.hypot(head.x - f.x, head.y - f.y);
        if(d < 600) {
            f.x += (head.x - f.x) * 0.2; f.y += (head.y - f.y) * 0.2;
            if(d < player.r) { player.len += f.v/5; foods.splice(i, 1); }
        }
        ctx.fillStyle = f.c;
        ctx.beginPath(); ctx.arc((f.x-head.x)*zoom+canvas.width/2, (f.y-head.y)*zoom+canvas.height/2, 5*zoom, 0, 7); ctx.fill();
    });
    if(foods.length < 300) foods.push({x:(Math.random()-0.5)*MAP, y:(Math.random()-0.5)*MAP, c:"#fff", v:40});

    // 繪製蛇
    snakes.forEach(s => s.draw(head.x, head.y, zoom));
    player.draw(head.x, head.y, zoom);

    // UI 更新
    document.getElementById("score-box").innerText = Math.floor(player.len);
    let top = [player, ...snakes].sort((a,b)=>b.len - a.len).slice(0,8);
    document.getElementById("leaderboard").innerHTML = top.map((s,i)=>`<div class="entry ${s.isMe?'me':''}"><span>#${i+1} ${s.name}</span><span>${Math.floor(s.len)}</span></div>`).join("");
    
    document.getElementById("cd-blink").style.width = (Math.max(0, cd.blink)/5000)*100 + "%";
    document.getElementById("cd-syphon").style.width = (Math.max(0, cd.syphon)/15000)*100 + "%";
    document.getElementById("cd-warp").style.width = cd.warp + "%";

    requestAnimationFrame(tick);
}

/** 5. 魔法觸發函式 **/
function useBlink() {
    if(cd.blink <= 0) {
        player.body.forEach(p => {
            p.x += Math.cos(player.ang) * 1200;
            p.y += Math.sin(player.ang) * 1200;
        });
        cd.blink = 5000;
    }
}
function useSyphon() {
    if(cd.syphon <= 0) {
        player.len += 2500; // 強制掠奪成長
        cd.syphon = 15000;
    }
}

/** 6. 事件綁定 **/
window.onkeydown = e => { keys[e.key.toLowerCase()] = true; if(e.code==='Space') useBlink(); if(e.key==='q') useSyphon(); };
window.onkeyup = e => keys[e.key.toLowerCase()] = false;
window.onmousemove = e => { mouse.x = e.clientX; mouse.y = e.clientY; };
window.onmousedown = e => { if(e.button===0) mouse.left=true; if(e.button===2) mouse.right=true; };
window.onmouseup = () => { mouse.left=false; mouse.right=false; };
window.oncontextmenu = e => e.preventDefault();

if(mobile) {
    const b = document.getElementById("joy-base"), s = document.getElementById("joy-stick");
    b.ontouchstart = e => { joy.active=true; mJoy(e.touches[0]); };
    b.ontouchmove = e => { mJoy(e.touches[0]); e.preventDefault(); };
    b.ontouchend = () => { joy.active=false; s.style.transform = `translate(0,0)`; };
    document.getElementById("mb-boost").ontouchstart = () => joy.boost=true;
    document.getElementById("mb-boost").ontouchend = () => joy.boost=false;
    document.getElementById("mb-blink").onclick = useBlink;
    function mJoy(t) {
        let r = b.getBoundingClientRect(), dx = t.clientX-(r.left+75), dy = t.clientY-(r.top+75);
        joy.ang = Math.atan2(dy, dx);
        let d = Math.min(50, Math.hypot(dx, dy));
        s.style.transform = `translate(${Math.cos(joy.ang)*d}px, ${Math.sin(joy.ang)*d}px)`;
    }
}

window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
window.onresize();
</script>
</body>
</html>
