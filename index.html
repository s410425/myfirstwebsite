<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake.io Arena - Dynamic Difficulty</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; user-select: none; touch-action: none; }
        canvas { display: block; }

        /* UI 層級 */
        #ui-layer { pointer-events: none; position: absolute; inset: 0; z-index: 100; color: white; }
        #ui-layer * { pointer-events: auto; }

        #leaderboard { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 10px; border: 1px solid #0f4; min-width: 180px; font-size: 14px; }
        .rank-item { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .is-me { color: #0f4; font-weight: bold; text-shadow: 0 0 5px #0f4; }

        #stats { position: absolute; top: 15px; left: 15px; }
        #history-box { background: rgba(20,20,20,0.9); padding: 10px; border-radius: 8px; border: 1px solid #444; font-size: 12px; margin-bottom: 10px; width: 160px; }
        #current-score { font-size: 32px; font-weight: bold; color: #0f4; text-shadow: 0 0 10px #0f4; }

        #minimap-ui { position: absolute; bottom: 20px; right: 20px; width: 160px; height: 160px; background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.3); border-radius: 10px; overflow: hidden; }
        #m-canvas { width: 100%; height: 100%; }

        #skills { position: absolute; bottom: 20px; left: 20px; display: flex; flex-direction: column; gap: 10px; }
        .skill-box { width: 200px; background: rgba(0,0,0,0.8); border: 1px solid #555; padding: 10px; border-radius: 8px; position: relative; overflow: hidden; }
        .cd-bar { position: absolute; bottom: 0; left: 0; height: 4px; background: #f0f; width: 0%; transition: width 0.1s linear; }

        #joystick { position: absolute; bottom: 40px; left: 40px; width: 130px; height: 130px; background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.2); border-radius: 50%; display: none; }
        #stick { position: absolute; top: 40px; left: 40px; width: 50px; height: 50px; background: #0f4; border-radius: 50%; opacity: 0.5; }
        #mobile-btns { position: absolute; bottom: 200px; right: 30px; display: none; flex-direction: column; gap: 15px; }
        .m-btn { width: 75px; height: 75px; background: rgba(255,255,255,0.1); border: 2px solid #fff; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        #overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.98); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        #start-btn { margin-top: 30px; padding: 20px 80px; font-size: 28px; background: #0f4; border: none; font-weight: bold; border-radius: 50px; cursor: pointer; box-shadow: 0 0 30px rgba(0,255,0,0.5); }
    </style>
</head>
<body>

<div id="ui-layer">
    <div id="stats">
        <div id="history-box">🏆 最高紀錄<hr><div id="h-list">尚無資料</div></div>
        <div id="current-score">0</div>
    </div>
    <div id="leaderboard"></div>
    <div id="minimap-ui"><canvas id="m-canvas" width="160" height="160"></canvas></div>
    
    <div id="skills">
        <div class="skill-box">瞬移 [SPACE] <div id="cd-blink" class="cd-bar"></div></div>
        <div class="skill-box">磁力奪取 [Q] <div id="cd-syphon" class="cd-bar"></div></div>
        <div class="skill-box">時空緩速 [R-CLICK] <div id="cd-warp" class="cd-bar"></div></div>
    </div>

    <div id="mobile-btns">
        <div class="m-btn" id="m-boost">加速</div>
        <div class="m-btn" id="m-blink">瞬移</div>
    </div>
</div>

<div id="joystick"><div id="stick"></div></div>

<div id="overlay">
    <h1 style="color:white; font-size: 50px; letter-spacing: 10px;">SNAKE <span style="color:#0f4">ARENA</span></h1>
    <input type="text" id="p-name" placeholder="輸入名稱" maxlength="10" style="padding:15px; text-align:center; font-size:24px; background:transparent; border:2px solid #555; color:#0f4; outline:none; margin-bottom:20px; width:300px;">
    <button id="start-btn" onclick="init()">START GAME</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game"), ctx = canvas.getContext("2d");
const mCanvas = document.getElementById("m-canvas"), mCtx = mCanvas.getContext("2d");

const WORLD = 6000;
const GRID_SIZE = 100;
let started = false, player, foods = [], bots = [];
let mouse = {x:0, y:0, down:false, right:false}, keys = {};
let joystick = {active:false, ang:0, boost:false};
let cd = {blink:0, syphon:0, warp:100};
let isMobile = /iPhone|iPad|Android/i.test(navigator.userAgent);

class Snake {
    constructor(x, y, color, isPlayer = false, len = 300) {
        this.body = [{x, y}, {x:x-1, y:y-1}];
        this.len = len;
        this.color = color;
        this.isPlayer = isPlayer;
        this.ang = Math.random() * Math.PI * 2;
        this.name = isPlayer ? (document.getElementById('p-name').value || "YOU") : "BOT_" + Math.floor(Math.random()*999);
        this.dead = false;
        this.birth = Date.now();
    }
    get r() { return 10 + Math.sqrt(this.len) * 0.45; }

    update(isSlow) {
        if(this.dead) return;

        if(!this.isPlayer) {
            let h = this.body[0];
            let obstacle = false;
            let checkX = h.x + Math.cos(this.ang) * 250;
            let checkY = h.y + Math.sin(this.ang) * 250;

            if(Math.abs(checkX) > WORLD-400 || Math.abs(checkY) > WORLD-400) {
                this.ang += 0.2; obstacle = true;
            } else {
                let others = [player, ...bots];
                for(let s of others) {
                    if(s === this || s.dead) continue;
                    for(let i=0; i<s.body.length; i+=20) {
                        if(Math.hypot(checkX - s.body[i].x, checkY - s.body[i].y) < s.r + 50) {
                            this.ang += 0.3; obstacle = true; break;
                        }
                    }
                    if(obstacle) break;
                }
            }

            if(!obstacle && Math.random() > 0.8) {
                let nearest = null, minDist = 500;
                foods.forEach(f => {
                    let d = Math.hypot(h.x - f.x, h.y - f.y);
                    if(d < minDist) { minDist = d; nearest = f; }
                });
                if(nearest) {
                    let target = Math.atan2(nearest.y - h.y, nearest.x - h.x);
                    let diff = target - this.ang;
                    while(diff < -Math.PI) diff += Math.PI*2;
                    while(diff > Math.PI) diff -= Math.PI*2;
                    this.ang += diff * 0.1;
                }
            }
        }

        let boost = (this.isPlayer && (mouse.down || joystick.boost || keys['Shift'])) && this.len > 500;
        let speed = (boost ? 9 : 4.8) * (isSlow && !this.isPlayer ? 0.35 : 1);
        if(boost) this.len -= 1.8;

        let newH = {
            x: this.body[0].x + Math.cos(this.ang) * speed,
            y: this.body[0].y + Math.sin(this.ang) * speed
        };
        this.body.unshift(newH);

        let d = 0;
        for(let i=0; i<this.body.length - 1; i++){
            d += Math.hypot(this.body[i+1].x - this.body[i].x, this.body[i+1].y - this.body[i].y);
            if(d > this.len) { this.body.splice(i+1); break; }
        }
    }

    draw(camX, camY, zoom) {
        ctx.strokeStyle = this.color; 
        ctx.lineWidth = this.r * 2 * zoom; 
        ctx.lineCap = "round"; ctx.lineJoin = "round";
        ctx.beginPath();
        this.body.forEach((p, i) => {
            let sx = (p.x - camX) * zoom + canvas.width/2;
            let sy = (p.y - camY) * zoom + canvas.height/2;
            if(i === 0) ctx.moveTo(sx, sy); else ctx.lineTo(sx, sy);
        });
        ctx.stroke();
        if(zoom > 0.3) {
            ctx.fillStyle = "white"; ctx.font = `bold ${14 * zoom}px Arial`; ctx.textAlign = "center";
            ctx.fillText(this.name, (this.body[0].x - camX)*zoom+canvas.width/2, (this.body[0].y - camY)*zoom+canvas.height/2 - this.r*zoom - 10);
        }
    }
}

function loop() {
    if(!started) return;
    
    let isWarp = (mouse.right || keys['r']) && cd.warp > 0;
    if(isWarp) cd.warp -= 0.8; else if(cd.warp < 100) cd.warp += 0.22;
    if(cd.blink > 0) cd.blink -= 16.6;
    if(cd.syphon > 0) cd.syphon -= 16.6;

    ctx.fillStyle = isWarp ? "#1a0025" : "#050505";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    const head = player.body[0], zoom = Math.max(0.2, 1.15 - player.len/22000);
    
    // 背景網格
    ctx.strokeStyle = "#1a1a1a"; ctx.lineWidth = 1;
    let sX = Math.floor((head.x - canvas.width/2/zoom)/GRID_SIZE)*GRID_SIZE;
    let sY = Math.floor((head.y - canvas.height/2/zoom)/GRID_SIZE)*GRID_SIZE;
    for(let x=sX; x < head.x + canvas.width/2/zoom; x+=GRID_SIZE) {
        ctx.beginPath(); ctx.moveTo((x-head.x)*zoom+canvas.width/2, 0); ctx.lineTo((x-head.x)*zoom+canvas.width/2, canvas.height); ctx.stroke();
    }
    for(let y=sY; y < head.y + canvas.height/2/zoom; y+=GRID_SIZE) {
        ctx.beginPath(); ctx.moveTo(0, (y-head.y)*zoom+canvas.height/2); ctx.lineTo(canvas.width, (y-head.y)*zoom+canvas.height/2); ctx.stroke();
    }

    if(joystick.active) player.ang = joystick.ang;
    else if(!isMobile) player.ang = Math.atan2(mouse.y - canvas.height/2, mouse.x - canvas.width/2);
    
    player.update(false);
    if(Math.abs(head.x) > WORLD || Math.abs(head.y) > WORLD) player.dead = true;

    // AI 碰撞與互撞邏輯
    bots.forEach((b, bi) => {
        b.update(isWarp);
        for(let i=0; i<player.body.length; i+=10) {
            if(Math.hypot(b.body[0].x - player.body[i].x, b.body[0].y - player.body[i].y) < player.r * 0.9) b.dead = true;
        }
        if(!b.dead) {
            for(let other of bots) {
                if(b === other) continue;
                for(let i=0; i<other.body.length; i+=10) {
                    if(Math.hypot(b.body[0].x - other.body[i].x, b.body[0].y - other.body[i].y) < other.r * 0.9) { b.dead = true; break; }
                }
                if(b.dead) break;
            }
        }
        if(!player.dead && Date.now() - player.birth > 2000) {
            for(let i=0; i<b.body.length; i+=10) {
                if(Math.hypot(head.x - b.body[i].x, head.y - b.body[i].y) < b.r * 0.9) player.dead = true;
            }
        }

        if(b.dead) {
            let drop = Math.min(10, b.len/150);
            for(let k=0; k<drop; k++) foods.push({x:b.body[0].x+Math.random()*60-30, y:b.body[0].y+Math.random()*60-30, v:120, c:b.color});
            bots.splice(bi, 1);
        } else {
            b.draw(head.x, head.y, zoom);
        }
    });

    // 🔥 關鍵更新：補充 AI，數值 = 玩家長度 * 0.6 🔥
    while(bots.length < 25) {
        let a = Math.random()*6.28, dist = 1800;
        let baseLen = Math.max(300, player.len * 0.6); // 至少維持 300，避免太短
        let randomLen = baseLen * (0.8 + Math.random() * 0.4); // 增加一點隨機波動 (0.8x ~ 1.2x)
        bots.push(new Snake(head.x+Math.cos(a)*dist, head.y+Math.sin(a)*dist, `hsl(${Math.random()*360},70%,60%)`, false, randomLen));
    }

    // 食物邏輯 (自動磁力)
    foods.forEach((f, fi) => {
        let d = Math.hypot(head.x - f.x, head.y - f.y);
        if(d < 600) {
            f.x += (head.x - f.x) * 0.15; f.y += (head.y - f.y) * 0.15;
            if(d < player.r) { player.len += (f.v / (1 + player.len/12000)); foods.splice(fi, 1); }
        }
        ctx.fillStyle = f.c; ctx.beginPath(); ctx.arc((f.x-head.x)*zoom+canvas.width/2, (f.y-head.y)*zoom+canvas.height/2, 5*zoom, 0, 7); ctx.fill();
    });
    if(foods.length < 400) foods.push({x:(Math.random()-0.5)*WORLD*2, y:(Math.random()-0.5)*WORLD*2, v:50, c:'#0f4'});

    player.draw(head.x, head.y, zoom);

    // UI 更新
    document.getElementById("current-score").innerText = Math.floor(player.len);
    let top = [player, ...bots].sort((a,b) => b.len - a.len).slice(0, 10);
    document.getElementById("leaderboard").innerHTML = "<b>Ranking</b><hr>" + top.map((s,i) => `<div class="rank-item ${s === player ? 'is-me' : ''}"><span>#${i+1} ${s.name}</span><span>${Math.floor(s.len)}</span></div>`).join("");
    document.getElementById("cd-blink").style.width = (1 - Math.max(0, cd.blink)/5000)*100 + "%";
    document.getElementById("cd-syphon").style.width = (1 - Math.max(0, cd.syphon)/15000)*100 + "%";
    document.getElementById("cd-warp").style.width = cd.warp + "%";

    mCtx.clearRect(0,0,160,160);
    let s = 160 / (WORLD * 2);
    mCtx.fillStyle = "#0f4"; mCtx.fillRect((player.body[0].x+WORLD)*s-2, (player.body[0].y+WORLD)*s-2, 4, 4);
    mCtx.fillStyle = "red"; bots.forEach(b => mCtx.fillRect((b.body[0].x+WORLD)*s, (b.body[0].y+WORLD)*s, 2, 2));

    if(player.dead) { alert("GAME OVER! SCORE: " + Math.floor(player.len)); location.reload(); return; }
    requestAnimationFrame(loop);
}

function init() {
    started = true;
    document.getElementById("overlay").style.display = "none";
    if(isMobile) {
        document.getElementById("joystick").style.display = "block";
        document.getElementById("mobile-btns").style.display = "flex";
    }
    player = new Snake(0, 0, "#0f4", true);
    loop();
}

function doBlink() { if(cd.blink <= 0) { player.body.forEach(p => { p.x += Math.cos(player.ang)*800; p.y += Math.sin(player.ang)*800; }); cd.blink = 5000; } }
function doSyphon() { if(cd.syphon <= 0) { let t = bots.sort((a,b)=>b.len-a.len)[0]; if(t) { t.len *= 0.6; player.len += 1500; cd.syphon = 15000; } } }

window.onkeydown = (e) => { keys[e.key] = true; if(e.code === 'Space') doBlink(); if(e.key.toLowerCase() === 'q') doSyphon(); };
window.onkeyup = (e) => keys[e.key] = false;
window.onmousedown = (e) => { if(e.button===0) mouse.down=true; if(e.button===2) mouse.right=true; };
window.onmouseup = () => { mouse.down=false; mouse.right=false; };
window.onmousemove = (e) => { mouse.x = e.clientX; mouse.y = e.clientY; };
window.oncontextmenu = (e) => e.preventDefault();

canvas.addEventListener("touchstart", e => { if(e.touches[0].clientX < canvas.width/2) { joystick.active=true; moveJoystick(e.touches[0]); } });
canvas.addEventListener("touchmove", e => { if(joystick.active) moveJoystick(e.touches[0]); });
canvas.addEventListener("touchend", () => joystick.active=false);
document.getElementById("m-boost").ontouchstart = (e) => { joystick.boost = true; e.preventDefault(); };
document.getElementById("m-boost").ontouchend = () => joystick.boost = false;
document.getElementById("m-blink").onclick = (e) => { doBlink(); e.preventDefault(); };

function moveJoystick(t) {
    let r = document.getElementById("joystick").getBoundingClientRect();
    let dx = t.clientX - (r.left + 65), dy = t.clientY - (r.top + 65);
    joystick.ang = Math.atan2(dy, dx);
    let d = Math.min(Math.hypot(dx, dy), 50);
    document.getElementById("stick").style.transform = `translate(${Math.cos(joystick.ang)*d}px, ${Math.sin(joystick.ang)*d}px)`;
}

window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
window.onresize();
</script>
</body>
</html>
