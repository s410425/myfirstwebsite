<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake.io Arena - Ultimate Completeness</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; touch-action: none; }
        canvas { display: block; }
        
        /* UI 層級 */
        #ui-layer { position: absolute; top: 15px; right: 15px; color: white; background: rgba(0,0,0,0.8); padding: 12px; border-radius: 10px; border: 1px solid #0f4; min-width: 170px; display: none; z-index: 60; font-size: 13px; pointer-events: none; }
        #permanent-rank { position: absolute; top: 15px; left: 15px; color: #eee; background: rgba(20,20,20,0.9); padding: 12px; border-radius: 10px; font-size: 12px; border: 1px solid #444; width: 180px; z-index: 10; }
        #score-ui { position: absolute; top: 25px; left: 50%; transform: translateX(-50%); color: #0f4; font-size: 32px; font-weight: bold; display: none; text-shadow: 0 0 15px #0f4; z-index: 10; }
        
        /* 技能狀態 */
        #skill-ui { position: absolute; bottom: 20px; left: 20px; display: none; flex-direction: column; gap: 8px; z-index: 10; }
        .skill-slot { background: rgba(0,0,0,0.7); padding: 8px 15px; border-radius: 8px; border: 1px solid #555; width: 170px; position: relative; overflow: hidden; color: white; font-size: 11px; }
        .skill-bar { position: absolute; bottom: 0; left: 0; height: 4px; background: #f0f; width: 0%; transition: width 0.1s linear; }

        /* 手機按鈕 */
        #mobile-controls { position: absolute; bottom: 30px; right: 30px; display: none; flex-direction: column; gap: 15px; z-index: 50; }
        .m-btn { width: 70px; height: 70px; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.4); border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 12px; backdrop-filter: blur(5px); }
        #joystick-base { position: absolute; bottom: 50px; left: 50px; width: 130px; height: 130px; background: rgba(255,255,255,0.05); border-radius: 50%; display: none; z-index: 50; border: 1px solid rgba(255,255,255,0.2); }
        #joystick-stick { position: absolute; top: 40px; left: 40px; width: 50px; height: 50px; background: rgba(0,255,100,0.4); border-radius: 50%; }

        /* 死亡畫面 */
        #death-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(80, 0, 0, 0.9); display: none; flex-direction: column; align-items: center; justify-content: center; color: white; z-index: 200; backdrop-filter: blur(10px); }
        .rank-item { display: flex; justify-content: space-between; margin: 2px 0; }
        .rank-me { color: #0f4; font-weight: bold; }

        /* 選單介面 */
        #menu { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.98); display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; z-index: 100; }
        .mode-group { display: flex; gap: 10px; margin: 25px 0; }
        .mode-card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; border: 1px solid #333; cursor: pointer; width: 80px; text-align: center; }
        .mode-card.active { border-color: #0f4; background: rgba(0,255,68,0.2); transform: scale(1.05); }
        #player-name { background: transparent; border: 2px solid #444; border-radius: 8px; padding: 12px; color: #0f4; font-size: 20px; text-align: center; width: 220px; margin-bottom: 20px; outline: none; }
        #start-btn { font-size: 26px; padding: 15px 70px; cursor: pointer; background: #0f4; border: none; border-radius: 50px; font-weight: bold; }
    </style>
</head>
<body>

<div id="menu">
    <h1>SNAKE.IO <span style="color:#f0f">ARENA</span></h1>
    <input type="text" id="player-name" placeholder="YOUR NAME" maxlength="10">
    <div class="mode-group">
        <div class="mode-card active" id="m-magic" onclick="selectMode('magic', 5000)">✨魔法</div>
        <div class="mode-card" id="m-evo" onclick="selectMode('evo', 3500)">⚡覺醒</div>
        <div class="mode-card" id="m-classic" onclick="selectMode('classic', 450)">🛡️經典</div>
        <div class="mode-card" id="m-online" onclick="selectMode('online', 600)">🌍連機</div>
    </div>
    <button id="start-btn" onclick="startGame()">START</button>
</div>

<div id="death-screen">
    <div style="font-size:60px; font-weight:bold; color:#ff4444; margin-bottom:10px;">你死亡了</div>
    <div id="death-score" style="font-size: 32px; margin-bottom: 20px;">SCORE: 0</div>
    <div style="color: #ccc;">3 秒後自動重新開始...</div>
</div>

<div id="skill-ui">
    <div class="skill-slot">瞬移 [SPACE] <div class="skill-bar" id="bar-blink"></div></div>
    <div class="skill-slot">磁力魔球 [Q] <div class="skill-bar" id="bar-syphon"></div></div>
    <div class="skill-slot">時空緩速 [右鍵] <div class="skill-bar" id="bar-warp"></div></div>
</div>

<div id="joystick-base"><div id="joystick-stick"></div></div>
<div id="mobile-controls">
    <div class="m-btn" id="btn-boost" style="background:rgba(0,255,0,0.2)">加速</div>
    <div class="m-btn" id="btn-blink">瞬移</div>
    <div class="m-btn" id="btn-skill">魔球</div>
</div>

<div id="permanent-rank"><b>🏆 模式高分紀錄</b><hr><div id="p-list"></div></div>
<div id="score-ui">SCORE: 0</div>
<div id="ui-layer"></div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const MAP_SIZE = 6000;
let started = false, currentMode = 'magic', currentMagnet = 5000;
let player, foods = [], ai_bots = [];
let mouse = { x: 0, y: 0, down: false, right: false }, keys = {};
let joystick = { active: false, angle: 0, boost: false };
let cooldowns = { blink: 0, syphon: 0, warp: 100 };
let isMobile = /Android|iPhone|iPad/i.test(navigator.userAgent);

function selectMode(m, mag) {
    currentMode = m; currentMagnet = mag;
    document.querySelectorAll('.mode-card').forEach(c => c.classList.remove('active'));
    document.getElementById(`m-${m}`).classList.add('active');
    updateRankDisplay();
}

function updateRankDisplay() {
    let rec = JSON.parse(localStorage.getItem(`snk_u_${currentMode}`) || '[]');
    document.getElementById('p-list').innerHTML = rec.map((r,i)=>`<div>${i+1}. ${r.name} - ${r.score}</div>`).join('') || "尚無紀錄";
}

class Snake {
    constructor(x, y, color, isPlayer = false, startLen = 280) {
        this.body = [{x, y}, {x:x-1, y:y-1}];
        this.length = startLen;
        this.color = color;
        this.isPlayer = isPlayer;
        this.angle = Math.random() * 6.28;
        this.dead = false;
        this.birth = Date.now();
        this.name = isPlayer ? (document.getElementById('player-name').value || "YOU") : (currentMode==='online'?"PLAYER_"+Math.floor(Math.random()*99):"AI_"+Math.floor(Math.random()*999));
    }
    get radius() { return 10 + Math.sqrt(this.length) * 0.5; }
    grow(val) {
        let factor = 1 + Math.pow(this.length / 8500, 1.7);
        this.length += val / factor;
    }
    update(isSlowed) {
        if (this.dead) return;
        if (!this.isPlayer) {
            let head = this.body[0];
            // AI 進階避障：多維探測
            let probeDist = 300 + this.radius;
            let sensors = [-0.6, 0, 0.6]; // 左、前、右探測器
            sensors.forEach(off => {
                let px = head.x + Math.cos(this.angle + off) * probeDist;
                let py = head.y + Math.sin(this.angle + off) * probeDist;
                [player, ...ai_bots].forEach(s => {
                    if (s === this || s.dead) return;
                    if (Math.hypot(px - s.body[0].x, py - s.body[0].y) < s.radius + 100) {
                        this.angle += (off <= 0 ? 0.25 : -0.25); // 避開障礙物
                    }
                });
            });
            // 邊界回頭與隨機覓食
            if (Math.abs(head.x) > MAP_SIZE - 400 || Math.abs(head.y) > MAP_SIZE - 400) {
                this.angle += (Math.atan2(-head.y, -head.x) - this.angle) * 0.1;
            } else if (Math.random() > 0.98) {
                let f = foods[0];
                if(f) this.angle += (Math.atan2(f.y - head.y, f.x - head.x) - this.angle) * 0.05;
            }
        }
        let boost = (this.isPlayer && (mouse.down || joystick.boost || keys['Shift']) && this.length > 500);
        let speed = (boost ? 9 : 4.8) * (isSlowed && !this.isPlayer ? 0.35 : 1);
        if (boost) this.length -= 1.8;
        let newHead = { x: this.body[0].x + Math.cos(this.angle)*speed, y: this.body[0].y + Math.sin(this.angle)*speed };
        this.body.unshift(newHead);
        let d = 0;
        for (let i = 0; i < this.body.length - 1; i++) {
            d += Math.hypot(this.body[i+1].x - this.body[i].x, this.body[i+1].y - this.body[i].y);
            if (d > this.length) { this.body.splice(i + 1); break; }
        }
    }
    draw(camX, camY, zoom) {
        ctx.strokeStyle = this.color; ctx.lineWidth = this.radius * 2 * zoom; ctx.lineCap = "round"; ctx.lineJoin = "round";
        ctx.beginPath();
        this.body.forEach((p, i) => {
            let sx = (p.x - camX)*zoom + canvas.width/2;
            let sy = (p.y - camY)*zoom + canvas.height/2;
            if(i===0) ctx.moveTo(sx, sy); else ctx.lineTo(sx, sy);
        });
        ctx.stroke();
        if (zoom > 0.3) {
            ctx.fillStyle = "white"; ctx.font = `bold ${14*zoom}px Arial`; ctx.textAlign = "center";
            ctx.fillText(this.name, (this.body[0].x-camX)*zoom+canvas.width/2, (this.body[0].y-camY)*zoom+canvas.height/2 - this.radius*zoom - 10);
        }
    }
}

function loop() {
    if (!started) return;
    if (cooldowns.blink > 0) cooldowns.blink -= 16;
    if (cooldowns.syphon > 0) cooldowns.syphon -= 16;
    let isWarping = (currentMode === 'magic' && (mouse.right || keys['Control']) && cooldowns.warp > 0);
    if (isWarping) cooldowns.warp -= 0.8; else if (cooldowns.warp < 100) cooldowns.warp += 0.25;

    ctx.fillStyle = isWarping ? "#1a0025" : "#050505"; ctx.fillRect(0, 0, canvas.width, canvas.height);

    const head = player.body[0];
    const zoom = Math.max(0.18, 1.15 - player.length / 22000);

    // 玩家轉向：滑鼠與搖桿兼容
    if (joystick.active) {
        player.angle = joystick.angle;
    } else if (!isMobile) {
        let targetAngle = Math.atan2(mouse.y - canvas.height/2, mouse.x - canvas.width/2);
        let diff = targetAngle - player.angle;
        while(diff < -Math.PI) diff += Math.PI*2; while(diff > Math.PI) diff -= Math.PI*2;
        player.angle += diff * 0.25;
    }

    player.update(isWarping);

    // AI 生成：嚴格防開門殺
    while(ai_bots.length < (currentMode==='online'?12:25)) {
        let ang = Math.random()*6.28, dist = 1600 + Math.random()*600;
        let ax = head.x + Math.cos(ang)*dist, ay = head.y + Math.sin(ang)*dist;
        ai_bots.push(new Snake(ax, ay, `hsl(${Math.random()*360},75%,60%)`, false, Math.max(280, player.length * (0.15 + Math.random()*2.3))));
    }

    // 碰撞檢測：支援連機追蹤器
    ai_bots.forEach(ai => {
        ai.update(isWarping);
        if (currentMode === 'online') drawTracker(player, ai, zoom);
        // 核心碰撞
        let snakes = [player, ...ai_bots];
        snakes.forEach(s => {
            if (ai === s || s.dead || Date.now() - ai.birth < 1500) return;
            for(let i=0; i<s.body.length; i+=8) {
                if(Math.hypot(ai.body[0].x - s.body[i].x, ai.body[0].y - s.body[i].y) < s.radius*0.85) ai.dead = true;
            }
        });
        if (Date.now() - player.birth > 1500) {
            for(let i=0; i<ai.body.length; i+=8) {
                if(Math.hypot(head.x - ai.body[i].x, head.y - ai.body[i].y) < ai.radius*0.85) player.dead = true;
            }
        }
    });

    // 屍體轉食物邏輯
    ai_bots = ai_bots.filter(a => {
        if(a.dead) {
            for(let k=0; k<15; k++) foods.push({x:a.body[0].x+(Math.random()-0.5)*400, y:a.body[0].y+(Math.random()-0.5)*400, val:150, color:a.color, magic:true});
            return false;
        }
        return true;
    });

    // 食物與磁力感應
    foods.forEach((f, i) => {
        let d = Math.hypot(head.x - f.x, head.y - f.y);
        let magnetRange = f.magic ? 1200 : currentMagnet;
        if (d < magnetRange) {
            f.x += (head.x - f.x)*0.25; f.y += (head.y - f.y)*0.25;
            if (d < player.radius) { player.grow(f.val); foods[i] = {x:(Math.random()-0.5)*MAP_SIZE*2, y:(Math.random()-0.5)*MAP_SIZE*2, val:45, color:`hsl(${Math.random()*360},100%,70%)`}; }
        }
        ctx.fillStyle = f.color; ctx.beginPath(); ctx.arc((f.x-head.x)*zoom+canvas.width/2, (f.y-head.y)*zoom+canvas.height/2, 6*zoom, 0, 7); ctx.fill();
    });

    if (player.dead) { handleDeath(); return; }

    ai_bots.forEach(a => a.draw(head.x, head.y, zoom));
    player.draw(head.x, head.y, zoom);

    // 排行榜更新
    let leaderboard = [player, ...ai_bots].sort((a,b) => b.length - a.length).slice(0, 10);
    document.getElementById("ui-layer").innerHTML = "<b>🏆 REAL-TIME RANK</b><hr>" + leaderboard.map((s, i) => `
        <div class="rank-item ${s.isPlayer?'rank-me':''}">
            <span>${i+1}. ${s.name}</span>
            <span>${Math.floor(s.length)}</span>
        </div>
    `).join("");

    document.getElementById("score-ui").innerText = "SCORE: " + Math.floor(player.length);
    if(currentMode === 'magic') {
        document.getElementById("bar-blink").style.width = (1 - Math.max(0, cooldowns.blink)/5000)*100 + "%";
        document.getElementById("bar-syphon").style.width = (1 - Math.max(0, cooldowns.syphon)/15000)*100 + "%";
        document.getElementById("bar-warp").style.width = cooldowns.warp + "%";
    }
    requestAnimationFrame(loop);
}

function handleDeath() {
    started = false;
    document.getElementById("death-score").innerText = "SCORE: " + Math.floor(player.length);
    document.getElementById("death-screen").style.display = "flex";
    let key = `snk_u_${currentMode}`, rec = JSON.parse(localStorage.getItem(key) || '[]');
    rec.push({name: player.name, score: Math.floor(player.length)});
    localStorage.setItem(key, JSON.stringify(rec.sort((a,b)=>b.score-a.score).slice(0,5)));
    setTimeout(() => { location.reload(); }, 3000);
}

function drawTracker(p, target, zoom) {
    let dx = target.body[0].x - p.body[0].x, dy = target.body[0].y - p.body[0].y;
    let dist = Math.hypot(dx, dy);
    if (dist < 1200/zoom) return;
    let ang = Math.atan2(dy, dx);
    ctx.fillStyle = target.color; ctx.beginPath();
    ctx.arc(Math.cos(ang)*150 + canvas.width/2, Math.sin(ang)*150 + canvas.height/2, 7, 0, 7); ctx.fill();
}

function startGame() {
    started = true;
    player = new Snake(0, 0, "#0f4", true);
    for(let i=0; i<400; i++) foods.push({x:(Math.random()-0.5)*MAP_SIZE*2, y:(Math.random()-0.5)*MAP_SIZE*2, val:45, color:'#0f4'});
    document.getElementById("menu").style.display = "none";
    document.getElementById("score-ui").style.display = "block";
    document.getElementById("ui-layer").style.display = "block";
    document.getElementById("skill-ui").style.display = currentMode === 'magic' ? "flex" : "none";
    if(isMobile) {
        document.getElementById("joystick-base").style.display = "block";
        document.getElementById("mobile-controls").style.display = "flex";
        if(currentMode !== 'magic') document.getElementById("btn-skill").style.display = "none";
    }
    loop();
}

// 技能函數
function triggerBlink() { if(cooldowns.blink <= 0) { player.body.forEach(p => { p.x += Math.cos(player.angle)*700; p.y += Math.sin(player.angle)*700; }); cooldowns.blink = 5000; } }
function triggerSyphon() { 
    if(currentMode === 'magic' && cooldowns.syphon <= 0 && player.length > 1000) { 
        let targets = ai_bots.filter(a => Math.hypot(a.body[0].x - player.body[0].x, a.body[0].y - player.body[0].y) < 3000);
        let top = targets.sort((a,b)=>b.length-a.length)[0]; 
        if(top){ top.length *= 0.6; player.grow(600); cooldowns.syphon = 15000; } 
    } 
}

// 事件綁定
window.onkeydown = (e) => { keys[e.key] = true; if(e.code === "Space") triggerBlink(); if(e.key.toLowerCase() === "q") triggerSyphon(); };
window.onkeyup = (e) => keys[e.key] = false;
canvas.onmousedown = (e) => { if(e.button===0) mouse.down=true; if(e.button===2) mouse.right=true; };
canvas.onmouseup = (e) => { if(e.button===0) mouse.down=false; if(e.button===2) mouse.right=false; };
canvas.onmousemove = (e) => { mouse.x = e.clientX; mouse.y = e.clientY; };
canvas.oncontextmenu = (e) => e.preventDefault();

// 手機操作
canvas.addEventListener("touchstart", e => { let t = e.touches[0]; if(t.clientX < canvas.width/2) { joystick.active = true; updateJoystick(t.clientX, t.clientY); } });
canvas.addEventListener("touchmove", e => { if(joystick.active) updateJoystick(e.touches[0].clientX, e.touches[0].clientY); });
canvas.addEventListener("touchend", () => joystick.active = false);

function updateJoystick(tx, ty) {
    let rect = document.getElementById("joystick-base").getBoundingClientRect();
    let cx = rect.left + rect.width/2, cy = rect.top + rect.height/2;
    let dx = tx - cx, dy = ty - cy;
    joystick.angle = Math.atan2(dy, dx);
    let dist = Math.min(Math.hypot(dx, dy), 50);
    document.getElementById("joystick-stick").style.transform = `translate(${Math.cos(joystick.angle)*dist}px, ${Math.sin(joystick.angle)*dist}px)`;
}

document.getElementById("btn-boost").ontouchstart = () => joystick.boost = true;
document.getElementById("btn-boost").ontouchend = () => joystick.boost = false;
document.getElementById("btn-blink").onclick = triggerBlink;
document.getElementById("btn-skill").onclick = triggerSyphon;

window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
window.onresize();
updateRankDisplay();
</script>
</body>
</html>
