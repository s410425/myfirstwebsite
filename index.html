<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Snake.io Pro - 效能優化版</title>
    <style>
        :root { --bg: #05050a; --accent: #00f2ff; --player: #00ff88; }
        body { margin: 0; overflow: hidden; background: var(--bg); font-family: sans-serif; color: white; }
        canvas { display: block; }
        #ui { position: absolute; inset: 0; pointer-events: none; }
        .board { position: absolute; background: rgba(20, 20, 35, 0.8); padding: 15px; border-radius: 12px; backdrop-filter: blur(5px); }
        #temp-board { top: 10px; right: 10px; width: 150px; font-size: 12px; }
        #overlay { position: absolute; inset: 0; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        button { padding: 15px 50px; font-size: 20px; background: var(--accent); border: none; border-radius: 30px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1>SNAKE.IO OPTIMIZED</h1>
        <button id="start-btn">開始遊戲</button>
    </div>

    <div id="ui">
        <div id="temp-board" class="board">
            <div id="lb"></div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d", { alpha: false }); // 關閉透明通道提升效能
        const WORLD_SIZE = 3000;
        let isRunning = false;
        let snakes = [];
        let foods = [];
        let player;
        let camera = { x: 0, y: 0 };
        let mouse = { x: 0, y: 0 };

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        window.addEventListener('mousemove', e => {
            mouse.x = e.clientX - canvas.width / 2;
            mouse.y = e.clientY - canvas.height / 2;
        });

        class Food {
            constructor(x, y, r, color) {
                this.x = x || Math.random() * WORLD_SIZE;
                this.y = y || Math.random() * WORLD_SIZE;
                this.r = r || 4;
                this.color = color || `hsl(${Math.random() * 360}, 70%, 50%)`;
            }
            draw() {
                let sx = this.x - camera.x;
                let sy = this.y - camera.y;
                if (sx < -10 || sx > canvas.width + 10 || sy < -10 || sy > canvas.height + 10) return;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(sx, sy, this.r, 0, 6.28);
                ctx.fill();
            }
        }

        class Snake {
            constructor(name, color, isPlayer) {
                this.name = name; this.color = color; this.isPlayer = isPlayer;
                this.segments = []; this.score = 0; this.r = 12; this.angle = Math.random() * 6.28;
                this.x = Math.random() * WORLD_SIZE; this.y = Math.random() * WORLD_SIZE;
                // AI 數值邏輯
                const pLen = player ? player.segments.length : 40;
                const len = isPlayer ? 40 : Math.max(250, Math.floor(pLen * (Math.random() * 0.9 + 0.6)));
                for(let i=0; i<len; i++) this.segments.push({x: this.x, y: this.y});
            }

            update() {
                let speed = this.isPlayer ? 4 : 3;
                if (this.isPlayer) {
                    let targetAngle = Math.atan2(mouse.y, mouse.x);
                    let diff = targetAngle - this.angle;
                    while(diff < -3.14) diff += 6.28;
                    while(diff > 3.14) diff -= 6.28;
                    this.angle += diff * 0.1;
                    
                    // 磁鐵
                    for(let f of foods) {
                        let d = Math.hypot(this.x - f.x, this.y - f.y);
                        if(d < 120) {
                            f.x += (this.x - f.x) * 0.15;
                            f.y += (this.y - f.y) * 0.15;
                        }
                    }
                } else {
                    this.angle += Math.sin(Date.now() * 0.002) * 0.05;
                }

                this.x += Math.cos(this.angle) * speed;
                this.y += Math.sin(this.angle) * speed;

                // 邊界判定
                if(this.x < 0 || this.x > WORLD_SIZE || this.y < 0 || this.y > WORLD_SIZE) return this.die();

                this.segments.unshift({x: this.x, y: this.y});
                if(this.segments.length > (40 + this.score/2)) this.segments.pop();

                // 吃食
                for(let i=foods.length-1; i>=0; i--) {
                    let f = foods[i];
                    if(Math.hypot(this.x - f.x, this.y - f.y) < this.r + f.r) {
                        this.score += 5;
                        foods.splice(i, 1);
                        if(foods.length < 300) foods.push(new Food());
                    }
                }
            }

            die() {
                if(this.isPlayer) {
                    isRunning = false;
                    alert("Game Over! Score: " + Math.floor(this.score));
                    location.reload();
                } else {
                    // 噴出能量 (優化：少噴一點但大顆一點)
                    for(let i=0; i<this.segments.length; i+=15) {
                        foods.push(new Food(this.segments[i].x, this.segments[i].y, 6, this.color));
                    }
                    let idx = snakes.indexOf(this);
                    snakes[idx] = new Snake("AI", "#ff4466", false);
                }
            }

            draw() {
                ctx.fillStyle = this.color;
                // 優化：每 6 節畫一次身體節點
                for(let i=this.segments.length-1; i>=0; i-=6) {
                    let sx = this.segments[i].x - camera.x;
                    let sy = this.segments[i].y - camera.y;
                    if(sx < -20 || sx > canvas.width+20 || sy < -20 || sy > canvas.height+20) continue;
                    ctx.beginPath();
                    ctx.arc(sx, sy, this.r, 0, 6.28);
                    ctx.fill();
                }
                // 畫頭
                let hx = this.x - camera.x, hy = this.y - camera.y;
                ctx.fillStyle = "#fff";
                ctx.beginPath(); ctx.arc(hx, hy, this.r, 0, 6.28); ctx.fill();
            }
        }

        function loop() {
            if(!isRunning) return;
            camera.x = player.x - canvas.width/2;
            camera.y = player.y - canvas.height/2;

            // 背景清理
            ctx.fillStyle = "#05050a";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 畫食物
            for(let f of foods) f.draw();

            // 更新與畫蛇
            snakes.sort((a,b) => b.score - a.score);
            let lbText = "";
            for(let i=0; i<snakes.length; i++) {
                let s = snakes[i];
                s.update();
                s.draw();
                if(i < 5) lbText += `<div>#${i+1} ${s.name}: ${Math.floor(s.score)}</div>`;
            }
            document.getElementById("lb").innerHTML = lbText;

            // 碰撞判定 (優化：跳節檢查)
            for(let s1 of snakes) {
                for(let s2 of snakes) {
                    if(s1 === s2) continue;
                    for(let k=10; k<s2.segments.length; k+=10) { // 每 10 節才檢查一次碰撞
                        let seg = s2.segments[k];
                        if(Math.hypot(s1.x - seg.x, s1.y - seg.y) < s1.r + s2.r) {
                            s1.die(); return requestAnimationFrame(loop);
                        }
                    }
                }
            }
            requestAnimationFrame(loop);
        }

        document.getElementById("start-btn").onclick = () => {
            document.getElementById("overlay").style.display = "none";
            player = new Snake("You", "#00ff88", true);
            snakes = [player];
            for(let i=0; i<10; i++) snakes.push(new Snake("AI", "#ff4466", false));
            for(let i=0; i<250; i++) foods.push(new Food());
            isRunning = true;
            loop();
        };
    </script>
</body>
</html>
