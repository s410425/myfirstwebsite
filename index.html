<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>Snake.io Arena - 終極修復版</title>
<style>
    body{margin:0;overflow:hidden;background:#050505;font-family:'Segoe UI', sans-serif;user-select:none;touch-action:none}
    canvas{display:block}
    
    /* UI 介面 */
    #ui-layer{position:absolute;top:20px;right:20px;color:white;background:rgba(0,0,0,0.8);padding:15px;border-radius:12px;border:1px solid #0f4;pointer-events:none;display:none;min-width:150px}
    #score-ui{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);color:#0f4;font-size:32px;font-weight:bold;text-shadow:0 0 10px #0f4;display:none}
    
    /* 技能冷卻 UI */
    #skill-ui{position:absolute;bottom:20px;left:20px;display:none;flex-direction:column;gap:8px}
    .skill-slot{background:rgba(0,0,0,0.8);padding:10px;border-radius:8px;border:1px solid #555;width:160px;color:white;font-size:12px;position:relative}
    .skill-bar{position:absolute;bottom:0;left:0;height:3px;background:#f0f;width:0%}

    /* 選單 */
    #menu{position:absolute;width:100%;height:100%;background:rgba(0,0,0,0.95);display:flex;flex-direction:column;align-items:center;justify-content:center;color:white;z-index:100}
    .mode-card{padding:15px 30px;border:1px solid #444;cursor:pointer;margin:10px;border-radius:10px;transition:0.3s}
    .mode-card.active{border-color:#0f4;background:rgba(0,255,68,0.1)}
    #start-btn{padding:12px 60px;font-size:20px;background:#0f4;border:none;border-radius:50px;cursor:pointer;font-weight:bold;margin-top:20px}
</style>
</head>
<body>

<div id="menu">
    <h1 style="font-size:48px;margin-bottom:10px">SNAKE.IO <span style="color:#f0f">MAGIC</span></h1>
    <input type="text" id="player-name-input" placeholder="ENTER NAME" style="padding:10px;border-radius:5px;border:none;text-align:center;width:200px">
    <div style="display:flex;margin-top:20px">
        <div class="mode-card active" id="m-magic" onclick="selectMode('magic')">魔法模式</div>
        <div class="mode-card" id="m-classic" onclick="selectMode('classic')">經典模式</div>
    </div>
    <button id="start-btn" onclick="startGame()">START GAME</button>
    <p style="font-size:12px;color:#666;margin-top:20px">[SPACE] 瞬移 | [Q] 魔球 | [滑鼠右鍵] 緩速</p>
</div>

<div id="skill-ui">
    <div class="skill-slot">BLINK (SPACE) <div class="skill-bar" id="bar-blink"></div></div>
    <div class="skill-slot">SOUL SYPHON (Q) <div class="skill-bar" id="bar-syphon"></div></div>
    <div class="skill-slot">TIME WARP (R-Click) <div class="skill-bar" id="bar-warp"></div></div>
</div>

<div id="score-ui">SCORE: 0</div>
<div id="ui-layer"></div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const MAP_SIZE = 4000;
let started = false;
let currentMode = 'magic';
let player, foods = [], ai_bots = [];
let mouse = {x:0, y:0, down:false, right:false}, keys = {};
let cooldowns = { blink: 0, syphon: 0, warp: 100 };
let animId;

function selectMode(m) {
    currentMode = m;
    document.getElementById('m-magic').classList.toggle('active', m==='magic');
    document.getElementById('m-classic').classList.toggle('active', m==='classic');
}

class Snake {
    constructor(x, y, color, isPlayer = false) {
        this.body = [{x, y}, {x:x-1, y:y-1}];
        this.length = 150;
        this.color = color;
        this.isPlayer = isPlayer;
        this.angle = Math.random() * 6.28;
        this.dead = false;
        this.name = isPlayer ? (document.getElementById('player-name-input').value || "GUEST") : "AI_BOT";
    }
    get radius() { return 8 + Math.sqrt(this.length) * 0.4; }
    
    update(isSlowed) {
        if (this.dead) return;
        let speed = (this.isPlayer && (mouse.down || keys['Shift'])) ? 8 : 4;
        if (isSlowed && !this.isPlayer) speed *= 0.3; // 緩速影響 AI
        
        if (this.isPlayer && speed > 4) this.length -= 0.6;
        this.length = Math.max(150, this.length);

        let head = {
            x: this.body[0].x + Math.cos(this.angle) * speed,
            y: this.body[0].y + Math.sin(this.angle) * speed
        };
        this.body.unshift(head);

        let d = 0;
        for (let i = 0; i < this.body.length - 1; i++) {
            d += Math.hypot(this.body[i+1].x - this.body[i].x, this.body[i+1].y - this.body[i].y);
            if (d > this.length) { this.body.splice(i + 1); break; }
        }
    }
}

function spawnFood() {
    foods.push({
        x: (Math.random()-0.5) * MAP_SIZE * 2,
        y: (Math.random()-0.5) * MAP_SIZE * 2,
        size: 6,
        color: `hsl(${Math.random()*360}, 100%, 70%)`
    });
}

function loop() {
    if (!started) return;
    
    // 處理技能數值
    if (cooldowns.blink > 0) cooldowns.blink -= 16;
    if (cooldowns.syphon > 0) cooldowns.syphon -= 16;
    let warping = (currentMode === 'magic' && mouse.right && cooldowns.warp > 0);
    if (warping) cooldowns.warp -= 0.5;
    else if (cooldowns.warp < 100) cooldowns.warp += 0.1;

    ctx.fillStyle = warping ? "#12001a" : "#050505";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    let head = player.body[0];
    let zoom = Math.max(0.3, 1.1 - player.length/10000);

    // 玩家邏輯
    player.angle = Math.atan2(mouse.y - canvas.height/2, mouse.x - canvas.width/2);
    player.update(warping);

    // 碰撞邊界
    if (Math.abs(head.x) > MAP_SIZE || Math.abs(head.y) > MAP_SIZE) player.dead = true;

    // 食物邏輯
    for (let i = foods.length - 1; i >= 0; i--) {
        let f = foods[i];
        let d = Math.hypot(head.x - f.x, head.y - f.y);
        if (d < player.radius + 20) { // 磁力吸入
            f.x += (head.x - f.x) * 0.2;
            f.y += (head.y - f.y) * 0.2;
            if (d < player.radius) {
                player.length += 25;
                foods.splice(i, 1);
                spawnFood();
            }
        }
    }

    // AI 與 死亡判定
    ai_bots.forEach(ai => {
        ai.update(warping);
        if (Math.random() > 0.98) ai.angle += (Math.random()-0.5);

        // 玩家撞 AI
        let dToAI = Math.hypot(head.x - ai.body[0].x, head.y - ai.body[0].y);
        if (dToAI < 1000) { // 優化效能：只檢查附近的
            for (let i = 0; i < ai.body.length; i += 5) {
                let p = ai.body[i];
                if (Math.hypot(head.x - p.x, head.y - p.y) < ai.radius * 0.8) player.dead = true;
            }
        }
        
        // AI 撞玩家
        let aiHead = ai.body[0];
        for (let i = 0; i < player.body.length; i += 5) {
            let p = player.body[i];
            if (Math.hypot(aiHead.x - p.x, aiHead.y - p.y) < player.radius * 0.8) ai.dead = true;
        }
    });

    if (player.dead) {
        alert("GAME OVER! 分數: " + Math.floor(player.length));
        stopGame();
        return;
    }

    // 清理 AI
    ai_bots = ai_bots.filter(a => {
        if (a.dead) {
            for(let i=0; i<10; i++) foods.push({x: a.body[0].x + Math.random()*100, y: a.body[0].y + Math.random()*100, size: 10, color: a.color});
            return false;
        }
        return true;
    });
    while(ai_bots.length < 20) ai_bots.push(new Snake((Math.random()-0.5)*MAP_SIZE, (Math.random()-0.5)*MAP_SIZE, "red"));

    // 繪製
    const drawS = (s) => {
        ctx.strokeStyle = s.color;
        ctx.lineWidth = s.radius * 2 * zoom;
        ctx.lineCap = "round";
        ctx.beginPath();
        s.body.forEach((p, i) => {
            let sx = (p.x - head.x) * zoom + canvas.width/2;
            let sy = (p.y - head.y) * zoom + canvas.height/2;
            if (i === 0) ctx.moveTo(sx, sy); else ctx.lineTo(sx, sy);
        });
        ctx.stroke();
    };

    foods.forEach(f => {
        ctx.fillStyle = f.color;
        ctx.beginPath();
        ctx.arc((f.x - head.x)*zoom + canvas.width/2, (f.y - head.y)*zoom + canvas.height/2, f.size*zoom, 0, 7);
        ctx.fill();
    });
    ai_bots.forEach(drawS);
    drawS(player);

    // UI 更新
    document.getElementById("score-ui").innerText = "SCORE: " + Math.floor(player.length);
    document.getElementById("bar-blink").style.width = (1 - Math.max(0, cooldowns.blink)/5000)*100 + "%";
    document.getElementById("bar-syphon").style.width = (1 - Math.max(0, cooldowns.syphon)/15000)*100 + "%";
    document.getElementById("bar-warp").style.width = cooldowns.warp + "%";

    animId = requestAnimationFrame(loop);
}

function startGame() {
    started = true;
    player = new Snake(0, 0, "#0f4", true);
    ai_bots = []; foods = [];
    for(let i=0; i<300; i++) spawnFood();
    document.getElementById("menu").style.display = "none";
    document.getElementById("score-ui").style.display = "block";
    if(currentMode === 'magic') document.getElementById("skill-ui").style.display = "flex";
    loop();
}

function stopGame() {
    started = false;
    cancelAnimationFrame(animId);
    document.getElementById("menu").style.display = "flex";
    document.getElementById("score-ui").style.display = "none";
    document.getElementById("skill-ui").style.display = "none";
}

// 事件監聽
window.addEventListener("mousedown", e => { 
    if (e.button === 0) mouse.down = true; 
    if (e.button === 2) mouse.right = true; 
});
window.addEventListener("mouseup", e => { 
    if (e.button === 0) mouse.down = false; 
    if (e.button === 2) mouse.right = false; 
});
window.addEventListener("mousemove", e => { mouse.x = e.clientX; mouse.y = e.clientY; });
window.addEventListener("keydown", e => {
    keys[e.key] = true;
    if (e.code === "Space" && currentMode === 'magic' && cooldowns.blink <= 0) {
        player.body.forEach(p => { p.x += Math.cos(player.angle)*300; p.y += Math.sin(player.angle)*300; });
        cooldowns.blink = 5000;
    }
    if (e.key.toLowerCase() === "q" && currentMode === 'magic' && cooldowns.syphon <= 0) {
        let target = ai_bots.sort((a,b)=>b.length-a.length)[0];
        if(target) {
            target.length *= 0.5;
            player.length += target.length * 0.3;
            cooldowns.syphon = 15000;
        }
    }
});
window.addEventListener("keyup", e => keys[e.key] = false);

// 核心：禁用右鍵選單
canvas.oncontextmenu = (e) => e.preventDefault();

window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
window.onresize();
</script>
</body>
</html>
