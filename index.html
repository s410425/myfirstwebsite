<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake.io Arena - Full Protocol Integrated</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, sans-serif; user-select: none; touch-action: none; }
        canvas { display: block; }

        /* UI 層級：右上角即時排行榜 */
        #leaderboard { position: absolute; top: 15px; right: 15px; color: white; background: rgba(0,0,0,0.85); padding: 12px; border-radius: 10px; border: 1px solid #0f4; min-width: 180px; z-index: 100; font-size: 13px; pointer-events: none; display: none; }
        .rank-me { color: #0f4; font-weight: bold; text-shadow: 0 0 5px #0f4; }
        .rank-item { display: flex; justify-content: space-between; margin-bottom: 3px; }

        /* 左上角：模式與歷史紀錄 */
        #ui-left { position: absolute; top: 15px; left: 15px; z-index: 100; }
        #history-box { color: #eee; background: rgba(20,20,20,0.9); padding: 12px; border-radius: 10px; font-size: 12px; border: 1px solid #444; width: 170px; }
        #score-display { color: #0f4; font-size: 28px; font-weight: bold; margin-top: 10px; display: none; text-shadow: 0 0 10px #0f4; }

        /* 右下角：動態小地圖 */
        #minimap-container { position: absolute; bottom: 20px; right: 20px; width: 160px; height: 160px; background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.2); border-radius: 12px; z-index: 90; pointer-events: none; display: none; overflow: hidden; }
        #m-canvas { width: 100%; height: 100%; }

        /* 左下角：技能冷卻系統 */
        #skill-ui { position: absolute; bottom: 20px; left: 20px; z-index: 100; display: none; flex-direction: column; gap: 8px; }
        .skill-slot { width: 190px; background: rgba(0,0,0,0.75); border: 1px solid #555; padding: 8px 12px; border-radius: 8px; color: white; font-size: 11px; position: relative; overflow: hidden; }
        .cd-progress { position: absolute; bottom: 0; left: 0; height: 4px; background: #f0f; width: 0%; transition: width 0.1s linear; }

        /* 手機控制組件 */
        #mobile-joystick { position: absolute; bottom: 50px; left: 50px; width: 130px; height: 130px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.3); border-radius: 50%; display: none; z-index: 150; }
        #stick { position: absolute; top: 40px; left: 40px; width: 50px; height: 50px; background: #0f4; border-radius: 50%; opacity: 0.5; }
        #mobile-btns { position: absolute; bottom: 200px; right: 30px; display: none; flex-direction: column; gap: 15px; z-index: 150; }
        .m-btn { width: 70px; height: 70px; background: rgba(255,255,255,0.1); border: 2px solid #fff; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; }

        /* 遊戲選單與死亡畫面 */
        #overlay { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.98); display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; z-index: 500; }
        .mode-select { display: flex; gap: 15px; margin-bottom: 30px; }
        .mode-btn { padding: 12px 25px; background: #222; border: 2px solid #444; cursor: pointer; border-radius: 10px; transition: 0.3s; }
        .mode-btn.active { border-color: #0f4; background: rgba(0,255,68,0.2); transform: scale(1.1); }
        #start-btn { padding: 18px 80px; font-size: 28px; background: #0f4; border: none; font-weight: bold; border-radius: 50px; cursor: pointer; box-shadow: 0 0 25px rgba(0,255,0,0.5); }
        #death-screen { position: absolute; width: 100%; height: 100%; background: rgba(100,0,0,0.85); display: none; flex-direction: column; align-items: center; justify-content: center; color: white; z-index: 600; backdrop-filter: blur(10px); }
    </style>
</head>
<body>

<div id="overlay">
    <h1 style="letter-spacing: 10px; font-size: 48px;">SNAKE <span style="color:#0f4">ARENA</span></h1>
    <input type="text" id="player-name" placeholder="ENTER YOUR NAME" maxlength="10" style="padding:15px; text-align:center; font-size:24px; background:transparent; border:2px solid #555; color:#0f4; outline:none; margin-bottom:30px; width: 280px;">
    <div class="mode-select">
        <div class="mode-btn active" onclick="setMode('magic')">✨ 魔法模式</div>
        <div class="mode-btn" onclick="setMode('classic')">🛡️ 經典模式</div>
        <div class="mode-btn" onclick="setMode('online')">🌍 連機挑戰</div>
    </div>
    <button id="start-btn" onclick="startGame()">START GAME</button>
</div>

<div id="death-screen">
    <h2 style="font-size: 60px; color: #ff4444;">WASTED</h2>
    <div id="final-score" style="font-size: 32px; margin: 20px 0;">SCORE: 0</div>
    <p>3 秒後自動返回主選單...</p>
</div>

<div id="ui-left">
    <div id="history-box"><b>🏆 歷史最高分</b><hr><div id="h-list">載入中...</div></div>
    <div id="score-display">SCORE: 0</div>
</div>

<div id="leaderboard"></div>

<div id="minimap-container"><canvas id="m-canvas" width="160" height="160"></canvas></div>

<div id="skill-ui">
    <div class="skill-slot">空間瞬移 [SPACE] <div id="cd-blink" class="cd-progress"></div></div>
    <div class="skill-slot">磁力奪取 [Q] <div id="cd-syphon" class="cd-progress"></div></div>
    <div class="skill-slot">時空緩速 [R-CLICK] <div id="cd-warp" class="cd-progress"></div></div>
</div>

<div id="mobile-joystick"><div id="stick"></div></div>
<div id="mobile-btns">
    <div class="m-btn" id="m-boost">加速</div>
    <div class="m-btn" id="m-blink">瞬移</div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game"), ctx = canvas.getContext("2d");
const mCanvas = document.getElementById("m-canvas"), mCtx = mCanvas.getContext("2d");

// 核心常數
const WORLD = 6000;
const GRID = 100;
let started = false, gameMode = 'magic', player, foods = [], bots = [];
let mouse = {x: 0, y: 0, down: false, right: false}, keys = {};
let joystick = {active: false, ang: 0, boost: false};
let cd = {blink: 0, syphon: 0, warp: 100};
let isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

class Snake {
    constructor(x, y, color, isPlayer = false, len = 300) {
        this.body = [{x, y}, {x: x-1, y: y-1}];
        this.len = len;
        this.color = color;
        this.isPlayer = isPlayer;
        this.ang = Math.random() * 6.28;
        this.name = isPlayer ? (document.getElementById('player-name').value || "PLAYER") : "BOT_" + Math.floor(Math.random()*999);
        this.dead = false;
        this.birth = Date.now();
    }

    get r() { return 10 + Math.sqrt(this.len) * 0.45; }

    update(isWarpActive) {
        if(this.dead) return;

        // AI 行為邏輯 (具備避障與邊界感應)
        if(!this.isPlayer) {
            let h = this.body[0];
            // 邊界回頭
            if(Math.abs(h.x) > WORLD-500 || Math.abs(h.y) > WORLD-500) {
                let toCenter = Math.atan2(-h.y, -h.x);
                this.ang += (toCenter - this.ang) * 0.12;
            } else if(Math.random() > 0.96) {
                this.ang += (Math.random()-0.5) * 0.8;
            }
            // 基礎避碰感應
            let sensorX = h.x + Math.cos(this.ang) * 300;
            let sensorY = h.y + Math.sin(this.ang) * 300;
            [player, ...bots].forEach(s => {
                if(s === this || s.dead) return;
                if(Math.hypot(sensorX - s.body[0].x, sensorY - s.body[0].y) < s.r + 100) {
                    this.ang += 0.5; // 轉向避開
                }
            });
        }

        // 移動速度處理
        let boost = (this.isPlayer && (mouse.down || joystick.boost || keys['Shift'])) && this.len > 500;
        let speed = (boost ? 9 : 4.8) * (isWarpActive && !this.isPlayer ? 0.35 : 1);
        if(boost) this.len -= 2;

        let newHead = {
            x: this.body[0].x + Math.cos(this.ang) * speed,
            y: this.body[0].y + Math.sin(this.ang) * speed
        };
        this.body.unshift(newHead);

        // 長度維持邏輯
        let curDist = 0;
        for(let i=0; i < this.body.length - 1; i++) {
            curDist += Math.hypot(this.body[i+1].x - this.body[i].x, this.body[i+1].y - this.body[i].y);
            if(curDist > this.len) {
                this.body.splice(i + 1);
                break;
            }
        }
    }

    draw(camX, camY, zoom) {
        ctx.strokeStyle = this.color; ctx.lineWidth = this.r * 2 * zoom; ctx.lineCap = "round"; ctx.lineJoin = "round";
        ctx.beginPath();
        this.body.forEach((p, i) => {
            let sx = (p.x - camX) * zoom + canvas.width/2;
            let sy = (p.y - camY) * zoom + canvas.height/2;
            if(i === 0) ctx.moveTo(sx, sy); else ctx.lineTo(sx, sy);
        });
        ctx.stroke();

        // 繪製名字
        if(zoom > 0.3) {
            ctx.fillStyle = "white"; ctx.font = `bold ${14 * zoom}px Arial`; ctx.textAlign = "center";
            ctx.fillText(this.name, (this.body[0].x - camX) * zoom + canvas.width/2, (this.body[0].y - camY) * zoom + canvas.height/2 - this.r * zoom - 10);
        }
    }
}

function drawGrid(camX, camY, zoom) {
    ctx.strokeStyle = "#1a1a1a"; ctx.lineWidth = 1.5;
    let startX = Math.floor((camX - canvas.width/2/zoom)/GRID)*GRID;
    let startY = Math.floor((camY - canvas.height/2/zoom)/GRID)*GRID;
    for(let x = startX; x < camX + canvas.width/2/zoom; x += GRID) {
        ctx.beginPath(); ctx.moveTo((x-camX)*zoom + canvas.width/2, 0); ctx.lineTo((x-camX)*zoom + canvas.width/2, canvas.height); ctx.stroke();
    }
    for(let y = startY; y < camY + canvas.height/2/zoom; y += GRID) {
        ctx.beginPath(); ctx.moveTo(0, (y-camY)*zoom + canvas.height/2); ctx.lineTo(canvas.width, (y-camY)*zoom + canvas.height/2); ctx.stroke();
    }
    // 世界邊界
    ctx.strokeStyle = "#ff0000"; ctx.lineWidth = 5 * zoom;
    ctx.strokeRect((-WORLD - camX)*zoom + canvas.width/2, (-WORLD - camY)*zoom + canvas.height/2, WORLD*2*zoom, WORLD*2*zoom);
}

function drawMinimap() {
    mCtx.clearRect(0, 0, 160, 160);
    let scale = 160 / (WORLD * 2);
    // 玩家位置 (綠色)
    mCtx.fillStyle = "#0f4"; mCtx.beginPath();
    mCtx.arc((player.body[0].x + WORLD)*scale, (player.body[0].y + WORLD)*scale, 3, 0, 7); mCtx.fill();
    // AI 位置 (紅色)
    mCtx.fillStyle = "rgba(255, 0, 0, 0.6)";
    bots.forEach(b => {
        mCtx.fillRect((b.body[0].x + WORLD)*scale - 1, (b.body[0].y + WORLD)*scale - 1, 2, 2);
    });
}

function loop() {
    if(!started) return;

    // 魔法技能狀態更新
    let isWarpActive = (gameMode === 'magic' && (mouse.right || keys['r'] || keys['Control'])) && cd.warp > 0;
    if(isWarpActive) cd.warp -= 0.8; else if(cd.warp < 100) cd.warp += 0.22;
    if(cd.blink > 0) cd.blink -= 16;
    if(cd.syphon > 0) cd.syphon -= 16;

    // 背景清除
    ctx.fillStyle = isWarpActive ? "#150020" : "#050505";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const head = player.body[0];
    const zoom = Math.max(0.2, 1.15 - player.len / 22000);

    drawGrid(head.x, head.y, zoom);

    // 玩家轉向
    if(joystick.active) player.ang = joystick.ang;
    else if(!isMobile) player.ang = Math.atan2(mouse.y - canvas.height/2, mouse.x - canvas.width/2);

    player.update(false);

    // AI 生成與維護 (防開門殺：生成於視野外 1500px+)
    while(bots.length < (gameMode === 'online' ? 15 : 28)) {
        let ang = Math.random() * 6.28;
        let dist = 1800 + Math.random() * 800;
        bots.push(new Snake(head.x + Math.cos(ang)*dist, head.y + Math.sin(ang)*dist, `hsl(${Math.random()*360}, 75%, 60%)`, false, player.len * (0.3 + Math.random() * 2.2)));
    }

    // 處理食物
    foods.forEach((f, i) => {
        let dist = Math.hypot(head.x - f.x, head.y - f.y);
        let magnetRange = (gameMode === 'magic' ? 1000 : 500);
        if(dist < magnetRange) {
            f.x += (head.x - f.x) * 0.22; f.y += (head.y - f.y) * 0.22;
            if(dist < player.r) {
                player.len += (f.v / (1 + player.len / 9500)); // 成長遞減邏輯
                foods[i] = {x: (Math.random()-0.5)*WORLD*2, y: (Math.random()-0.5)*WORLD*2, v: 50, c: `hsl(${Math.random()*360}, 100%, 75%)`};
            }
        }
        ctx.fillStyle = f.c; ctx.beginPath(); ctx.arc((f.x - head.x)*zoom + canvas.width/2, (f.y - head.y)*zoom + canvas.height/2, 5 * zoom, 0, 7); ctx.fill();
    });

    // 處理 AI 渲染與碰撞
    bots.forEach(b => {
        b.update(isWarpActive);
        // 核心碰撞：檢查玩家頭部是否撞到 AI 身體
        if(Date.now() - player.birth > 2000) {
            for(let i=0; i < b.body.length; i += 10) {
                if(Math.hypot(head.x - b.body[i].x, head.y - b.body[i].y) < b.r * 0.9) player.dead = true;
            }
        }
        b.draw(head.x, head.y, zoom);
    });

    player.draw(head.x, head.y, zoom);

    // 更新即時排行榜 (顯示前 10 名)
    let ranks = [player, ...bots].sort((a,b) => b.len - a.len).slice(0, 10);
    document.getElementById("leaderboard").innerHTML = "<b>🏆 RANKING</b><hr>" + ranks.map((s, i) => `
        <div class="rank-item ${s === player ? 'rank-me' : ''}">
            <span>#${i+1} ${s.name}</span>
            <span>${Math.floor(s.len)}</span>
        </div>
    `).join("");

    // 更新 UI 數據
    document.getElementById("score-display").innerText = "SCORE: " + Math.floor(player.len);
    if(gameMode === 'magic') {
        document.getElementById("cd-blink").style.width = (1 - Math.max(0, cd.blink)/5000)*100 + "%";
        document.getElementById("cd-syphon").style.width = (1 - Math.max(0, cd.syphon)/15000)*100 + "%";
        document.getElementById("cd-warp").style.width = cd.warp + "%";
    }

    if(player.dead) { handleDeath(); return; }

    drawMinimap();
    requestAnimationFrame(loop);
}

function handleDeath() {
    started = false;
    document.getElementById("final-score").innerText = "SCORE: " + Math.floor(player.len);
    document.getElementById("death-screen").style.display = "flex";
    
    // 儲存分數
    let history = JSON.parse(localStorage.getItem('snk_ultimate') || '[]');
    history.push({n: player.name, s: Math.floor(player.len), d: new Date().toLocaleDateString()});
    localStorage.setItem('snk_ultimate', JSON.stringify(history.sort((a,b)=>b.s-a.s).slice(0, 5)));

    setTimeout(() => { location.reload(); }, 3000);
}

function startGame() {
    started = true;
    document.getElementById("overlay").style.display = "none";
    document.getElementById("leaderboard").style.display = "block";
    document.getElementById("score-display").style.display = "block";
    document.getElementById("minimap-container").style.display = "block";
    if(gameMode === 'magic') document.getElementById("skill-ui").style.display = "flex";
    if(isMobile) {
        document.getElementById("mobile-joystick").style.display = "block";
        document.getElementById("mobile-btns").style.display = "flex";
    }

    player = new Snake(0, 0, "#0f4", true);
    for(let i=0; i < 400; i++) foods.push({x: (Math.random()-0.5)*WORLD*2, y: (Math.random()-0.5)*WORLD*2, v: 50, c: `hsl(${Math.random()*360}, 100%, 75%)`});
    loop();
}

function setMode(m) {
    gameMode = m;
    document.querySelectorAll(".mode-btn").forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
}

function updateHistoryUI() {
    let history = JSON.parse(localStorage.getItem('snk_ultimate') || '[]');
    document.getElementById("h-list").innerHTML = history.map((r, i) => `<div>${i+1}. ${r.n} - ${r.s}</div>`).join("") || "尚無紀錄";
}

// 技能函數
function triggerBlink() {
    if(cd.blink <= 0) {
        player.body.forEach(p => {
            p.x += Math.cos(player.ang) * 750;
            p.y += Math.sin(player.ang) * 750;
        });
        cd.blink = 5000;
    }
}

function triggerSyphon() {
    if(gameMode === 'magic' && cd.syphon <= 0 && player.len > 1000) {
        let targets = bots.sort((a,b) => b.len - a.len);
        if(targets[0]) {
            targets[0].len *= 0.6;
            player.len += 1200;
            cd.syphon = 15000;
        }
    }
}

// 控制器綁定
window.onkeydown = (e) => {
    keys[e.key] = true;
    if(e.code === 'Space') triggerBlink();
    if(e.key.toLowerCase() === 'q') triggerSyphon();
};
window.onkeyup = (e) => keys[e.key] = false;
window.onmousedown = (e) => { if(e.button === 0) mouse.down = true; if(e.button === 2) mouse.right = true; };
window.onmouseup = () => { mouse.down = false; mouse.right = false; };
window.onmousemove = (e) => { mouse.x = e.clientX; mouse.y = e.clientY; };
window.oncontextmenu = (e) => e.preventDefault();

// 手機觸控邏輯
canvas.addEventListener("touchstart", e => {
    if(e.touches[0].clientX < canvas.width / 2) {
        joystick.active = true;
        moveJoystick(e.touches[0]);
    }
}, {passive: false});
canvas.addEventListener("touchmove", e => {
    if(joystick.active) moveJoystick(e.touches[0]);
}, {passive: false});
canvas.addEventListener("touchend", () => joystick.active = false);

function moveJoystick(t) {
    let r = document.getElementById("mobile-joystick").getBoundingClientRect();
    let dx = t.clientX - (r.left + 65), dy = t.clientY - (r.top + 65);
    joystick.ang = Math.atan2(dy, dx);
    let dist = Math.min(Math.hypot(dx, dy), 50);
    document.getElementById("stick").style.transform = `translate(${Math.cos(joystick.ang)*dist}px, ${Math.sin(joystick.ang)*dist}px)`;
}

document.getElementById("m-boost").ontouchstart = () => joystick.boost = true;
document.getElementById("m-boost").ontouchend = () => joystick.boost = false;
document.getElementById("m-blink").onclick = triggerBlink;

window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
window.onresize();
updateHistoryUI();
</script>
</body>
</html>
