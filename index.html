<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>Snake.io 究極完全體</title>
<style>
    body{margin:0;overflow:hidden;background:#050505;font-family:'Segoe UI', sans-serif;user-select:none}
    canvas{display:block}
    #ui-layer{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;color:white}
    #rank{position:absolute;top:20px;right:20px;background:rgba(0,0,0,0.7);padding:15px;border-radius:12px;border:1px solid #444;backdrop-filter:blur(5px)}
    #score-display{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);font-size:24px;color:#0f4;font-weight:bold;text-shadow:0 0 10px #0f4}
    #menu{position:absolute;width:100%;height:100%;background:rgba(0,0,0,0.9);display:flex;flex-direction:column;align-items:center;justify-content:center;color:white;z-index:100}
    button{font-size:28px;padding:15px 60px;cursor:pointer;background:linear-gradient(45deg, #0f4, #09f);border:none;border-radius:50px;color:white;font-weight:bold;transition:0.3s;box-shadow:0 0 20px rgba(0,255,0,0.3)}
    button:hover{transform:scale(1.1);box-shadow:0 0 40px rgba(0,255,0,0.5)}
</style>
</head>
<body>

<div id="menu">
    <h1 style="font-size:60px;margin:0">SNAKE EVOLUTION</h1>
    <p style="color:#888;letter-spacing:2px">MOUSE TO MOVE | SHIFT TO BOOST</p>
    <button onclick="start()">START BATTLE</button>
</div>

<div id="ui-layer">
    <div id="rank"></div>
    <div id="score-display">LENGTH: 150</div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const MAP = 3000;
const FOOD_MAX = 500;
const AI_COUNT = 25;

let started = false;
let camera = {x:0, y:0, zoom:1};
let foods = [], ai = [], toDie = [], particles = [];
let mouse = {x:0, y:0, down:false}, keys = {};

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resize);
resize();

class Snake {
    constructor(x, y, color, isPlayer = false) {
        this.body = [{x, y}];
        this.length = 150;
        this.color = color;
        this.isPlayer = isPlayer;
        this.speed = 3.5;
        this.angle = Math.random() * Math.PI * 2;
        this.dead = false;
    }

    update() {
        if (this.dead) return;

        // 加速邏輯
        let boosting = this.isPlayer && (keys["Shift"] || mouse.down) && this.length > 100;
        this.speed = boosting ? 7.5 : 3.5;
        if (boosting) {
            this.length -= 0.4;
            if (Math.random() > 0.6) particles.push({x:this.body[this.body.length-1].x, y:this.body[this.body.length-1].y, life:1, color:this.color});
        }
        this.length = Math.max(80, this.length);

        // 前進
        let head = {
            x: this.body[0].x + Math.cos(this.angle) * this.speed,
            y: this.body[0].y + Math.sin(this.angle) * this.speed
        };
        this.body.unshift(head);

        // 裁切身體長度
        let cur = 0;
        for (let i = 0; i < this.body.length - 1; i++) {
            cur += Math.hypot(this.body[i+1].x - this.body[i].x, this.body[i+1].y - this.body[i].y);
            if (cur > this.length) { this.body.splice(i + 1); break; }
        }
    }

    draw() {
        const toSX = x => (x - camera.x) * camera.zoom + canvas.width/2;
        const toSY = y => (y - camera.y) * camera.zoom + canvas.height/2;

        ctx.strokeStyle = this.color;
        ctx.lineWidth = 22 * camera.zoom;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.shadowBlur = 12 * camera.zoom;
        ctx.shadowColor = this.color;
        
        ctx.beginPath();
        ctx.moveTo(toSX(this.body[0].x), toSY(this.body[0].y));
        for(let p of this.body) ctx.lineTo(toSX(p.x), toSY(p.y));
        ctx.stroke();
        ctx.shadowBlur = 0;

        // 眼睛
        ctx.fillStyle = "white";
        ctx.beginPath();
        ctx.arc(toSX(this.body[0].x + Math.cos(this.angle)*8), toSY(this.body[0].y + Math.sin(this.angle)*8), 5 * camera.zoom, 0, 7);
        ctx.fill();
    }
}

let player = new Snake(0, 0, "#0f4", true);

function spawnFood(x, y, big = false, color = null) {
    foods.push({
        x: x ?? (Math.random() * MAP * 2 - MAP),
        y: y ?? (Math.random() * MAP * 2 - MAP),
        val: big ? 35 : 12,
        size: big ? 8 : 4,
        color: color ?? `hsl(${Math.random() * 360}, 100%, 60%)`,
        big: big
    });
}
for(let i=0; i<FOOD_MAX; i++) spawnFood();

function spawnAI() {
    ai.push(new Snake(Math.random()*MAP*2-MAP, Math.random()*MAP*2-MAP, `hsl(${Math.random()*360}, 70%, 60%)`));
}
for(let i=0; i<AI_COUNT; i++) spawnAI();

function loop() {
    if (!started) return;
    ctx.fillStyle = "#050505"; ctx.fillRect(0, 0, canvas.width, canvas.height);

    // 1. 鏡頭與縮放 (越長看得越遠)
    let targetZoom = Math.max(0.4, 1 - (player.length / 8000));
    camera.zoom += (targetZoom - camera.zoom) * 0.05;
    camera.x = player.body[0].x;
    camera.y = player.body[0].y;

    // 2. 網格
    ctx.strokeStyle = "#151515";
    let step = 150 * camera.zoom;
    for(let x = (canvas.width/2 - camera.x * camera.zoom) % step; x < canvas.width; x += step) {
        ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,canvas.height); ctx.stroke();
    }
    for(let y = (canvas.height/2 - camera.y * camera.zoom) % step; y < canvas.height; y += step) {
        ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); ctx.stroke();
    }

    // 3. 食物系統 (磁鐵回歸)
    let snakes = [player, ...ai];
    for (let i = foods.length - 1; i >= 0; i--) {
        let f = foods[i];
        let sx = (f.x - camera.x)*camera.zoom + canvas.width/2;
        let sy = (f.y - camera.y)*camera.zoom + canvas.height/2;

        if (sx > -20 && sx < canvas.width + 20 && sy > -20 && sy < canvas.height + 20) {
            ctx.fillStyle = f.color;
            ctx.beginPath(); ctx.arc(sx, sy, f.size * camera.zoom, 0, 7); ctx.fill();
            if(f.big) { ctx.strokeStyle="white"; ctx.lineWidth=2; ctx.stroke(); }
        }

        snakes.forEach(s => {
            let dx = s.body[0].x - f.x, dy = s.body[0].y - f.y;
            let distSq = dx*dx + dy*dy;
            let magRange = 120 + (s.length / 20); // 磁力範圍

            if (distSq < magRange * magRange) {
                f.x += dx * 0.2; f.y += dy * 0.2; // 磁鐵吸入
                if (distSq < 500) {
                    s.length += f.val;
                    foods.splice(i, 1);
                    if (!f.big) spawnFood();
                }
            }
        });
    }

    // 4. 更新與碰撞檢測 (自撞、互撞、邊界)
    player.angle = Math.atan2(mouse.y - canvas.height/2, mouse.x - canvas.width/2);
    player.update();
    if (Math.abs(player.body[0].x) > MAP || Math.abs(player.body[0].y) > MAP) player.dead = true;

    ai.forEach(s => {
        if (Math.random() > 0.96) {
            let f = foods[Math.floor(Math.random()*foods.length)];
            s.angle = Math.atan2(f.y - s.body[0].y, f.x - s.body[0].x);
        }
        s.update();
        if (Math.abs(s.body[0].x) > MAP || Math.abs(s.body[0].y) > MAP) s.dead = true;

        snakes.forEach(other => {
            if (other === s || other.dead) return;
            for (let j = 0; j < other.body.length; j += 4) {
                let dx = s.body[0].x - other.body[j].x, dy = s.body[0].y - other.body[j].y;
                if (dx*dx + dy*dy < 450) s.dead = true;
            }
        });
        if (s.dead) toDie.push(s);
    });

    // 玩家被撞檢測
    ai.forEach(other => {
        for (let j = 0; j < other.body.length; j += 3) {
            let dx = player.body[0].x - other.body[j].x, dy = player.body[0].y - other.body[j].y;
            if (dx*dx + dy*dy < 450) player.dead = true;
        }
    });

    // 5. 處理死亡
    if (player.dead) {
        for(let i=0; i<30; i++) spawnFood(player.body[0].x+(Math.random()-0.5)*100, player.body[0].y+(Math.random()-0.5)*100, true, player.color);
        player = new Snake(0, 0, "#0f4", true);
    }

    toDie.forEach(s => {
        let count = Math.min(50, Math.floor(s.length/15));
        for(let k=0; k<count; k++) {
            let p = s.body[Math.floor(Math.random()*s.body.length)];
            spawnFood(p.x+(Math.random()-0.5)*80, p.y+(Math.random()-0.5)*80, true, s.color);
        }
        ai.splice(ai.indexOf(s), 1);
        spawnAI();
    });
    toDie = [];

    // 6. 渲染
    for(let i=particles.length-1; i>=0; i--){
        let p = particles[i]; p.life -= 0.03;
        if(p.life <= 0) particles.splice(i,1);
        else {
            ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
            ctx.fillRect((p.x-camera.x)*camera.zoom+canvas.width/2, (p.y-camera.y)*camera.zoom+canvas.height/2, 4, 4);
        }
    }
    ctx.globalAlpha = 1;
    ai.forEach(a => a.draw());
    player.draw();

    // 7. 小地圖
    const mS = 150, mP = 20;
    ctx.fillStyle = "rgba(0,0,0,0.8)";
    ctx.fillRect(canvas.width - mS - mP, canvas.height - mS - mP, mS, mS);
    ctx.strokeStyle = "#444"; ctx.strokeRect(canvas.width - mS - mP, canvas.height - mS - mP, mS, mS);
    const sc = mS / (MAP * 2);
    ctx.fillStyle = "#0f4"; ctx.fillRect(canvas.width - mS/2 - mP + player.body[0].x*sc - 2, canvas.height - mS/2 - mP + player.body[0].y*sc - 2, 4, 4);
    ctx.fillStyle = "red"; ai.forEach(a => ctx.fillRect(canvas.width - mS/2 - mP + a.body[0].x*sc - 1, canvas.height - mS/2 - mP + a.body[0].y*sc - 1, 2, 2));

    document.getElementById("score-display").innerText = `LENGTH: ${Math.floor(player.length)}`;
    let ranking = [player, ...ai].sort((a,b)=>b.length - a.length).slice(0, 5);
    document.getElementById("rank").innerHTML = "<b>TOP 5 HUNTERS</b><br>" + ranking.map((s,i)=>`${i+1}. ${s.isPlayer?'YOU':'AI'} - ${Math.floor(s.length)}`).join("<br>");

    requestAnimationFrame(loop);
}

function start() { started=true; document.getElementById("menu").style.display="none"; loop(); }
addEventListener("mousemove", e => { mouse.x = e.clientX; mouse.y = e.clientY; });
addEventListener("mousedown", () => mouse.down = true);
addEventListener("mouseup", () => mouse.down = false);
addEventListener("keydown", e => keys[e.key] = true);
addEventListener("keyup", e => keys[e.key] = false);
</script>
</body>
</html>
