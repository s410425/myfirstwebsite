<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake.io Arena - 終極全功能版</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Segoe UI', sans-serif; user-select: none; touch-action: none; }
        canvas { display: block; }
        
        /* UI 顯示層 */
        #ui-layer { position: absolute; top: 10px; right: 10px; color: white; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 8px; border: 1px solid #0f4; min-width: 180px; display: none; pointer-events: none; z-index: 10; font-size: 13px; }
        #permanent-rank { position: absolute; top: 10px; left: 10px; color: #eee; background: rgba(20,20,20,0.8); padding: 10px; border-radius: 8px; font-size: 12px; border: 1px solid #444; width: 180px; z-index: 10; }
        #score-ui { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); color: #0f4; font-size: 32px; font-weight: bold; display: none; pointer-events: none; text-shadow: 0 0 15px #0f4; }
        
        /* 技能 UI (電腦與手機通用冷卻) */
        #skill-ui { position: absolute; bottom: 20px; left: 20px; display: none; flex-direction: column; gap: 10px; z-index: 10; }
        .skill-slot { background: rgba(0,0,0,0.7); padding: 8px 15px; border-radius: 8px; border: 1px solid #555; width: 180px; position: relative; overflow: hidden; color: white; font-size: 12px; }
        .skill-bar { position: absolute; bottom: 0; left: 0; height: 4px; background: #f0f; width: 0%; transition: width 0.1s linear; }

        /* 手機按鈕 */
        #mobile-controls { position: absolute; bottom: 30px; right: 30px; display: none; flex-direction: column; gap: 15px; z-index: 50; }
        .m-btn { width: 70px; height: 70px; background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.5); border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 12px; backdrop-filter: blur(5px); position: relative; overflow: hidden; }
        
        #joystick-base { position: absolute; bottom: 50px; left: 50px; width: 130px; height: 130px; background: rgba(255,255,255,0.05); border-radius: 50%; display: none; z-index: 50; border: 1px solid rgba(255,255,255,0.2); }
        #joystick-stick { position: absolute; top: 40px; left: 40px; width: 50px; height: 50px; background: rgba(0,255,100,0.4); border-radius: 50%; box-shadow: 0 0 10px #0f4; }

        /* 死亡畫面 */
        #death-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(100, 0, 0, 0.85); display: none; flex-direction: column; align-items: center; justify-content: center; color: white; z-index: 200; backdrop-filter: blur(10px); }
        #death-msg { font-size: 70px; font-weight: bold; color: #ff3333; text-shadow: 0 0 30px black; animation: pulse 0.8s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        /* 主選單 */
        #menu { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.98); display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; z-index: 100; }
        .mode-group { display: flex; gap: 10px; margin: 25px 0; flex-wrap: wrap; justify-content: center; }
        .mode-card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; border: 1px solid #333; cursor: pointer; width: 85px; text-align: center; }
        .mode-card.active { border-color: #0f4; background: rgba(0,255,68,0.2); transform: scale(1.05); }
        #player-name { background: transparent; border: 2px solid #444; border-radius: 8px; padding: 12px; color: #0f4; font-size: 20px; text-align: center; width: 220px; margin-bottom: 20px; outline: none; }
        #start-btn { font-size: 26px; padding: 15px 70px; cursor: pointer; background: #0f4; border: none; border-radius: 50px; font-weight: bold; box-shadow: 0 0 20px #0f4; }
    </style>
</head>
<body>

<div id="menu">
    <h1>SNAKE.IO <span style="color:#f0f">ARENA</span></h1>
    <input type="text" id="player-name" placeholder="YOUR NAME" maxlength="10">
    <div class="mode-group">
        <div class="mode-card active" id="m-magic" onclick="selectMode('magic', 5000)">✨魔法</div>
        <div class="mode-card" id="m-evo" onclick="selectMode('evo', 3500)">⚡覺醒</div>
        <div class="mode-card" id="m-classic" onclick="selectMode('classic', 450)">🛡️經典</div>
        <div class="mode-card" id="m-online" onclick="selectMode('online', 600)">🌍連機</div>
    </div>
    <button id="start-btn" onclick="startGame()">START</button>
</div>

<div id="death-screen">
    <div id="death-msg">你死亡了</div>
    <div id="death-score" style="font-size: 32px; margin: 20px 0;">SCORE: 0</div>
    <div style="color: #ccc;">正在保存紀錄... 3 秒後返回</div>
</div>

<div id="skill-ui">
    <div class="skill-slot">瞬移 [SPACE] <div class="skill-bar" id="bar-blink"></div></div>
    <div class="skill-slot">磁力魔球 [Q] <div class="skill-bar" id="bar-syphon"></div></div>
    <div class="skill-slot">時空緩速 [右鍵] <div class="skill-bar" id="bar-warp"></div></div>
</div>

<div id="joystick-base"><div id="joystick-stick"></div></div>
<div id="mobile-controls">
    <div class="m-btn" id="btn-boost">BOOST</div>
    <div class="m-btn" id="btn-blink">BLINK</div>
    <div class="m-btn" id="btn-skill">SKILL</div>
</div>

<div id="permanent-rank"><b>🏆 歷史紀錄</b><hr><div id="p-list"></div></div>
<div id="score-ui">SCORE: 0</div>
<div id="ui-layer"></div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const MAP_SIZE = 5500;
let started = false, animId, currentMode = 'magic', currentMagnet = 5000;
let player, foods = [], ai_bots = [];
let mouse = { x: 0, y: 0, down: false, right: false }, keys = {};
let joystick = { active: false, angle: 0, boost: false };
let cooldowns = { blink: 0, syphon: 0, warp: 100 };
let isMobile = /Android|iPhone|iPad/i.test(navigator.userAgent);

function selectMode(m, mag) {
    currentMode = m; currentMagnet = mag;
    document.querySelectorAll('.mode-card').forEach(c => c.classList.remove('active'));
    document.getElementById(`m-${m}`).classList.add('active');
    updateRankDisplay();
}

function updateRankDisplay() {
    let rec = JSON.parse(localStorage.getItem(`snk_final_${currentMode}`) || '[]');
    document.getElementById('p-list').innerHTML = rec.map((r,i)=>`<div>${i+1}. ${r.name} <span style="float:right">${r.score}</span></div>`).join('') || "尚無紀錄";
}

class Snake {
    constructor(x, y, color, isPlayer = false, startLen = 280) {
        this.body = [{x, y}, {x:x-1, y:y-1}];
        this.length = startLen;
        this.color = color;
        this.isPlayer = isPlayer;
        this.angle = Math.random() * 6.28;
        this.dead = false;
        this.birth = Date.now();
        this.name = isPlayer ? (document.getElementById('player-name').value || "YOU") : "AI_"+Math.floor(Math.random()*999);
    }
    get radius() { return 10 + Math.sqrt(this.length) * 0.5; }
    
    grow(val) {
        // 長度收益遞減公式
        let factor = 1 + Math.pow(this.length / 8000, 1.6);
        this.length += val / factor;
    }

    update(isSlowed) {
        if (this.dead) return;
        
        if (!this.isPlayer) {
            // 靈活 AI 邏輯：避障雷達
            let head = this.body[0];
            let avoid = false;
            
            // 1. 偵測前方障礙物
            let probeX = head.x + Math.cos(this.angle) * 300;
            let probeY = head.y + Math.sin(this.angle) * 300;
            [player, ...ai_bots].forEach(s => {
                if (s === this || s.dead) return;
                if (Math.hypot(probeX - s.body[0].x, probeY - s.body[0].y) < s.radius + 150) {
                    this.angle += (Math.random() > 0.5 ? 0.6 : -0.6);
                    avoid = true;
                }
            });

            // 2. 邊界與覓食
            if (!avoid) {
                if (Math.abs(head.x) > MAP_SIZE - 400 || Math.abs(head.y) > MAP_SIZE - 400) {
                    this.angle += (Math.atan2(-head.y, -head.x) - this.angle) * 0.2;
                } else if (Math.random() > 0.95) {
                    let f = foods[0];
                    if (f) this.angle += (Math.atan2(f.y - head.y, f.x - head.x) - this.angle) * 0.1;
                }
            }
        }

        let boost = (this.isPlayer && (mouse.down || joystick.boost || keys['Shift']) && this.length > 500);
        let speed = (boost ? 9 : 4.8) * (isSlowed && !this.isPlayer ? 0.35 : 1);
        if (boost) this.length -= 1.6;
        
        let newHead = { x: this.body[0].x + Math.cos(this.angle)*speed, y: this.body[0].y + Math.sin(this.angle)*speed };
        this.body.unshift(newHead);
        
        let d = 0;
        for (let i = 0; i < this.body.length - 1; i++) {
            d += Math.hypot(this.body[i+1].x - this.body[i].x, this.body[i+1].y - this.body[i].y);
            if (d > this.length) { this.body.splice(i + 1); break; }
        }
    }

    draw(camX, camY, zoom) {
        ctx.strokeStyle = this.color; ctx.lineWidth = this.radius * 2 * zoom; ctx.lineCap = "round"; ctx.lineJoin = "round";
        if(this.isPlayer) { ctx.shadowBlur = 15*zoom; ctx.shadowColor = this.color; }
        ctx.beginPath();
        this.body.forEach((p, i) => {
            let sx = (p.x - camX)*zoom + canvas.width/2;
            let sy = (p.y - camY)*zoom + canvas.height/2;
            if(i===0) ctx.moveTo(sx, sy); else ctx.lineTo(sx, sy);
        });
        ctx.stroke(); ctx.shadowBlur = 0;
        if (zoom > 0.3) {
            ctx.fillStyle = "white"; ctx.font = `bold ${14*zoom}px Arial`; ctx.textAlign = "center";
            ctx.fillText(this.name, (this.body[0].x-camX)*zoom+canvas.width/2, (this.body[0].y-camY)*zoom+canvas.height/2 - this.radius*zoom - 10);
        }
    }
}

function loop() {
    if (!started) return;
    
    // 冷卻系統
    if (cooldowns.blink > 0) cooldowns.blink -= 16;
    if (cooldowns.syphon > 0) cooldowns.syphon -= 16;
    let isWarping = (currentMode === 'magic' && (mouse.right || keys['Control']) && cooldowns.warp > 0);
    if (isWarping) cooldowns.warp -= 0.7; else if (cooldowns.warp < 100) cooldowns.warp += 0.2;

    // 背景渲染
    ctx.fillStyle = isWarping ? "#1a0025" : "#050505";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const head = player.body[0];
    const zoom = Math.max(0.18, 1.1 - player.length / 20000);

    // 絲滑轉向
    if (joystick.active) {
        player.angle = joystick.angle;
    } else if (!isMobile) {
        let targetAngle = Math.atan2(mouse.y - canvas.height/2, mouse.x - canvas.width/2);
        let diff = targetAngle - player.angle;
        while(diff < -Math.PI) diff += Math.PI*2; while(diff > Math.PI) diff -= Math.PI*2;
        player.angle += diff * 0.22;
    }

    player.update(isWarping);

    // AI 生成與防開門殺
    let maxAI = currentMode === 'online' ? 12 : 25;
    while(ai_bots.length < maxAI) {
        let ang = Math.random()*6.28;
        let dist = 1400 + Math.random()*800; // 視野外生成
        let ax = head.x + Math.cos(ang)*dist, ay = head.y + Math.sin(ang)*dist;
        let l = Math.max(280, player.length * (0.1 + Math.random()*2.4));
        ai_bots.push(new Snake(ax, ay, `hsl(${Math.random()*360},70%,60%)`, false, l));
    }

    // 碰撞與追蹤
    ai_bots.forEach(ai => {
        ai.update(isWarping);
        if (currentMode === 'online') drawTracker(player, ai, zoom);
        
        let snakes = [player, ...ai_bots];
        snakes.forEach(s => {
            if (ai === s || Date.now() - ai.birth < 1500) return;
            for (let i = 0; i < s.body.length; i += 6) {
                if (Math.hypot(ai.body[0].x - s.body[i].x, ai.body[0].y - s.body[i].y) < s.radius * 0.8) ai.dead = true;
            }
        });
        if (Date.now() - player.birth > 1500) {
            for (let i = 0; i < ai.body.length; i += 6) {
                if (Math.hypot(head.x - ai.body[i].x, head.y - ai.body[i].y) < ai.radius * 0.8) player.dead = true;
            }
        }
    });

    // 食物與磁力
    foods.forEach((f, i) => {
        let d = Math.hypot(head.x - f.x, head.y - f.y);
        if (d < (f.magic ? 1000 : currentMagnet)) {
            f.x += (head.x - f.x)*0.25; f.y += (head.y - f.y)*0.25;
            if (d < player.radius) { player.grow(f.val); foods[i] = spawnSingleFood(); }
        }
        ctx.fillStyle = f.color; ctx.beginPath();
        ctx.arc((f.x-head.x)*zoom+canvas.width/2, (f.y-head.y)*zoom+canvas.height/2, 6*zoom, 0, 7); ctx.fill();
    });

    if (player.dead) { handleDeath(); return; }

    ai_bots = ai_bots.filter(a => {
        if(a.dead) {
            for(let k=0; k<10; k++) foods.push({x:a.body[0].x+(Math.random()-0.5)*300, y:a.body[0].y+(Math.random()-0.5)*300, val:150, color:a.color, magic:true});
            return false;
        }
        return true;
    });

    ai_bots.forEach(a => a.draw(head.x, head.y, zoom));
    player.draw(head.x, head.y, zoom);

    // UI 更新
    document.getElementById("score-ui").innerText = "SCORE: " + Math.floor(player.length);
    if(currentMode === 'magic') {
        document.getElementById("bar-blink").style.width = (1 - Math.max(0, cooldowns.blink)/5000)*100 + "%";
        document.getElementById("bar-syphon").style.width = (1 - Math.max(0, cooldowns.syphon)/15000)*100 + "%";
        document.getElementById("bar-warp").style.width = cooldowns.warp + "%";
    }
    
    animId = requestAnimationFrame(loop);
}

function spawnSingleFood() {
    return {x:(Math.random()-0.5)*MAP_SIZE*2, y:(Math.random()-0.5)*MAP_SIZE*2, val:45, color:`hsl(${Math.random()*360},100%,70%)`};
}

function handleDeath() {
    started = false; cancelAnimationFrame(animId);
    document.getElementById("death-score").innerText = "SCORE: " + Math.floor(player.length);
    document.getElementById("death-screen").style.display = "flex";
    
    let key = `snk_final_${currentMode}`, rec = JSON.parse(localStorage.getItem(key) || '[]');
    rec.push({name: player.name, score: Math.floor(player.length)});
    localStorage.setItem(key, JSON.stringify(rec.sort((a,b)=>b.score-a.score).slice(0,5)));

    setTimeout(() => { location.reload(); }, 3000);
}

function drawTracker(p, target, zoom) {
    let dx = target.body[0].x - p.body[0].x, dy = target.body[0].y - p.body[0].y;
    let dist = Math.hypot(dx, dy);
    if (dist < 1000/zoom) return;
    let ang = Math.atan2(dy, dx);
    ctx.fillStyle = target.color; ctx.beginPath();
    ctx.arc(Math.cos(ang)*140 + canvas.width/2, Math.sin(ang)*140 + canvas.height/2, 6, 0, 7); ctx.fill();
}

function startGame() {
    started = true;
    player = new Snake(0, 0, "#0f4", true);
    for(let i=0; i<400; i++) foods.push(spawnSingleFood());
    document.getElementById("menu").style.display = "none";
    document.getElementById("score-ui").style.display = "block";
    document.getElementById("skill-ui").style.display = currentMode === 'magic' ? "flex" : "none";
    if(isMobile) {
        document.getElementById("joystick-base").style.display = "block";
        document.getElementById("mobile-controls").style.display = "flex";
        if(currentMode !== 'magic') document.getElementById("btn-skill").style.display = "none";
    }
    loop();
}

// 技能執行
function triggerBlink() {
    if(cooldowns.blink <= 0) {
        player.body.forEach(p => { p.x += Math.cos(player.angle)*600; p.y += Math.sin(player.angle)*600; });
        cooldowns.blink = 5000;
    }
}
function triggerSyphon() {
    if(currentMode === 'magic' && cooldowns.syphon <= 0 && player.length > 1000) {
        let top = ai_bots.sort((a,b)=>b.length-a.length)[0];
        if(top) {
            top.length *= 0.6; player.grow(500);
            cooldowns.syphon = 15000;
        }
    }
}

// 事件監聽
window.onkeydown = (e) => {
    keys[e.key] = true;
    if(e.code === "Space") triggerBlink();
    if(e.key.toLowerCase() === "q") triggerSyphon();
};
window.onkeyup = (e) => keys[e.key] = false;
canvas.onmousedown = (e) => { if(e.button===0) mouse.down=true; if(e.button===2) mouse.right=true; };
canvas.onmouseup = (e) => { if(e.button===0) mouse.down=false; if(e.button===2) mouse.right=false; };
canvas.onmousemove = (e) => { mouse.x = e.clientX; mouse.y = e.clientY; };
canvas.oncontextmenu = (e) => e.preventDefault();

// 手機控制
canvas.addEventListener("touchstart", e => {
    let t = e.touches[0];
    if(t.clientX < canvas.width/2) { joystick.active = true; updateJoystick(t.clientX, t.clientY); }
});
canvas.addEventListener("touchmove", e => { if(joystick.active) updateJoystick(e.touches[0].clientX, e.touches[0].clientY); });
canvas.addEventListener("touchend", () => joystick.active = false);

function updateJoystick(tx, ty) {
    let rect = document.getElementById("joystick-base").getBoundingClientRect();
    let cx = rect.left + rect.width/2, cy = rect.top + rect.height/2;
    let dx = tx - cx, dy = ty - cy;
    joystick.angle = Math.atan2(dy, dx);
    let dist = Math.min(Math.hypot(dx, dy), 40);
    document.getElementById("joystick-stick").style.transform = `translate(${Math.cos(joystick.angle)*dist}px, ${Math.sin(joystick.angle)*dist}px)`;
}

document.getElementById("btn-boost").ontouchstart = () => joystick.boost = true;
document.getElementById("btn-boost").ontouchend = () => joystick.boost = false;
document.getElementById("btn-blink").onclick = triggerBlink;
document.getElementById("btn-skill").onclick = triggerSyphon;

window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
window.onresize();
updateRankDisplay();
</script>
</body>
</html>
