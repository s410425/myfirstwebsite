<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>Snake.io Arena - 終極大集結</title>
<style>
    body{margin:0;overflow:hidden;background:#050505;font-family:'Segoe UI', sans-serif;user-select:none;touch-action:none}
    canvas{display:block}
    
    /* UI 介面 */
    #ui-layer{position:absolute;top:20px;right:20px;color:white;background:rgba(0,0,0,0.85);padding:15px;border-radius:12px;border:1px solid #0f4;min-width:180px;display:none;pointer-events:none;font-size:13px}
    #score-ui{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);color:#0f4;font-size:32px;font-weight:bold;text-shadow:0 0 15px #0f4;display:none}
    
    /* 技能 UI */
    #skill-ui{position:absolute;bottom:20px;left:20px;display:none;flex-direction:column;gap:10px}
    .skill-slot{background:rgba(20,20,20,0.9);padding:10px 15px;border-radius:8px;border:1px solid #444;width:170px;color:#eee;position:relative;overflow:hidden}
    .skill-bar{position:absolute;bottom:0;left:0;height:4px;background:#f0f;width:0%;transition:width 0.1s linear}

    /* 選單 */
    #menu{position:absolute;width:100%;height:100%;background:rgba(0,0,0,0.96);display:flex;flex-direction:column;align-items:center;justify-content:center;color:white;z-index:100}
    .mode-btn{padding:15px 30px;border:1px solid #333;cursor:pointer;margin:10px;border-radius:10px;background:rgba(255,255,255,0.05);transition:0.3s}
    .mode-btn.active{border-color:#0f4;background:rgba(0,255,68,0.15)}
    #start-btn{padding:15px 80px;font-size:24px;background:#0f4;border:none;border-radius:50px;cursor:pointer;font-weight:bold;margin-top:30px}
</style>
</head>
<body>

<div id="menu">
    <h1 style="font-size:60px;margin:0;letter-spacing:5px">SNAKE<span style="color:#f0f">.IO</span></h1>
    <div style="display:flex;margin-top:30px">
        <div class="mode-btn active" id="btn-magic" onclick="setMode('magic')">✨ 魔法模式</div>
        <div class="mode-btn" id="btn-classic" onclick="setMode('classic')">🛡️ 經典模式</div>
    </div>
    <button id="start-btn" onclick="startGame()">START</button>
</div>

<div id="ui-layer"></div>
<div id="skill-ui">
    <div class="skill-slot">瞬移 [Space] <div class="skill-bar" id="bar-blink"></div></div>
    <div class="skill-slot">磁力魔球 [Q] <div class="skill-bar" id="bar-syphon"></div></div>
    <div class="skill-slot">時空緩速 [右鍵] <div class="skill-bar" id="bar-warp"></div></div>
</div>

<div id="score-ui">SCORE: 0</div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const MAP = 4500;
let started = false;
let currentMode = 'magic';
let player, foods = [], ai_bots = [];
let mouse = {x:0, y:0, down:false, right:false}, keys = {};
let cooldowns = { blink: 0, syphon: 0, warp: 100 };
let anim;

function setMode(m) {
    currentMode = m;
    document.getElementById('btn-magic').classList.toggle('active', m === 'magic');
    document.getElementById('btn-classic').classList.toggle('active', m === 'classic');
}

class Snake {
    constructor(x, y, color, isPlayer = false) {
        this.body = [{x, y}, {x:x-1, y:y-1}];
        this.length = 200;
        this.color = color;
        this.isPlayer = isPlayer;
        this.angle = Math.random() * 6.28;
        this.dead = false;
        this.birth = Date.now();
    }
    get radius() { return 10 + Math.sqrt(this.length) * 0.45; }
    
    update(isSlowed) {
        if (this.dead) return;
        let boost = (this.isPlayer && (mouse.down || keys['Shift'])) && this.length > 300;
        let speed = (boost ? 9 : 4.5);
        if (isSlowed && !this.isPlayer) speed *= 0.35;
        
        if (boost) this.length -= 0.8;
        this.length = Math.max(200, this.length);

        let head = {
            x: this.body[0].x + Math.cos(this.angle) * speed,
            y: this.body[0].y + Math.sin(this.angle) * speed
        };
        this.body.unshift(head);

        let d = 0;
        for (let i = 0; i < this.body.length - 1; i++) {
            d += Math.hypot(this.body[i+1].x - this.body[i].x, this.body[i+1].y - this.body[i].y);
            if (d > this.length) { this.body.splice(i + 1); break; }
        }
    }

    draw(camX, camY, zoom) {
        ctx.strokeStyle = this.color;
        ctx.lineWidth = this.radius * 2 * zoom;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        if(this.isPlayer) { ctx.shadowBlur = 15*zoom; ctx.shadowColor = this.color; }
        ctx.beginPath();
        this.body.forEach((p, i) => {
            let sx = (p.x - camX) * zoom + canvas.width/2;
            let sy = (p.y - camY) * zoom + canvas.height/2;
            if (i === 0) ctx.moveTo(sx, sy); else ctx.lineTo(sx, sy);
        });
        ctx.stroke();
        ctx.shadowBlur = 0;
    }
}

function spawnFood(x, y, isMagic = false) {
    foods.push({
        x: x ?? (Math.random()-0.5) * MAP * 2,
        y: y ?? (Math.random()-0.5) * MAP * 2,
        size: isMagic ? 12 : 6,
        val: isMagic ? 150 : 35,
        color: isMagic ? "#f0f" : `hsl(${Math.random()*360}, 100%, 75%)`,
        magic: isMagic
    });
}

function loop() {
    if (!started) return;

    // 技能冷卻
    if (cooldowns.blink > 0) cooldowns.blink -= 16;
    if (cooldowns.syphon > 0) cooldowns.syphon -= 16;
    let isWarping = (currentMode === 'magic' && mouse.right && cooldowns.warp > 0);
    if (isWarping) cooldowns.warp -= 0.6; else if (cooldowns.warp < 100) cooldowns.warp += 0.15;

    ctx.fillStyle = isWarping ? "#12001a" : "#050505";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    let head = player.body[0];
    let zoom = Math.max(0.3, 1.1 - player.length/12000);

    player.angle = Math.atan2(mouse.y - canvas.height/2, mouse.x - canvas.width/2);
    player.update(isWarping);

    // 碰撞邊界
    if (Math.abs(head.x) > MAP || Math.abs(head.y) > MAP) player.dead = true;

    // 食物與吸力
    foods.forEach((f, i) => {
        let d = Math.hypot(head.x - f.x, head.y - f.y);
        let pullRange = f.magic ? 800 : 400;
        if (d < pullRange) {
            f.x += (head.x - f.x) * 0.15;
            f.y += (head.y - f.y) * 0.15;
            if (d < player.radius) {
                player.length += f.val;
                foods.splice(i, 1);
                if(!f.magic) spawnFood();
            }
        }
        ctx.fillStyle = f.color;
        ctx.beginPath();
        ctx.arc((f.x - head.x)*zoom + canvas.width/2, (f.y - head.y)*zoom + canvas.height/2, f.size*zoom, 0, 7);
        ctx.fill();
    });

    // AI 處理
    ai_bots.forEach(ai => {
        ai.update(isWarping);
        if (Math.random() > 0.98) ai.angle += (Math.random()-0.5);

        // 碰撞判定 (精確版)
        let snakes = [player, ...ai_bots];
        snakes.forEach(target => {
            if (ai === target || (Date.now() - ai.birth < 1500)) return;
            for (let i = 0; i < target.body.length; i += 5) {
                let p = target.body[i];
                if (Math.hypot(ai.body[0].x - p.x, ai.body[0].y - p.y) < target.radius * 0.8) ai.dead = true;
            }
        });
        
        // 玩家撞 AI
        if (Date.now() - player.birth > 1500) {
            for (let i = 0; i < ai.body.length; i += 5) {
                let p = ai.body[i];
                if (Math.hypot(head.x - p.x, head.y - p.y) < ai.radius * 0.8) player.dead = true;
            }
        }
    });

    if (player.dead) {
        alert("GAME OVER! SCORE: " + Math.floor(player.length));
        location.reload(); return;
    }

    ai_bots = ai_bots.filter(a => {
        if(a.dead) {
            for(let k=0; k<8; k++) spawnFood(a.body[0].x + (Math.random()-0.5)*200, a.body[0].y + (Math.random()-0.5)*200, true);
            return false;
        }
        return true;
    });
    while(ai_bots.length < 25) ai_bots.push(new Snake((Math.random()-0.5)*MAP, (Math.random()-0.5)*MAP, `hsl(${Math.random()*360}, 70%, 50%)`));

    ai_bots.forEach(a => a.draw(head.x, head.y, zoom));
    player.draw(head.x, head.y, zoom);

    // 更新 UI
    document.getElementById("score-ui").innerText = "SCORE: " + Math.floor(player.length);
    if(currentMode === 'magic') {
        document.getElementById("bar-blink").style.width = (1 - Math.max(0, cooldowns.blink)/5000)*100 + "%";
        document.getElementById("bar-syphon").style.width = (1 - Math.max(0, cooldowns.syphon)/15000)*100 + "%";
        document.getElementById("bar-warp").style.width = cooldowns.warp + "%";
        
        let rank = [player, ...ai_bots].sort((a,b)=>b.length - a.length).slice(0, 5);
        document.getElementById("ui-layer").innerHTML = "<b>🏆 排行榜</b><hr>" + rank.map((s,i)=>`<div>${i+1}. ${s.isPlayer?'YOU':s.color} <span style="float:right">${Math.floor(s.length)}</span></div>`).join("");
    }

    anim = requestAnimationFrame(loop);
}

function startGame() {
    started = true;
    player = new Snake(0, 0, "#0f4", true);
    ai_bots = []; foods = [];
    for(let i=0; i<400; i++) spawnFood();
    document.getElementById("menu").style.display = "none";
    document.getElementById("score-ui").style.display = "block";
    document.getElementById("ui-layer").style.display = "block";
    if(currentMode === 'magic') document.getElementById("skill-ui").style.display = "flex";
    loop();
}

// 監聽
window.addEventListener("mousedown", e => { if(e.button===0) mouse.down=true; if(e.button===2) mouse.right=true; });
window.addEventListener("mouseup", e => { if(e.button===0) mouse.down=false; if(e.button===2) mouse.right=false; });
window.addEventListener("mousemove", e => { mouse.x = e.clientX; mouse.y = e.clientY; });
window.addEventListener("keydown", e => {
    keys[e.key] = true;
    if (e.code === "Space" && currentMode === 'magic' && cooldowns.blink <= 0) {
        player.body.forEach(p => { p.x += Math.cos(player.angle)*350; p.y += Math.sin(player.angle)*350; });
        cooldowns.blink = 5000;
    }
    if (e.key.toLowerCase() === "q" && currentMode === 'magic' && cooldowns.syphon <= 0 && player.length > 1000) {
        let targets = ai_bots.sort((a,b)=>b.length - a.length);
        if(targets[0]) {
            let target = targets[0];
            let steal = target.length * 0.5;
            target.length -= steal;
            player.length *= 0.85;
            for(let i=0; i<15; i++) spawnFood(target.body[0].x + (Math.random()-0.5)*300, target.body[0].y + (Math.random()-0.5)*300, true);
            cooldowns.syphon = 15000;
        }
    }
});
window.addEventListener("keyup", e => keys[e.key] = false);
canvas.oncontextmenu = (e) => e.preventDefault(); // 右鍵修復核心
window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
window.onresize();
</script>
</body>
</html>
