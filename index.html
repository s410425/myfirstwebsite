<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>Snake.io Offline</title>

<style>
body{
margin:0;
overflow:hidden;
background:#111;
font-family:sans-serif;
}

canvas{
display:block;
}

#menu{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
color:white;
}

button{
font-size:24px;
padding:12px 30px;
border:none;
border-radius:10px;
background:#444;
color:white;
cursor:pointer;
}

button:hover{
background:#666;
}

#expBar{
position:absolute;
bottom:15px;
left:15px;
width:300px;
height:20px;
background:#333;
border-radius:10px;
overflow:hidden;
}

#exp{
height:100%;
width:0%;
background:lime;
}

#rank{
position:absolute;
top:10px;
right:10px;
background:rgba(0,0,0,0.5);
padding:10px;
border-radius:10px;
color:white;
font-size:14px;
}
</style>
</head>


<body>

<div id="menu">
<h1>Snake.io 單機版</h1>
<button onclick="start()">開始遊戲</button>
</div>

<div id="expBar"><div id="exp"></div></div>
<div id="rank"></div>

<canvas id="c"></canvas>

<script>

const canvas=document.getElementById("c")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let started=false

let camera={x:0,y:0}

let mouse={x:0,y:0}

let foods=[]
let particles=[]
let aiSnakes=[]

let keys={}

let exp=0
let expMax=100

const worldSize=4000


const player={
body:[{x:0,y:0}],
dir:{x:1,y:0},
length:120,
speed:3,
color1:"lime",
color2:"yellow"
}


function start(){
started=true
document.getElementById("menu").style.display="none"
loop()
}


function dist(a,b){
return Math.hypot(a.x-b.x,a.y-b.y)
}



function spawnFood(x,y){

if(x===undefined){
x=(Math.random()-0.5)*worldSize
y=(Math.random()-0.5)*worldSize
}

foods.push({
x:x,
y:y,
life:2000
})

}



for(let i=0;i<500;i++) spawnFood()



function spawnAI(){

let x
let y

while(true){

x=(Math.random()-0.5)*worldSize
y=(Math.random()-0.5)*worldSize

if(dist({x,y},player.body[0])>300) break

}

aiSnakes.push({

body:[{x:x,y:y}],
dir:{x:Math.random()-0.5,y:Math.random()-0.5},
length:120,
speed:2.5,
color1:`hsl(${Math.random()*360},70%,50%)`,
color2:`hsl(${Math.random()*360},70%,70%)`

})

}



for(let i=0;i<30;i++) spawnAI()



function moveSnake(s){

const head={
x:s.body[0].x+s.dir.x*s.speed,
y:s.body[0].y+s.dir.y*s.speed
}

s.body.unshift(head)

let len=0

for(let i=0;i<s.body.length-1;i++){

len+=dist(s.body[i],s.body[i+1])

if(len>s.length){

s.body=s.body.slice(0,i+2)
break

}

}

}



function drawSnake(s){

ctx.lineWidth=12
ctx.lineJoin="round"
ctx.lineCap="round"

let g=ctx.createLinearGradient(

s.body[0].x-camera.x,
s.body[0].y-camera.y,

s.body[s.body.length-1].x-camera.x,
s.body[s.body.length-1].y-camera.y

)

g.addColorStop(0,s.color1)
g.addColorStop(1,s.color2)

ctx.strokeStyle=g

ctx.beginPath()

ctx.moveTo(
s.body[0].x-camera.x,
s.body[0].y-camera.y
)

for(let i=1;i<s.body.length;i++){

ctx.lineTo(
s.body[i].x-camera.x,
s.body[i].y-camera.y
)

}

ctx.stroke()

}



function drawFood(f){

ctx.fillStyle="red"

ctx.beginPath()

ctx.arc(
f.x-camera.x,
f.y-camera.y,
4,
0,
Math.PI*2
)

ctx.fill()

}



function eatFood(s){

for(let i=foods.length-1;i>=0;i--){

let f=foods[i]

let d=dist(s.body[0],f)


if(d<120){

f.x+=(s.body[0].x-f.x)/20
f.y+=(s.body[0].y-f.y)/20

}


if(d<10){

s.length+=10

exp+=5

addParticles(f.x,f.y)

foods.splice(i,1)

spawnFood()
spawnFood()

}

}

}



function addParticles(x,y){

for(let i=0;i<10;i++){

particles.push({

x:x,
y:y,
vx:(Math.random()-0.5)*4,
vy:(Math.random()-0.5)*4,
life:30

})

}

}



function updateParticles(){

for(let i=particles.length-1;i>=0;i--){

let p=particles[i]

p.x+=p.vx
p.y+=p.vy

p.life--

ctx.globalAlpha=p.life/30

ctx.fillStyle="orange"

ctx.beginPath()

ctx.arc(p.x-camera.x,p.y-camera.y,2,0,Math.PI*2)

ctx.fill()

ctx.globalAlpha=1

if(p.life<=0) particles.splice(i,1)

}

}



function checkDeath(s){

for(let i=5;i<s.body.length;i++){

if(dist(s.body[0],s.body[i])<8){

s.length=60
exp=0

}

}

for(let other of aiSnakes){

for(let p of other.body){

if(dist(s.body[0],p)<8){

s.length=60
exp=0

}

}

}

}



function aiBrain(ai){

let head=ai.body[0]

let target=null
let best=999999


for(let f of foods){

let d=dist(head,f)

if(d<best){

best=d
target=f

}

}


if(target){

let dx=target.x-head.x
let dy=target.y-head.y

let l=Math.hypot(dx,dy)

ai.dir.x=dx/l
ai.dir.y=dy/l

}

}



function playerControl(){

let dx=mouse.x+camera.x-player.body[0].x
let dy=mouse.y+camera.y-player.body[0].y

let l=Math.hypot(dx,dy)

player.dir.x=dx/l
player.dir.y=dy/l

player.speed=keys["Shift"]?5:3

}



function updateCamera(){

camera.x=player.body[0].x-canvas.width/2
camera.y=player.body[0].y-canvas.height/2

}



function leaderboard(){

let all=[player,...aiSnakes]

all.sort((a,b)=>b.length-a.length)

let text="排行榜<br>"

for(let i=0;i<5;i++){

text+=`${i+1}. ${Math.floor(all[i].length)}<br>`

}

document.getElementById("rank").innerHTML=text

}



function loop(){

if(!started) return

ctx.clearRect(0,0,canvas.width,canvas.height)

playerControl()

moveSnake(player)

eatFood(player)

checkDeath(player)


for(let ai of aiSnakes){

aiBrain(ai)

moveSnake(ai)

eatFood(ai)

}


for(let f of foods) drawFood(f)

drawSnake(player)

for(let ai of aiSnakes) drawSnake(ai)

updateParticles()

updateCamera()

leaderboard()


exp%=expMax

document.getElementById("exp").style.width=(exp/expMax*100)+"%"

requestAnimationFrame(loop)

}



document.addEventListener("mousemove",e=>{
mouse.x=e.clientX
mouse.y=e.clientY
})

document.addEventListener("keydown",e=>{
keys[e.key]=true
})

document.addEventListener("keyup",e=>{
keys[e.key]=false
})

</script>
</body>
</html>
