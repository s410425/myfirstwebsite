<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>Snake.io 食物強化版</title>
<style>
    body{margin:0;overflow:hidden;background:#111;font-family:sans-serif;user-select:none}
    canvas{display:block}
    #menu{position:absolute;width:100%;height:100%;background:rgba(0,0,0,0.85);display:flex;flex-direction:column;align-items:center;justify-content:center;color:white;z-index:10}
    button{font-size:26px;padding:12px 45px;border:none;border-radius:50px;background:#4CAF50;color:white;cursor:pointer;transition:0.3s;box-shadow: 0 0 20px rgba(76,175,80,0.4)}
    button:hover{background:#45a049;transform:scale(1.1);box-shadow: 0 0 30px rgba(76,175,80,0.6)}
    #rank{position:absolute;top:20px;right:20px;background:rgba(0,0,0,0.6);padding:15px;border-radius:10px;color:white;pointer-events:none;border:1px solid #444}
    #expBar{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);width:40%;height:12px;background:#222;border-radius:10px;border:2px solid #444}
    #exp{height:100%;width:0%;background:linear-gradient(90deg, #00ff00, #ccff00);border-radius:10px;transition:0.3s;box-shadow: 0 0 10px rgba(0,255,0,0.5)}
</style>
</head>
<body>

<div id="menu">
    <h1 style="font-size: 60px; margin-bottom: 10px;">SNAKE.IO</h1>
    <p style="color: #aaa; margin-bottom: 30px;">滑鼠控制方向 • <b>Shift</b> 加速</p>
    <button onclick="start()">進入戰場</button>
</div>

<div id="rank"></div>
<div id="expBar"><div id="exp"></div></div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const MAP = 2500;
const FOOD_MAX = 400; // 稍微增加總量
const AI_COUNT = 18;

let started = false;
let camera = {x:0, y:0};
let foods = [], ai = [], toDie = [];
let mouse = {x:innerWidth/2, y:innerHeight/2}, keys = {};
let score = 0;

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

const player = {
    body: [{x:0, y:0}],
    dir: {x:1, y:0},
    length: 120,
    speed: 3.5,
    color: "#00FF44",
    isPlayer: true
};

// --- 工具 ---
function dist2(a, b) { return (a.x - b.x)**2 + (a.y - b.y)**2; }

// --- 強化版食物系統 ---
function spawnFood(x, y, isBig = false, value = null) {
    if (foods.length >= FOOD_MAX && x === undefined) return;
    foods.push({
        x: x ?? (Math.random() * MAP * 2 - MAP),
        y: y ?? (Math.random() * MAP * 2 - MAP),
        val: value ?? (isBig ? 35 : 12),
        size: isBig ? 7 : 4,
        color: `hsl(${Math.random() * 360}, 100%, 60%)`,
        pulseOffset: Math.random() * Math.PI * 2
    });
}
for(let i=0; i<200; i++) spawnFood();

function drawFoods() {
    const time = Date.now() * 0.006;
    for (let f of foods) {
        // 螢幕裁剪 (效能提升)
        if (f.x < camera.x - 30 || f.x > camera.x + canvas.width + 30 ||
            f.y < camera.y - 30 || f.y > camera.y + canvas.height + 30) continue;

        let s = f.size + Math.sin(time + f.pulseOffset) * 1.5;
        
        ctx.fillStyle = f.color;
        ctx.beginPath();
        ctx.arc(f.x - camera.x, f.y - camera.y, s, 0, Math.PI * 2);
        ctx.fill();

        if (f.size > 5) { // 大食物加光圈
            ctx.strokeStyle = "rgba(255,255,255,0.5)";
            ctx.lineWidth = 2;
            ctx.stroke();
        }
    }
}

// --- AI 系統 ---
function spawnAI() {
    let x = (Math.random() * MAP * 2 - MAP);
    let y = (Math.random() * MAP * 2 - MAP);
    ai.push({
        body: [{x, y}],
        dir: {x: Math.random()-0.5, y: Math.random()-0.5},
        length: 100 + Math.random() * 400,
        speed: 2.8,
        color: `hsl(${Math.random() * 360}, 80%, 60%)`,
        isPlayer: false
    });
}
for(let i=0; i<AI_COUNT; i++) spawnAI();

// --- 核心邏輯 ---
function moveSnake(s) {
    let head = { x: s.body[0].x + s.dir.x * s.speed, y: s.body[0].y + s.dir.y * s.speed };
    s.body.unshift(head);
    
    let currentLen = 0;
    for (let i = 0; i < s.body.length - 1; i++) {
        currentLen += Math.sqrt(dist2(s.body[i], s.body[i+1]));
        if (currentLen > s.length) {
            s.body.splice(i + 1);
            break;
        }
    }
}

function checkCollision(s) {
    let h = s.body[0];
    if (Math.abs(h.x) > MAP || Math.abs(h.y) > MAP) return markDeath(s);

    let allSnakes = [player, ...ai];
    for (let other of allSnakes) {
        if (other === s || toDie.some(d => d.snake === other)) continue;
        if (dist2(h, other.body[0]) > (other.length + 200)**2) continue;

        for (let i = 0; i < other.body.length; i += 3) { // 優化效能跳點檢查
            if (dist2(h, other.body[i]) < 450) return markDeath(s);
        }
    }
}

function eatFood(s) {
    let h = s.body[0];
    // 磁力吸取範圍隨蛇體長度微量增加
    let magRange = 110 + (s.length / 15);
    let magRange2 = magRange * magRange;

    for (let i = foods.length - 1; i >= 0; i--) {
        let f = foods[i];
        let d2 = dist2(h, f);

        if (d2 < magRange2) {
            // 吸取動畫：離頭部越近吸越快
            f.x += (h.x - f.x) * 0.18;
            f.y += (h.y - f.y) * 0.18;
            
            if (d2 < 450) {
                s.length += f.val;
                if (s.isPlayer) score += f.val;
                foods.splice(i, 1);
                if (f.val < 20) spawnFood(); // 只有小食物會在地圖隨機補位
            }
        }
    }
}

function markDeath(s) {
    if (!toDie.some(d => d.snake === s)) toDie.push({ snake: s });
}

function handleDeaths() {
    for (let i = toDie.length - 1; i >= 0; i--) {
        let s = toDie[i].snake;
        
        // 死亡噴出大量散落食物
        let dropCount = Math.min(Math.floor(s.length / 12), 60);
        for (let j = 0; j < dropCount; j++) {
            let p = s.body[Math.floor(Math.random() * s.body.length)];
            let ox = (Math.random() - 0.5) * 80;
            let oy = (Math.random() - 0.5) * 80;
            spawnFood(p.x + ox, p.y + oy, true, 28);
        }
        
        if (s === player) {
            player.body = [{x:0, y:0}];
            player.length = 120;
            score = 0;
        } else {
            ai.splice(ai.indexOf(s), 1);
            setTimeout(spawnAI, 2000);
        }
        toDie.splice(i, 1);
    }
}

// --- 渲染 ---
function draw() {
    ctx.fillStyle = "#0a0a0a";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // 畫網格
    ctx.strokeStyle = "#1a1a1a";
    ctx.lineWidth = 1;
    let step = 120;
    for(let x = -MAP - camera.x % step; x < canvas.width; x += step) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
    }
    for(let y = -MAP - camera.y % step; y < canvas.height; y += step) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
    }

    // 畫邊界
    ctx.strokeStyle = "#ff3333";
    ctx.lineWidth = 10;
    ctx.strokeRect(-MAP - camera.x, -MAP - camera.y, MAP*2, MAP*2);

    drawFoods();

    // 畫蛇
    [player, ...ai].forEach(s => {
        if (toDie.some(d => d.snake === s)) return;
        
        // 畫蛇身
        ctx.strokeStyle = s.color;
        ctx.lineWidth = 22;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.beginPath();
        ctx.moveTo(s.body[0].x - camera.x, s.body[0].y - camera.y);
        for(let p of s.body) ctx.lineTo(p.x - camera.x, p.y - camera.y);
        ctx.stroke();
        
        // 畫頭部 (眼睛)
        let head = s.body[0];
        ctx.fillStyle = "white";
        ctx.beginPath();
        ctx.arc(head.x - camera.x, head.y - camera.y, 6, 0, Math.PI*2);
        ctx.fill();
    });
}

function update() {
    if (!started) return;

    // 玩家控制
    let targetX = mouse.x + camera.x - player.body[0].x;
    let targetY = mouse.y + camera.y - player.body[0].y;
    let angle = Math.atan2(targetY, targetX);
    player.dir.x = Math.cos(angle);
    player.dir.y = Math.sin(angle);
    
    if (keys["Shift"] && player.length > 60) {
        player.speed = 7.5;
        player.length -= 0.4;
        if (Math.random() > 0.85) spawnFood(player.body[player.body.length-1].x, player.body[player.body.length-1].y, false, 5);
    } else {
        player.speed = 3.8;
    }

    moveSnake(player);
    eatFood(player);
    checkCollision(player);

    // AI 行為 (簡易避障 + 找食物)
    ai.forEach(s => {
        if (Math.random() > 0.96) { 
            let nearest = foods[Math.floor(Math.random()*foods.length)];
            let a = Math.atan2(nearest.y - s.body[0].y, nearest.x - s.body[0].x);
            s.dir.x = Math.cos(a); s.dir.y = Math.sin(a);
        }
        moveSnake(s);
        eatFood(s);
        checkCollision(s);
    });

    handleDeaths();

    // 鏡頭平滑跟隨
    camera.x += (player.body[0].x - canvas.width/2 - camera.x) * 0.08;
    camera.y += (player.body[0].y - canvas.height/2 - camera.y) * 0.08;

    // UI 更新
    document.getElementById("exp").style.width = Math.min(100, (player.length / 1500) * 100) + "%";
    let all = [player, ...ai].sort((a,b) => b.length - a.length);
    let rankHTML = "<b style='color:#ffcc00'>戰場排行榜</b><hr style='border:0.5px solid #444'>";
    all.slice(0, 6).forEach((s, i) => {
        let color = s.isPlayer ? "#00ff44" : "#fff";
        rankHTML += `<div style='color:${color}'>${i+1}. ${s.isPlayer ? "YOU" : "AI"} - ${Math.floor(s.length)}</div>`;
    });
    document.getElementById("rank").innerHTML = rankHTML;

    draw();
    requestAnimationFrame(update);
}

function start() {
    started = true;
    document.getElementById("menu").style.display = "none";
    update();
}

addEventListener("mousemove", e => { mouse.x = e.clientX; mouse.y = e.clientY; });
addEventListener("keydown", e => keys[e.key] = true);
addEventListener("keyup", e => keys[e.key] = false);

</script>
</body>
</html>
