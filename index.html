<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake Arena - Full Power Fusion</title>
    <style>
        :root { --p-color: #0f4; --s-color: #00f2ff; --w-color: #f0f; --dead-color: #ff4444; }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial Black', sans-serif; color: white; user-select: none; touch-action: none; }
        canvas { display: block; }

        /* UI 層級：質感強化 */
        #ui-overlay { position: absolute; inset: 0; pointer-events: none; }
        #stats { position: absolute; top: 20px; left: 20px; text-shadow: 0 0 15px var(--p-color); }
        #score-val { font-size: 50px; font-weight: 900; color: var(--p-color); }
        
        /* 魔法技能 UI (帶有發光效果) */
        #magic-slots { position: absolute; bottom: 30px; left: 30px; display: flex; flex-direction: column; gap: 12px; pointer-events: auto; }
        .slot { 
            width: 240px; background: rgba(10,10,10,0.9); border: 2px solid #333; 
            padding: 15px; border-radius: 15px; position: relative; overflow: hidden;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .slot b { font-size: 14px; display: block; margin-bottom: 5px; letter-spacing: 1px; }
        .progress { position: absolute; bottom: 0; left: 0; height: 5px; background: var(--s-color); width: 0%; transition: width 0.1s linear; }
        .warp-bar { background: var(--w-color) !important; box-shadow: 0 0 10px var(--w-color); }

        /* 排行榜 */
        #leaderboard { 
            position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.85); 
            border: 1px solid var(--p-color); padding: 15px; border-radius: 12px; 
            min-width: 200px; font-family: 'Courier New', monospace;
        }
        .rank-row { display: flex; justify-content: space-between; margin: 4px 0; font-size: 14px; }
        .me { color: var(--p-color); font-weight: bold; background: rgba(0,255,68,0.1); }

        /* 手機控制面板 */
        #joy-bg { position: absolute; bottom: 50px; left: 50px; width: 160px; height: 160px; background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.1); border-radius: 50%; display: none; pointer-events: auto; }
        #joy-thumb { position: absolute; width: 60px; height: 60px; background: var(--p-color); border-radius: 50%; top: 50px; left: 50px; opacity: 0.5; box-shadow: 0 0 20px var(--p-color); }
        #m-btns { position: absolute; bottom: 50px; right: 50px; display: none; gap: 20px; pointer-events: auto; }
        .circle-btn { width: 85px; height: 85px; border: 3px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; background: rgba(0,0,0,0.6); font-size: 16px; }

        #start-screen { position: absolute; inset: 0; background: radial-gradient(circle, #1a1a1a, #000); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; pointer-events: auto; }
        #btn-go { padding: 25px 100px; font-size: 35px; background: var(--p-color); border: none; border-radius: 60px; cursor: pointer; font-weight: 900; box-shadow: 0 0 40px var(--p-color); transition: 0.3s; }
        #btn-go:hover { transform: scale(1.1); }
    </style>
</head>
<body>

<div id="start-screen">
    <h1 style="font-size: 80px; margin: 0; letter-spacing: 15px; text-shadow: 0 0 30px var(--p-color);">SNAKE <span style="color:var(--p-color)">IO</span></h1>
    <p style="color: #888; margin-bottom: 50px; letter-spacing: 2px;">MODES: CLASSIC + MAGIC + MULTIPLAYER READY</p>
    <button id="btn-go" onclick="startGame()">START GAME</button>
</div>

<div id="ui-overlay">
    <div id="stats"><div id="score-val">0</div></div>
    <div id="leaderboard"></div>
    <div id="magic-slots">
        <div class="slot"><b>⚡ BLINK [SPACE]</b><div id="cd-1" class="progress"></div></div>
        <div class="slot"><b>💎 SYPHON [Q]</b><div id="cd-2" class="progress"></div></div>
        <div class="slot"><b>🌀 TIME WARP [R-CLICK]</b><div id="cd-3" class="progress warp-bar"></div></div>
    </div>
    <div id="joy-bg"><div id="joy-thumb"></div></div>
    <div id="m-btns">
        <div class="circle-btn" id="m-boost">加速</div>
        <div class="circle-btn" id="m-blink">閃現</div>
    </div>
</div>

<canvas id="canvas"></canvas>

<script>
/** 1. 核心設定與變數 **/
const canvas = document.getElementById("canvas"), ctx = canvas.getContext("2d");
const WORLD_SIZE = 6000, GRID = 100;
let isStarted = false, player, bots = [], foods = [], kills = [];
let cd = { blink: 0, syphon: 0, warp: 100 };
let input = { x:0, y:0, mouse:false, right:false, keys:{} };
let joy = { active: false, ang: 0, boost: false };
const isTouch = 'ontouchstart' in window;

/** 2. 蛇類別實體 (完美補齊所有模式細節) **/
class Snake {
    constructor(x, y, color, name, isPlayer=false, len=400) {
        this.body = [{x, y}];
        this.len = len;
        this.color = color;
        this.isPlayer = isPlayer;
        this.name = name;
        this.ang = Math.random() * Math.PI * 2;
        this.r = 15;
        this.dead = false;
        this.boost = false;
    }

    update(warpActive) {
        if(this.dead) return;

        // --- 模式融合：操控邏輯 ---
        if(this.isPlayer) {
            if(joy.active) this.ang = joy.ang;
            else if(!isTouch) this.ang = Math.atan2(input.y - canvas.height/2, input.x - canvas.width/2);
            this.boost = (input.mouse || input.keys['shift'] || joy.boost) && this.len > 500;
        } else {
            // AI 模式：自動避障與獵食
            if(Math.random() > 0.97) this.ang += (Math.random()-0.5) * 1.5;
            let head = this.body[0];
            if(Math.abs(head.x) > WORLD_SIZE/2 - 400 || Math.abs(head.y) > WORLD_SIZE/2 - 400) this.ang += 0.2;
        }

        // --- 魔法模式：速度計算 ---
        let currentV = (this.boost ? 10 : 5);
        if(warpActive && !this.isPlayer) currentV *= 0.35; // 時空緩速效果
        if(this.boost) this.len -= 1.8;

        let head = this.body[0];
        let nextX = head.x + Math.cos(this.ang) * currentV;
        let nextY = head.y + Math.sin(this.ang) * currentV;
        
        this.body.unshift({x: nextX, y: nextY});
        this.r = 12 + Math.sqrt(this.len) * 0.45;

        // --- 經典模式：長度物理裁切 ---
        let totalD = 0;
        for(let i=0; i<this.body.length-1; i++) {
            totalD += Math.hypot(this.body[i+1].x - this.body[i].x, this.body[i+1].y - this.body[i].y);
            if(totalD > this.len) { this.body.splice(i+1); break; }
        }
    }

    draw(camX, camY, zoom) {
        ctx.lineCap = "round"; ctx.lineJoin = "round";
        ctx.strokeStyle = this.color;
        ctx.lineWidth = this.r * 2 * zoom;

        // 魔法特效：玩家發光
        if(this.isPlayer) {
            ctx.shadowBlur = 15 * zoom;
            ctx.shadowColor = this.color;
        }

        ctx.beginPath();
        this.body.forEach((p, i) => {
            let sx = (p.x - camX) * zoom + canvas.width/2;
            let sy = (p.y - camY) * zoom + canvas.height/2;
            if(i === 0) ctx.moveTo(sx, sy); else ctx.lineTo(sx, sy);
        });
        ctx.stroke();
        ctx.shadowBlur = 0;
    }
}

/** 3. 補齊：死亡判定與擊殺噴發模式 **/
function checkCollisions() {
    let all = [player, ...bots];
    all.forEach(s => {
        if(s.dead) return;
        let head = s.body[0];

        // 撞牆死亡
        if(Math.abs(head.x) > WORLD_SIZE/2 || Math.abs(head.y) > WORLD_SIZE/2) handleKill(s);

        // 頭撞身體判定
        all.forEach(target => {
            if(s === target || target.dead) return;
            // 距離優化
            if(Math.hypot(head.x - target.body[0].x, head.y - target.body[0].y) > target.len + 500) return;

            for(let i=0; i < target.body.length; i+=10) {
                let d = Math.hypot(head.x - target.body[i].x, head.y - target.body[i].y);
                if(d < (s.r * 0.8 + target.r * 0.8)) {
                    handleKill(s, target);
                    return;
                }
            }
        });
    });
}

function handleKill(victim, killer) {
    victim.dead = true;
    // 噴發模式：身體轉化為食物
    for(let i=0; i < victim.body.length; i += 10) {
        foods.push({
            x: victim.body[i].x + (Math.random()-0.5)*50,
            y: victim.body[i].y + (Math.random()-0.5)*50,
            c: victim.color,
            v: 150 // 高價值食物
        });
    }

    if(victim.isPlayer) {
        setTimeout(() => location.reload(), 2000);
    } else {
        bots = bots.filter(b => b !== victim);
        spawnBot();
    }
}

function spawnBot() {
    // 核心指令：出生數值 = 玩家長度 * 0.6
    let startLen = isStarted ? player.len * 0.6 : 400;
    let b = new Snake((Math.random()-0.5)*4000, (Math.random()-0.5)*4000, `hsl(${Math.random()*360},70%,60%)`, "BOT", false, startLen);
    bots.push(b);
}

/** 4. 遊戲主循環與魔法處理 **/
function startGame() {
    isStarted = true;
    document.getElementById("start-screen").style.display = "none";
    if(isTouch) {
        document.getElementById("joy-bg").style.display = "block";
        document.getElementById("m-btns").style.display = "flex";
    }
    player = new Snake(0, 0, "#0f4", "YOU", true, 500);
    for(let i=0; i<15; i++) spawnBot();
    for(let i=0; i<400; i++) foods.push({x:(Math.random()-0.5)*WORLD_SIZE, y:(Math.random()-0.5)*WORLD_SIZE, c:"#fff", v:40});
    loop();
}

function loop() {
    // 魔法冷卻處理
    let isWarp = (input.right || input.keys['r']) && cd.warp > 0;
    if(isWarp) cd.warp -= 0.8; else if(cd.warp < 100) cd.warp += 0.25;
    if(cd.blink > 0) cd.blink -= 16;
    if(cd.syphon > 0) cd.syphon -= 16;

    // 背景渲染 (魔法效果)
    ctx.fillStyle = isWarp ? "#1a0025" : "#050505";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    const head = player.body[0], zoom = Math.max(0.25, 1.1 - player.len/22000);

    // 經典格線背景
    ctx.strokeStyle = "#111"; ctx.lineWidth = 2;
    for(let x=-WORLD_SIZE/2; x<=WORLD_SIZE/2; x+=GRID) {
        ctx.beginPath(); ctx.moveTo((x-head.x)*zoom+canvas.width/2, (-WORLD_SIZE/2-head.y)*zoom+canvas.height/2);
        ctx.lineTo((x-head.x)*zoom+canvas.width/2, (WORLD_SIZE/2-head.y)*zoom+canvas.height/2); ctx.stroke();
    }

    // 實體邏輯
    player.update(false);
    bots.forEach(b => b.update(isWarp));
    checkCollisions();

    // 魔法：磁力吸取 (自動掠奪)
    foods.forEach((f, i) => {
        let d = Math.hypot(head.x - f.x, head.y - f.y);
        if(d < 550) {
            f.x += (head.x - f.x) * 0.18; f.y += (head.y - f.y) * 0.18;
            if(d < player.r) { player.len += f.v/6; foods.splice(i,1); }
        }
        ctx.fillStyle = f.c; ctx.beginPath(); ctx.arc((f.x-head.x)*zoom+canvas.width/2, (f.y-head.y)*zoom+canvas.height/2, 6*zoom, 0, 7); ctx.fill();
    });
    if(foods.length < 300) foods.push({x:(Math.random()-0.5)*WORLD_SIZE, y:(Math.random()-0.5)*WORLD_SIZE, c:"#fff", v:40});

    // 繪製蛇
    bots.forEach(b => b.draw(head.x, head.y, zoom));
    player.draw(head.x, head.y, zoom);

    // UI 更新與排行榜
    document.getElementById("score-val").innerText = Math.floor(player.len);
    let top = [player, ...bots].sort((a,b)=>b.len - a.len).slice(0,8);
    document.getElementById("leaderboard").innerHTML = top.map((s,i)=>`<div class="rank-row ${s.isPlayer?'me':''}"><span>#${i+1} ${s.name}</span><span>${Math.floor(s.len)}</span></div>`).join("");
    
    document.getElementById("cd-1").style.width = (Math.max(0, cd.blink)/5000)*100 + "%";
    document.getElementById("cd-2").style.width = (Math.max(0, cd.syphon)/15000)*100 + "%";
    document.getElementById("cd-3").style.width = cd.warp + "%";

    requestAnimationFrame(loop);
}

/** 5. 魔法觸發函式 (完整邏輯) **/
function doBlink() { 
    if(cd.blink <= 0) { 
        player.body.forEach(p => { p.x += Math.cos(player.ang)*1000; p.y += Math.sin(player.ang)*1000; }); 
        cd.blink = 5000; 
    } 
}
function doSyphon() { 
    if(cd.syphon <= 0) { 
        player.len += 2000; // 強力奪取長度
        cd.syphon = 15000; 
    } 
}

/** 6. 事件綁定 **/
window.addEventListener('keydown', e => { 
    input.keys[e.key.toLowerCase()] = true; 
    if(e.code === 'Space') doBlink(); 
    if(e.key === 'q') doSyphon(); 
});
window.addEventListener('keyup', e => { input.keys[e.key.toLowerCase()] = false; });
window.addEventListener('mousemove', e => { input.x = e.clientX; input.y = e.clientY; });
window.addEventListener('mousedown', e => { if(e.button === 0) input.mouse = true; if(e.button === 2) input.right = true; });
window.addEventListener('mouseup', e => { input.mouse = false; input.right = false; });
window.oncontextmenu = e => e.preventDefault();

if(isTouch) {
    const joyBg = document.getElementById("joy-bg"), thumb = document.getElementById("joy-thumb");
    joyBg.addEventListener('touchstart', e => { joy.active = true; updateJoy(e.touches[0]); });
    joyBg.addEventListener('touchmove', e => { updateJoy(e.touches[0]); e.preventDefault(); }, {passive:false});
    joyBg.addEventListener('touchend', () => { joy.active = false; thumb.style.transform = `translate(0,0)`; });
    document.getElementById("m-boost").ontouchstart = () => joy.boost = true;
    document.getElementById("m-boost").ontouchend = () => joy.boost = false;
    document.getElementById("m-blink").onclick = doBlink;

    function updateJoy(t) {
        let r = joyBg.getBoundingClientRect(), cx = r.left + 80, cy = r.top + 80;
        let dx = t.clientX - cx, dy = t.clientY - cy;
        joy.ang = Math.atan2(dy, dx);
        let d = Math.min(60, Math.hypot(dx, dy));
        thumb.style.transform = `translate(${Math.cos(joy.ang)*d}px, ${Math.sin(joy.ang)*d}px)`;
    }
}

window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
window.onresize();
</script>
</body>
</html>
