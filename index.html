<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake.io Arena - Full Modes Integrated</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Arial; user-select: none; touch-action: none; }
        canvas { display: block; }

        /* UI 元件架構 */
        #ui-layer { pointer-events: none; position: absolute; inset: 0; z-index: 100; color: white; }
        #ui-layer * { pointer-events: auto; }

        /* 右上角：排行榜 */
        #leaderboard { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.8); padding: 12px; border-radius: 10px; border: 1px solid #0f4; min-width: 180px; font-size: 13px; }
        .rank-me { color: #0f4; font-weight: bold; text-shadow: 0 0 5px #0f4; }

        /* 左上角：紀錄 */
        #stats { position: absolute; top: 15px; left: 15px; }
        #history-box { background: rgba(20,20,20,0.9); padding: 10px; border-radius: 8px; border: 1px solid #444; font-size: 11px; margin-bottom: 8px; width: 150px; }
        #score-num { font-size: 32px; font-weight: bold; color: #0f4; }

        /* 右下角：小地圖 */
        #minimap-ui { position: absolute; bottom: 20px; right: 20px; width: 150px; height: 150px; background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.2); border-radius: 10px; overflow: hidden; }
        #m-canvas { width: 100%; height: 100%; }

        /* 左下角：技能組 (僅魔法模式顯示) */
        #skill-ui { position: absolute; bottom: 20px; left: 20px; display: none; flex-direction: column; gap: 8px; }
        .skill-bar { width: 180px; background: rgba(0,0,0,0.75); border: 1px solid #555; padding: 6px 12px; border-radius: 6px; font-size: 11px; position: relative; overflow: hidden; }
        .cd-fill { position: absolute; bottom: 0; left: 0; height: 3px; background: #f0f; width: 0%; transition: width 0.1s linear; }

        /* 手機控制 */
        #joystick { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; background: rgba(255,255,255,0.05); border: 1px solid #fff; border-radius: 50%; display: none; }
        #stick { position: absolute; top: 35px; left: 35px; width: 50px; height: 50px; background: #0f4; border-radius: 50%; opacity: 0.5; }
        #m-btns { position: absolute; bottom: 180px; right: 20px; display: none; flex-direction: column; gap: 12px; }
        .m-btn { width: 65px; height: 65px; background: rgba(255,255,255,0.1); border: 2px solid #fff; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; }

        /* 初始選單 */
        #overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.98); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; color: white; }
        .mode-options { display: flex; gap: 10px; margin: 20px 0; }
        .opt { padding: 12px 20px; background: #222; border: 1px solid #444; border-radius: 5px; cursor: pointer; transition: 0.2s; }
        .opt.active { background: rgba(0,255,0,0.2); border-color: #0f4; transform: scale(1.05); }
        #start-btn { padding: 15px 80px; font-size: 26px; background: #0f4; border: none; font-weight: bold; border-radius: 50px; cursor: pointer; box-shadow: 0 0 20px rgba(0,255,0,0.4); }
    </style>
</head>
<body>

<div id="ui-layer">
    <div id="stats">
        <div id="history-box">🏆 殿堂紀錄<hr><div id="h-list">載入中...</div></div>
        <div id="score-num">0</div>
    </div>
    <div id="leaderboard"></div>
    <div id="minimap-ui"><canvas id="m-canvas" width="150" height="150"></canvas></div>
    <div id="skill-ui">
        <div class="skill-bar">空間閃現 [SPACE] <div id="cd-blink" class="cd-fill"></div></div>
        <div class="skill-bar">萬象奪取 [Q] <div id="cd-syphon" class="cd-fill"></div></div>
        <div class="skill-bar">時空凝結 [R-CLICK] <div id="cd-warp" class="cd-fill"></div></div>
    </div>
    <div id="m-btns">
        <div class="m-btn" id="mb-boost">加速</div>
        <div class="m-btn" id="mb-blink">閃現</div>
    </div>
</div>

<div id="joystick"><div id="stick"></div></div>

<div id="overlay">
    <h1 style="letter-spacing: 8px;">SNAKE <span style="color:#0f4">ARENA</span></h1>
    <input type="text" id="p-name" placeholder="輸入戰士名稱" maxlength="10" style="padding:12px; text-align:center; font-size:22px; background:transparent; border:2px solid #555; color:#0f4; outline:none; width:280px; margin-bottom:10px;">
    <div class="mode-options">
        <div class="opt active" onclick="setMode('magic')">✨ 魔法</div>
        <div class="opt" onclick="setMode('classic')">🛡️ 經典</div>
        <div class="opt" onclick="setMode('online')">🌍 連機(模擬)</div>
    </div>
    <button id="start-btn" onclick="gameInit()">進入競技場</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game"), ctx = canvas.getContext("2d");
const mCanvas = document.getElementById("m-canvas"), mCtx = mCanvas.getContext("2d");

const WORLD = 6000;
const GRID = 100;
let started = false, gameMode = 'magic', player, foods = [], bots = [];
let mouse = {x:0, y:0, down:false, right:false}, keys = {};
let joystick = {active:false, ang:0, boost:false};
let cd = {blink:0, syphon:0, warp:100};
let isMobile = /iPhone|iPad|Android/i.test(navigator.userAgent);

class Snake {
    constructor(x, y, color, isPlayer = false, len = 280) {
        this.body = [{x, y}, {x:x-1, y:y-1}];
        this.len = len;
        this.color = color;
        this.isPlayer = isPlayer;
        this.ang = Math.random() * 6.28;
        this.name = isPlayer ? (document.getElementById('p-name').value || "PLAYER") : "AI_"+Math.floor(Math.random()*999);
        this.dead = false;
        this.birth = Date.now();
    }
    get r() { return 10 + Math.sqrt(this.len) * 0.45; }

    update(isSlow) {
        if(this.dead) return;
        
        // 模式特化速度
        let baseSpeed = (gameMode === 'online') ? 5.5 : 4.8;
        let boostSpeed = (gameMode === 'online') ? 10 : 9;

        if(!this.isPlayer) {
            let h = this.body[0];
            if(Math.abs(h.x) > WORLD-400 || Math.abs(h.y) > WORLD-400) this.ang += 0.2;
            else if(Math.random() > 0.97) this.ang += (Math.random()-0.5);
            
            // 避障感應
            let dX = h.x + Math.cos(this.ang)*200, dY = h.y + Math.sin(this.ang)*200;
            [player, ...bots].forEach(s => {
                if(s === this || s.dead) return;
                if(Math.hypot(dX - s.body[0].x, dY - s.body[0].y) < s.r + 60) this.ang += 0.4;
            });
        }

        let isBoosting = (this.isPlayer && (mouse.down || joystick.boost || keys['Shift'])) && this.len > 500;
        let speed = (isBoosting ? boostSpeed : baseSpeed) * (isSlow && !this.isPlayer ? 0.35 : 1);
        if(isBoosting) this.len -= 1.8;

        let newH = {x: this.body[0].x + Math.cos(this.ang)*speed, y: this.body[0].y + Math.sin(this.ang)*speed};
        this.body.unshift(newH);
        
        let d = 0;
        for(let i=0; i<this.body.length-1; i++) {
            d += Math.hypot(this.body[i+1].x-this.body[i].x, this.body[i+1].y-this.body[i].y);
            if(d > this.len) { this.body.splice(i+1); break; }
        }
    }

    draw(cX, cY, z) {
        ctx.strokeStyle = this.color; ctx.lineWidth = this.r*2*z; ctx.lineCap = "round"; ctx.lineJoin = "round";
        ctx.beginPath();
        this.body.forEach((p, i) => {
            let sx = (p.x-cX)*z + canvas.width/2, sy = (p.y-cY)*z + canvas.height/2;
            if(i===0) ctx.moveTo(sx, sy); else ctx.lineTo(sx, sy);
        });
        ctx.stroke();
        if(z > 0.35) {
            ctx.fillStyle = "#fff"; ctx.font = `bold ${14*z}px Arial`; ctx.textAlign = "center";
            ctx.fillText(this.name, (this.body[0].x-cX)*z+canvas.width/2, (this.body[0].y-cY)*z+canvas.height/2 - this.r*z - 10);
        }
    }
}

function drawGrid(cX, cY, z) {
    ctx.strokeStyle = "#111"; ctx.lineWidth = 1;
    let sX = Math.floor((cX - canvas.width/2/z)/GRID)*GRID;
    let sY = Math.floor((cY - canvas.height/2/z)/GRID)*GRID;
    for(let x=sX; x<cX+canvas.width/2/z; x+=GRID) {
        ctx.beginPath(); ctx.moveTo((x-cX)*z+canvas.width/2, 0); ctx.lineTo((x-cX)*z+canvas.width/2, canvas.height); ctx.stroke();
    }
    for(let y=sY; y<cY+canvas.height/2/z; y+=GRID) {
        ctx.beginPath(); ctx.moveTo(0, (y-cY)*z+canvas.height/2); ctx.lineTo(canvas.width, (y-cY)*z+canvas.height/2); ctx.stroke();
    }
    ctx.strokeStyle = "red"; ctx.lineWidth = 5*z;
    ctx.strokeRect((-WORLD-cX)*z+canvas.width/2, (-WORLD-cY)*z+canvas.height/2, WORLD*2*z, WORLD*2*z);
}

function loop() {
    if(!started) return;

    // 模式判斷：是否啟用魔法
    let canMagic = (gameMode === 'magic');
    let isWarp = canMagic && (mouse.right || keys['r']) && cd.warp > 0;
    
    if(canMagic) {
        if(isWarp) cd.warp -= 0.8; else if(cd.warp < 100) cd.warp += 0.22;
        if(cd.blink > 0) cd.blink -= 16.6;
        if(cd.syphon > 0) cd.syphon -= 16.6;
    }

    ctx.fillStyle = isWarp ? "#1a0020" : "#050505";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    const head = player.body[0], z = Math.max(0.2, 1.15 - player.len/22000);
    drawGrid(head.x, head.y, z);

    if(joystick.active) player.ang = joystick.ang;
    else if(!isMobile) player.ang = Math.atan2(mouse.y - canvas.height/2, mouse.x - canvas.width/2);
    player.update(false);

    // 邊界死亡
    if(Math.abs(head.x) > WORLD || Math.abs(head.y) > WORLD) player.dead = true;

    // AI 生成 (連機模式 AI 更多)
    let maxBots = (gameMode === 'online') ? 40 : 25;
    while(bots.length < maxBots) {
        let a = Math.random()*6.28, d = 1800+Math.random()*600;
        bots.push(new Snake(head.x+Math.cos(a)*d, head.y+Math.sin(a)*d, `hsl(${Math.random()*360},70%,60%)`, false, player.len*(0.4+Math.random()*2)));
    }

    // 碰撞檢查
    bots.forEach((b, bi) => {
        b.update(isWarp);
        // 玩家撞 AI 身體
        if(Date.now()-player.birth > 2000) {
            for(let i=0; i<b.body.length; i+=10) {
                if(Math.hypot(head.x-b.body[i].x, head.y-b.body[i].y) < b.r*0.95) player.dead = true;
            }
        }
        // AI 撞玩家身體
        for(let i=0; i<player.body.length; i+=10) {
            if(Math.hypot(b.body[0].x-player.body[i].x, b.body[0].y-player.body[i].y) < player.r*0.95) b.dead = true;
        }

        if(b.dead) {
            for(let k=0; k<8; k++) foods.push({x:b.body[0].x+Math.random()*60-30, y:b.body[0].y+Math.random()*60-30, v:120, c:b.color});
            bots.splice(bi, 1);
        } else {
            b.draw(head.x, head.y, z);
        }
    });

    // 食物邏輯 (收益遞減)
    foods.forEach((f, fi) => {
        let dist = Math.hypot(head.x-f.x, head.y-f.y);
        if(dist < (canMagic?1000:600)) {
            f.x += (head.x-f.x)*0.2; f.y += (head.y-f.y)*0.2;
            if(dist < player.r) {
                player.len += (f.v / (1 + player.len/9000));
                foods.splice(fi, 1);
            }
        }
        ctx.fillStyle = f.c; ctx.beginPath(); ctx.arc((f.x-head.x)*z+canvas.width/2, (f.y-head.y)*z+canvas.height/2, 5*z, 0, 7); ctx.fill();
    });
    if(foods.length < 350) foods.push({x:(Math.random()-0.5)*WORLD*2, y:(Math.random()-0.5)*WORLD*2, v:50, c:'#0f4'});

    player.draw(head.x, head.y, z);

    // 排行榜更新
    let ranks = [player, ...bots].sort((a,b)=>b.len-a.len).slice(0, 10);
    document.getElementById("leaderboard").innerHTML = "<b>RANKING</b><hr>" + ranks.map((s,i)=>`<div class="${s===player?'rank-me':''}">#${i+1} ${s.name} <span>${Math.floor(s.len)}</span></div>`).join("");
    document.getElementById("score-num").innerText = Math.floor(player.len);

    if(canMagic) {
        document.getElementById("cd-blink").style.width = (1-Math.max(0,cd.blink)/5000)*100+"%";
        document.getElementById("cd-syphon").style.width = (1-Math.max(0,cd.syphon)/15000)*100+"%";
        document.getElementById("cd-warp").style.width = cd.warp+"%";
    }

    // 小地圖
    mCtx.clearRect(0,0,150,150);
    let ms = 150/(WORLD*2);
    mCtx.fillStyle="#0f4"; mCtx.fillRect((player.body[0].x+WORLD)*ms-2, (player.body[0].y+WORLD)*ms-2, 4, 4);
    mCtx.fillStyle="red"; bots.forEach(b => mCtx.fillRect((b.body[0].x+WORLD)*ms, (b.body[0].y+WORLD)*ms, 2, 2));

    if(player.dead) {
        alert("戰敗！最終分數: " + Math.floor(player.len));
        saveHistory(Math.floor(player.len));
        location.reload(); return;
    }
    requestAnimationFrame(loop);
}

function gameInit() {
    started = true;
    document.getElementById("overlay").style.display = "none";
    if(gameMode === 'magic') document.getElementById("skill-ui").style.display = "flex";
    if(isMobile) {
        document.getElementById("joystick").style.display = "block";
        document.getElementById("m-btns").style.display = "flex";
    }
    player = new Snake(0,0,"#0f4", true);
    for(let i=0; i<400; i++) foods.push({x:(Math.random()-0.5)*WORLD*2, y:(Math.random()-0.5)*WORLD*2, v:50, c:`hsl(${Math.random()*360},100%,70%)`});
    loop();
}

function setMode(m) {
    gameMode = m;
    document.querySelectorAll('.opt').forEach(o => o.classList.remove('active'));
    event.target.classList.add('active');
}

function saveHistory(s) {
    let h = JSON.parse(localStorage.getItem('snk_v5') || '[]');
    h.push({n: player.name, s: s});
    localStorage.setItem('snk_v5', JSON.stringify(h.sort((a,b)=>b.s-a.s).slice(-5)));
}

function loadHistory() {
    let h = JSON.parse(localStorage.getItem('snk_v5') || '[]');
    document.getElementById("h-list").innerHTML = h.reverse().map(r => `<div>${r.n}: ${r.s}</div>`).join("") || "尚無紀錄";
}

// 技能指令
function triggerBlink() {
    if(gameMode === 'magic' && cd.blink <= 0) {
        player.body.forEach(p => { p.x += Math.cos(player.ang)*800; p.y += Math.sin(player.ang)*800; });
        cd.blink = 5000;
    }
}
function triggerSyphon() {
    if(gameMode === 'magic' && cd.syphon <= 0) {
        let b = bots.sort((a,b)=>b.len-a.len)[0];
        if(b){ b.len *= 0.6; player.len += 1500; cd.syphon = 15000; }
    }
}

// 控制器
window.onkeydown = (e) => {
    keys[e.key] = true;
    if(e.code === 'Space') triggerBlink();
    if(e.key.toLowerCase() === 'q') triggerSyphon();
};
window.onkeyup = (e) => keys[e.key] = false;
window.onmousedown = (e) => { if(e.button===0) mouse.down=true; if(e.button===2) mouse.right=true; };
window.onmouseup = () => { mouse.down=false; mouse.right=false; };
window.onmousemove = (e) => { mouse.x = e.clientX; mouse.y = e.clientY; };
window.oncontextmenu = (e) => e.preventDefault();

// 手機觸控
canvas.addEventListener("touchstart", e => {
    if(e.touches[0].clientX < canvas.width/2) { joystick.active=true; updateJoystick(e.touches[0]); }
});
canvas.addEventListener("touchmove", e => { if(joystick.active) updateJoystick(e.touches[0]); });
canvas.addEventListener("touchend", () => joystick.active=false);
document.getElementById("mb-boost").ontouchstart = () => joystick.boost = true;
document.getElementById("mb-boost").ontouchend = () => joystick.boost = false;
document.getElementById("mb-blink").onclick = triggerBlink;

function updateJoystick(t) {
    let r = document.getElementById("joystick").getBoundingClientRect();
    let dx = t.clientX - (r.left + 60), dy = t.clientY - (r.top + 60);
    joystick.ang = Math.atan2(dy, dx);
    let d = Math.min(Math.hypot(dx, dy), 45);
    document.getElementById("stick").style.transform = `translate(${Math.cos(joystick.ang)*d}px, ${Math.sin(joystick.ang)*d}px)`;
}

window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
window.onresize();
loadHistory();
</script>
</body>
</html>
