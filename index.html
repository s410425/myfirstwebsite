<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>Snake.io 終極修正版</title>
<style>
    body{margin:0;overflow:hidden;background:#050505;font-family:sans-serif;user-select:none}
    canvas{display:block}
    #ui{position:absolute;top:20px;left:20px;color:white;background:rgba(0,0,0,0.5);padding:15px;border-radius:10px;pointer-events:none}
    #rank{position:absolute;top:20px;right:20px;color:white;background:rgba(0,0,0,0.5);padding:15px;border-radius:10px}
    #menu{position:absolute;width:100%;height:100%;background:rgba(0,0,0,0.8);display:flex;flex-direction:column;align-items:center;justify-content:center;color:white;z-index:100}
    button{font-size:24px;padding:10px 40px;cursor:pointer;background:#0f4;border:none;border-radius:5px}
</style>
</head>
<body>

<div id="menu">
    <h1>CYBER SNAKE FIX</h1>
    <button onclick="start()">START</button>
</div>

<div id="ui">LENGTH: <span id="score">0</span></div>
<div id="rank"></div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const MAP = 3000;
const FOOD_MAX = 500;
const AI_TARGET_COUNT = 30; // 增加 AI 數量

let started = false;
let camera = {x:0, y:0};
let foods = [], ai = [], toDie = [];
let mouse = {x:0, y:0}, keys = {};

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resize);
resize();

class Snake {
    constructor(x, y, color, isPlayer = false) {
        this.body = [{x, y}];
        this.length = 150;
        this.color = color;
        this.isPlayer = isPlayer;
        this.speed = 4;
        this.angle = Math.random() * Math.PI * 2;
    }

    update() {
        // 只有玩家按下 Shift 或 Space 且長度夠時才加速並扣分
        let isBoosting = this.isPlayer && (keys["Shift"] || keys[" "]);
        
        if (isBoosting && this.length > 60) {
            this.speed = 8;
            this.length -= 0.5; // 玩家加速才掉分
        } else {
            this.speed = 4;
        }

        // 確保長度不為負數
        this.length = Math.max(50, this.length);

        // 移動邏輯
        let head = {
            x: this.body[0].x + Math.cos(this.angle) * this.speed,
            y: this.body[0].y + Math.sin(this.angle) * this.speed
        };
        this.body.unshift(head);

        // 依照長度裁切身體
        let curLen = 0;
        for (let i = 0; i < this.body.length - 1; i++) {
            curLen += Math.hypot(this.body[i+1].x - this.body[i].x, this.body[i+1].y - this.body[i].y);
            if (curLen > this.length) {
                this.body.splice(i + 1);
                break;
            }
        }
    }

    draw() {
        ctx.strokeStyle = this.color;
        ctx.lineWidth = 20;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.beginPath();
        ctx.moveTo(this.body[0].x - camera.x, this.body[0].y - camera.y);
        for(let p of this.body) ctx.lineTo(p.x - camera.x, p.y - camera.y);
        ctx.stroke();
    }
}

const player = new Snake(0, 0, "#0f4", true);

function spawnFood() {
    foods.push({
        x: Math.random() * MAP * 2 - MAP,
        y: Math.random() * MAP * 2 - MAP,
        val: 12,
        color: `hsl(${Math.random() * 360}, 100%, 50%)`
    });
}
for(let i=0; i<FOOD_MAX; i++) spawnFood();

function spawnAI() {
    let x = Math.random() * MAP * 2 - MAP;
    let y = Math.random() * MAP * 2 - MAP;
    ai.push(new Snake(x, y, `hsl(${Math.random()*360}, 70%, 60%)`));
}
for(let i=0; i<AI_TARGET_COUNT; i++) spawnAI();

function loop() {
    if (!started) return;
    ctx.fillStyle = "#050505";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    camera.x = player.body[0].x - canvas.width/2;
    camera.y = player.body[0].y - canvas.height/2;

    // 食物邏輯 (所有人都能吃，且會長大)
    let allSnakes = [player, ...ai];
    for (let i = foods.length - 1; i >= 0; i--) {
        let f = foods[i];
        // 簡單螢幕裁切繪製
        if (f.x > camera.x && f.x < camera.x + canvas.width && f.y > camera.y && f.y < camera.y + canvas.height) {
            ctx.fillStyle = f.color;
            ctx.beginPath(); ctx.arc(f.x - camera.x, f.y - camera.y, 4, 0, 7); ctx.fill();
        }

        allSnakes.forEach(s => {
            let dx = s.body[0].x - f.x, dy = s.body[0].y - f.y;
            if (dx*dx + dy*dy < 400) { // 吃到食物
                s.length += f.val;
                foods.splice(i, 1);
                spawnFood();
            }
        });
    }

    // 玩家轉向
    let targetAngle = Math.atan2(mouse.y - canvas.height/2, mouse.x - canvas.width/2);
    player.angle = targetAngle;
    player.update();

    // AI 邏輯
    ai.forEach((s, idx) => {
        // AI 隨機轉向尋找食物
        if (Math.random() > 0.98) s.angle += (Math.random() - 0.5) * 2;
        s.update();

        // 碰撞檢測 (AI 撞到別人會死)
        allSnakes.forEach(target => {
            if (target === s) return;
            for (let j = 0; j < target.body.length; j += 5) {
                let dx = s.body[0].x - target.body[j].x;
                let dy = s.body[0].y - target.body[j].y;
                if (dx*dx + dy*dy < 400) {
                    if (!toDie.includes(s)) toDie.push(s);
                }
            }
        });
    });

    // 處理死亡與補位
    toDie.forEach(s => {
        let index = ai.indexOf(s);
        if (index > -1) ai.splice(index, 1);
        spawnAI(); // 立即補一條新的 AI
    });
    toDie = [];

    // 繪製
    ai.forEach(a => a.draw());
    player.draw();

    // 更新 UI
    document.getElementById("score").innerText = Math.floor(player.length);
    let ranking = [player, ...ai].sort((a,b)=>b.length - a.length).slice(0, 5);
    document.getElementById("rank").innerHTML = "RANKING<br>" + ranking.map((s,i)=>`${i+1}. ${s.isPlayer?'YOU':'AI'} (${Math.floor(s.length)})`).join("<br>");

    requestAnimationFrame(loop);
}

function start() { started = true; document.getElementById("menu").style.display="none"; loop(); }
addEventListener("mousemove", e => { mouse.x = e.clientX; mouse.y = e.clientY; });
addEventListener("keydown", e => keys[e.key] = true);
addEventListener("keyup", e => keys[e.key] = false);
</script>
</body>
</html>
