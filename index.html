<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>Snake.io 磁力流暢版 (Cap 750)</title>
<style>
    body{margin:0;overflow:hidden;background:#050505;font-family:sans-serif;user-select:none}
    canvas{display:block}
    #ui-layer{position:absolute;top:20px;right:20px;color:white;background:rgba(0,0,0,0.8);padding:15px;border-radius:12px;border:1px solid #0f4;backdrop-filter:blur(5px);pointer-events:none}
    #score-ui{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);color:#0f4;font-size:28px;font-weight:bold;text-shadow:0 0 15px #0f4}
    #menu{position:absolute;width:100%;height:100%;background:rgba(0,0,0,0.9);display:flex;flex-direction:column;align-items:center;justify-content:center;color:white;z-index:100}
    button{font-size:28px;padding:15px 70px;cursor:pointer;background:#0f4;border:none;border-radius:50px;font-weight:bold;margin-top:20px;transition:0.3s}
    button:hover{transform:scale(1.1);box-shadow:0 0 30px #0f4}
</style>
</head>
<body>

<div id="menu">
    <h1 style="color:#0f4">SNAKE MAGNET: SMOOTH</h1>
    <p style="color:#888">【磁力上限 750】食物平滑吸引動畫</p>
    <p style="color:#888">視覺寬度上限 100px | 長度無限成長</p>
    <button onclick="start()">開始戰鬥</button>
</div>

<div id="score-ui">SCORE: 150</div>
<div id="ui-layer"></div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const MAP = 5000;
const FOOD_MAX = 700;
const AI_COUNT = 25;

let started = false;
let camera = {x:0, y:0, zoom:1};
let foods = [], ai = [], toDie = [];
let mouse = {x:0, y:0, down:false}, keys = {};

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resize);
resize();

class Snake {
    constructor(x, y, color, isPlayer = false, startLen = 150) {
        this.body = [{x, y}];
        this.length = startLen;
        this.color = color;
        this.isPlayer = isPlayer;
        this.speed = 4.5;
        this.angle = Math.random() * Math.PI * 2;
        this.dead = false;
    }

    getWidth() {
        return Math.min(100, 15 + Math.sqrt(this.length) * 0.7);
    }

    update() {
        if (this.dead) return;
        let boosting = (this.isPlayer && (keys["Shift"] || mouse.down)) && this.length > 200;
        this.speed = boosting ? 8.5 : 4.5;
        if (boosting) this.length -= 0.6;
        this.length = Math.max(100, this.length);

        let head = {
            x: this.body[0].x + Math.cos(this.angle) * this.speed,
            y: this.body[0].y + Math.sin(this.angle) * this.speed
        };
        this.body.unshift(head);

        let curLen = 0;
        for (let i = 0; i < this.body.length - 1; i++) {
            curLen += Math.hypot(this.body[i+1].x - this.body[i].x, this.body[i+1].y - this.body[i].y);
            if (curLen > this.length) { this.body.splice(i + 1); break; }
        }
    }

    draw() {
        const toSX = x => (x - camera.x) * camera.zoom + canvas.width/2;
        const toSY = y => (y - camera.y) * camera.zoom + canvas.height/2;
        let thickness = this.getWidth() * camera.zoom;
        ctx.strokeStyle = this.color;
        ctx.lineWidth = thickness;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        if (this.isPlayer) {
            ctx.shadowBlur = 15 * camera.zoom;
            ctx.shadowColor = "#0f4";
        }
        ctx.beginPath();
        ctx.moveTo(toSX(this.body[0].x), toSY(this.body[0].y));
        for(let p of this.body) ctx.lineTo(toSX(p.x), toSY(p.y));
        ctx.stroke();
        ctx.shadowBlur = 0;
        
        ctx.fillStyle = "white";
        let eyeOff = thickness * 0.35;
        ctx.beginPath();
        ctx.arc(toSX(this.body[0].x + Math.cos(this.angle)*eyeOff), toSY(this.body[0].y + Math.sin(this.angle)*eyeOff), thickness * 0.2, 0, 7);
        ctx.fill();
    }
}

let player = new Snake(0, 0, "#0f4", true);

function spawnFood(x, y, big = false, color = null) {
    foods.push({
        x: x ?? (Math.random() * MAP * 2 - MAP),
        y: y ?? (Math.random() * MAP * 2 - MAP),
        val: big ? 60 : 18,
        size: big ? 11 : 6,
        color: color ?? `hsl(${Math.random() * 360}, 100%, 65%)`,
        big: big
    });
}
for(let i=0; i<FOOD_MAX; i++) spawnFood();

function spawnAI() {
    let startLen = 150;
    if (player.length > 5000) startLen = player.length * 0.8;
    ai.push(new Snake((Math.random()-0.5) * MAP * 2, (Math.random()-0.5) * MAP * 2, `hsl(${Math.random()*360}, 70%, 55%)`, false, startLen));
}
for(let i=0; i<AI_COUNT; i++) spawnAI();

function loop() {
    if (!started) return;
    ctx.fillStyle = "#050505"; ctx.fillRect(0, 0, canvas.width, canvas.height);

    let targetZoom = Math.max(0.08, 1.1 - (player.length / 15000));
    camera.zoom += (targetZoom - camera.zoom) * 0.04;
    camera.x = player.body[0].x; camera.y = player.body[0].y;

    // --- 【動畫感磁力判定】 ---
    let magnetRange = Math.min(750, 10 * player.length);

    for (let i = foods.length - 1; i >= 0; i--) {
        let f = foods[i];
        let dx = player.body[0].x - f.x, dy = player.body[0].y - f.y;
        let distSq = dx*dx + dy*dy;
        
        if (distSq < magnetRange * magnetRange) {
            // 讓食物滑向頭部的動畫感 (Lerp)
            // 使用 0.15 的係數讓它有流動感，而非瞬間吸入
            f.x += dx * 0.15; f.y += dy * 0.15;
            
            // 真正的進食判定（縮得很小，確保視覺上食物是進到嘴巴才消失）
            if (distSq < (player.getWidth() * player.getWidth() * 0.5)) {
                player.length += f.val + (player.length * 0.02);
                foods.splice(i, 1);
                spawnFood();
            }
        }
        
        // AI 正常進食
        ai.forEach(s => {
            let adx = s.body[0].x - f.x, ady = s.body[0].y - f.y;
            if (adx*adx + ady*ady < 600) {
                s.length += f.val; 
                if (foods[i]) { foods.splice(i, 1); spawnFood(); }
            }
        });
    }

    // 繪製食物
    const toSX = x => (x - camera.x) * camera.zoom + canvas.width/2;
    const toSY = y => (y - camera.y) * camera.zoom + canvas.height/2;
    foods.forEach(f => {
        ctx.fillStyle = f.color;
        ctx.beginPath();
        ctx.arc(toSX(f.x), toSY(f.y), f.size * camera.zoom, 0, 7);
        ctx.fill();
    });

    // 更新玩家與 AI
    player.angle = Math.atan2(mouse.y - canvas.height/2, mouse.x - canvas.width/2);
    player.update();
    if (Math.abs(player.body[0].x) > MAP || Math.abs(player.body[0].y) > MAP) player.dead = true;

    ai.forEach(s => {
        if (Math.random() > 0.98) {
            let f = foods[Math.floor(Math.random()*foods.length)];
            s.angle = Math.atan2(f.y - s.body[0].y, f.x - s.body[0].x);
        }
        s.update();
        if (Math.abs(s.body[0].x) > MAP || Math.abs(s.body[0].y) > MAP) s.dead = true;
        
        let snakes = [player, ...ai];
        snakes.forEach(other => {
            if (other === s || other.dead) return;
            let h = s.body[0];
            let minDist = (s.getWidth() + other.getWidth()) * 0.45;
            for (let j = 0; j < other.body.length; j += 7) {
                let dx = h.x - other.body[j].x, dy = h.y - other.body[j].y;
                if (dx*dx + dy*dy < minDist * minDist) s.dead = true;
            }
        });
        if (s.dead) toDie.push(s);
    });

    // 死亡結算
    if (player.dead) { player = new Snake(0, 0, "#0f4", true); }
    toDie.forEach(s => {
        let count = Math.min(60, Math.floor(s.length/30));
        for(let k=0; k<count; k++) spawnFood(s.body[0].x+(Math.random()-0.5)*200, s.body[0].y+(Math.random()-0.5)*200, true, s.color);
        ai.splice(ai.indexOf(s), 1); spawnAI();
    });
    toDie = [];

    ai.forEach(a => a.draw());
    player.draw();

    document.getElementById("score-ui").innerText = `LENGTH: ${Math.floor(player.length)}`;
    requestAnimationFrame(loop);
}

function start() { started=true; document.getElementById("menu").style.display="none"; loop(); }
addEventListener("mousemove", e => { mouse.x = e.clientX; mouse.y = e.clientY; });
addEventListener("mousedown", () => mouse.down = true);
addEventListener("mouseup", () => mouse.down = false);
addEventListener("keydown", e => keys[e.key] = true);
addEventListener("keyup", e => keys[e.key] = false);
</script>
</body>
</html>
