<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>Snake.io Arena - 終極整合全功能版</title>
<style>
    body{margin:0;overflow:hidden;background:#050505;font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;user-select:none;touch-action:none}
    canvas{display:block}
    
    /* UI 層級 */
    #ui-layer{position:absolute;top:20px;right:20px;color:white;background:rgba(0,0,0,0.85);padding:15px;border-radius:12px;border:1px solid #0f4;backdrop-filter:blur(10px);pointer-events:none;min-width:180px;display:none;z-index:10}
    #permanent-rank{position:absolute;top:20px;left:20px;color:#eee;background:rgba(20,20,20,0.9);padding:15px;border-radius:12px;font-size:13px;border:1px solid #444;width:200px}
    #score-ui{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);color:#0f4;font-size:32px;font-weight:bold;text-shadow:0 0-15px #0f4;display:none;pointer-events:none}
    
    /* 技能與能量 UI */
    #skill-ui{position:absolute;bottom:20px;left:20px;display:none;flex-direction:column;gap:10px}
    .skill-slot{background:rgba(0,0,0,0.7);padding:8px 15px;border-radius:8px;border:1px solid #555;width:180px;position:relative;overflow:hidden;color:white;font-size:12px}
    .skill-bar{position:absolute;bottom:0;left:0;height:4px;background:#f0f;width:0%;transition:width 0.1s linear}
    .ready{border-color:#0f4;box-shadow:0 0 10px rgba(0,255,68,0.3)}

    /* 主選單 */
    #menu{position:absolute;width:100%;height:100%;background:rgba(0,0,0,0.97);display:flex;flex-direction:column;align-items:center;justify-content:center;color:white;z-index:100}
    #player-name{background:transparent;border:2px solid #333;border-radius:8px;padding:10px;color:#0f4;font-size:20px;text-align:center;outline:none;margin:20px;width:200px}
    .mode-group{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
    .mode-card{background:rgba(255,255,255,0.05);padding:15px;border-radius:12px;border:1px solid #333;text-align:center;width:100px;cursor:pointer;transition:0.2s}
    .mode-card.active{border-color:#0f4;background:rgba(0,255,68,0.15)}
    #start-btn{font-size:24px;padding:12px 70px;cursor:pointer;background:#0f4;border:none;border-radius:50px;font-weight:bold;margin-top:30px;transition:0.3s}
    #start-btn:hover{box-shadow:0 0 20px #0f4; transform:scale(1.05)}
    .magic-text{background:linear-gradient(90deg,#f0f,#0af,#f0f);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:flow 2s infinite linear;font-weight:bold}
    @keyframes flow{from{filter:hue-rotate(0deg)}to{filter:hue-rotate(360deg)}}
</style>
</head>
<body>

<div id="menu">
    <h1 style="font-size:55px;margin:0;letter-spacing:3px">SNAKE.IO <span class="magic-text">ARENA</span></h1>
    <input type="text" id="player-name" placeholder="輸入玩家名稱" maxlength="10">
    <div class="mode-group">
        <div class="mode-card active" id="m-magic" onclick="selectMode('magic', 5000)">✨ 魔法</div>
        <div class="mode-card" id="m-evo" onclick="selectMode('evo', 3000)">⚡ 覺醒</div>
        <div class="mode-card" id="m-classic" onclick="selectMode('classic', 400)">🛡️ 經典</div>
        <div class="mode-card" id="m-online" onclick="selectMode('online', 400)">🌍 連機</div>
    </div>
    <button id="start-btn" onclick="startGame()">START</button>
    <div style="margin-top:20px;font-size:12px;color:#555">ESC: 退出 | Q: 磁力魔球 | 空白: 瞬移 | 右鍵: 緩速</div>
</div>

<div id="skill-ui">
    <div class="skill-slot" id="ui-blink">瞬移 [SPACE] <div class="skill-bar" id="bar-blink"></div></div>
    <div class="skill-slot" id="ui-syphon">磁力魔球 [Q] <div class="skill-bar" id="bar-syphon"></div></div>
    <div class="skill-slot" id="ui-warp">時空緩速 [能量] <div class="skill-bar" id="bar-warp"></div></div>
</div>

<div id="permanent-rank">
    <b id="rank-title" style="color:#0f4">🏆 MAGIC 紀錄</b><hr>
    <div id="p-list">尚無紀錄</div>
</div>

<div id="score-ui">SCORE: 0</div>
<div id="ui-layer"></div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const MAP = 5000;
let started = false;
let currentMode = 'magic', currentMagnet = 5000;
let player, foods = [], ai_bots = [];
let mouse = {x:0, y:0, down:false, right:false}, keys = {};
let cooldowns = { blink: 0, syphon: 0, warp: 100 };
let animId;

// 1. 模式切換邏輯
function selectMode(m, mag) {
    currentMode = m; currentMagnet = mag;
    document.querySelectorAll('.mode-card').forEach(c => c.classList.remove('active'));
    document.getElementById(`m-${m}`).classList.add('active');
    updateRankDisplay();
}

function updateRankDisplay() {
    let records = JSON.parse(localStorage.getItem(`snake_rec_v10_${currentMode}`) || '[]');
    document.getElementById('rank-title').innerText = `🏆 ${currentMode.toUpperCase()} 紀錄`;
    document.getElementById('p-list').innerHTML = records.length ? records.map((r, i) => 
        `<div style="margin:3px 0">${i+1}. ${r.name} <span style="float:right;color:#0f4">${r.score}</span></div>`
    ).join('') : "尚無紀錄";
}

// 2. 蛇實體類別
class Snake {
    constructor(x, y, color, isPlayer = false) {
        this.body = [{x, y}, {x:x-1, y:y-1}];
        this.length = 250;
        this.color = color;
        this.isPlayer = isPlayer;
        this.angle = Math.random() * 6.28;
        this.dead = false;
        this.birth = Date.now();
        this.name = isPlayer ? (document.getElementById('player-name').value || "YOU") : 
                    (currentMode==='online'?"PLAYER_"+Math.floor(Math.random()*999):"AI_BOT");
    }
    get radius() { return 10 + Math.sqrt(this.length) * 0.5; }
    
    update(isSlowed) {
        if (this.dead) return;
        let speedMult = (isSlowed && !this.isPlayer) ? 0.35 : 1.0;
        let boost = (this.isPlayer && (mouse.down || keys['Shift'])) && this.length > 350;
        let speed = (boost ? 9 : 4.5) * speedMult;
        
        if (boost) this.length -= 1.0;
        this.length = Math.max(250, this.length);

        let head = { x: this.body[0].x + Math.cos(this.angle)*speed, y: this.body[0].y + Math.sin(this.angle)*speed };
        this.body.unshift(head);

        let d = 0;
        for (let i = 0; i < this.body.length - 1; i++) {
            d += Math.hypot(this.body[i+1].x - this.body[i].x, this.body[i+1].y - this.body[i].y);
            if (d > this.length) { this.body.splice(i + 1); break; }
        }
    }

    draw(camX, camY, zoom) {
        ctx.strokeStyle = this.color; 
        ctx.lineWidth = this.radius * 2 * zoom; 
        ctx.lineCap = "round"; 
        ctx.lineJoin = "round";
        
        if(this.isPlayer) {
            ctx.shadowBlur = 18 * zoom;
            ctx.shadowColor = this.color;
        }

        ctx.beginPath();
        this.body.forEach((p, i) => {
            let sx = (p.x - camX)*zoom + canvas.width/2;
            let sy = (p.y - camY)*zoom + canvas.height/2;
            if (i === 0) ctx.moveTo(sx, sy); else ctx.lineTo(sx, sy);
        });
        ctx.stroke(); ctx.shadowBlur = 0;

        if (zoom > 0.35) {
            ctx.fillStyle = "white"; ctx.font = `bold ${12*zoom}px Arial`; ctx.textAlign = "center";
            ctx.fillText(this.name, (this.body[0].x - camX)*zoom + canvas.width/2, (this.body[0].y - camY)*zoom + canvas.height/2 - this.radius*zoom - 8);
        }
    }
}

// 3. 食物生成
function spawnFood(x, y, big = false, color = null) {
    foods.push({
        x: x ?? (Math.random()-0.5)*MAP*2, y: y ?? (Math.random()-0.5)*MAP*2,
        val: big ? 160 : 35, size: big ? 12 : 6,
        color: color ?? `hsl(${Math.random()*360}, 100%, 75%)`,
        magic: !!color
    });
}

// 4. 遊戲核心循環
function loop(ts) {
    if (!started) return;

    // 冷卻與能量邏輯
    if (cooldowns.blink > 0) cooldowns.blink -= 16;
    if (cooldowns.syphon > 0) cooldowns.syphon -= 16;
    let warping = (currentMode === 'magic' && mouse.right && cooldowns.warp > 0);
    if(warping) cooldowns.warp -= 0.6; else if(cooldowns.warp < 100) cooldowns.warp += 0.15;

    ctx.fillStyle = warping ? "#1a0025" : "#050505";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    let head = player.body[0];
    let zoom = Math.max(0.25, 1.1 - player.length/18000);

    // 玩家行為
    player.angle = Math.atan2(mouse.y - canvas.height/2, mouse.x - canvas.width/2);
    player.update(warping);

    // 邊界檢查
    if (Math.abs(head.x) > MAP || Math.abs(head.y) > MAP) { player.dead = true; }

    // 食物邏輯 (磁力吸食)
    for (let i = foods.length - 1; i >= 0; i--) {
        let f = foods[i];
        let dSq = Math.pow(head.x - f.x, 2) + Math.pow(head.y - f.y, 2);
        let pullDist = f.magic ? 900 : currentMagnet;
        
        if (dSq < pullDist * pullDist) {
            f.x += (head.x - f.x) * 0.18;
            f.y += (head.y - f.y) * 0.18;
            if (dSq < Math.pow(player.radius, 2)) {
                player.length += f.val;
                foods.splice(i, 1);
                if(!f.magic) spawnFood();
            }
        }
        ctx.fillStyle = f.color; ctx.beginPath();
        ctx.arc((f.x - head.x)*zoom + canvas.width/2, (f.y - head.y)*zoom + canvas.height/2, f.size*zoom, 0, 7); ctx.fill();
    }

    // AI 與碰撞檢測
    ai_bots.forEach(ai => {
        ai.update(warping);
        if (Math.random() > 0.985) ai.angle += (Math.random() - 0.5) * 2;

        let snakes = [player, ...ai_bots];
        snakes.forEach(target => {
            if (ai === target || (Date.now() - ai.birth < 1500)) return;
            // AI 碰撞檢測
            for (let i = 0; i < target.body.length; i += 6) {
                let p = target.body[i];
                if (Math.hypot(ai.body[0].x - p.x, ai.body[0].y - p.y) < target.radius * 0.8) ai.dead = true;
            }
        });

        // 玩家碰撞檢測 (精確半徑)
        if (Date.now() - player.birth > 1500) {
            for (let i = 0; i < ai.body.length; i += 6) {
                let p = ai.body[i];
                if (Math.hypot(head.x - p.x, head.y - p.y) < ai.radius * 0.8) player.dead = true;
            }
        }
    });

    if (player.dead) { exitToMenu(); return; }

    // 清理死亡 AI
    ai_bots = ai_bots.filter(a => {
        if(a.dead) {
            for(let k=0; k<12; k++) spawnFood(a.body[0].x + (Math.random()-0.5)*300, a.body[0].y + (Math.random()-0.5)*300, true, a.color);
            return false;
        }
        return true;
    });
    while(ai_bots.length < 28) ai_bots.push(new Snake((Math.random()-0.5)*MAP, (Math.random()-0.5)*MAP, `hsl(${Math.random()*360}, 60%, 55%)`));

    // 繪製所有蛇
    ai_bots.forEach(a => a.draw(head.x, head.y, zoom));
    player.draw(head.x, head.y, zoom);

    // UI 更新
    document.getElementById("score-ui").innerText = "SCORE: " + Math.floor(player.length);
    if(currentMode === 'magic') {
        document.getElementById("bar-blink").style.width = (1 - Math.max(0, cooldowns.blink)/5000)*100 + "%";
        document.getElementById("bar-syphon").style.width = (1 - Math.max(0, cooldowns.syphon)/15000)*100 + "%";
        document.getElementById("bar-warp").style.width = cooldowns.warp + "%";
        
        let leaderboard = [player, ...ai_bots].sort((a,b)=>b.length - a.length).slice(0, 8);
        document.getElementById("ui-layer").innerHTML = "<b>🏆 REAL-TIME RANK</b><hr>" + 
            leaderboard.map((s,i)=>`<div style="color:${s.isPlayer?'#0f4':'#fff'}">${i+1}. ${s.name} <span style="float:right">${Math.floor(s.length)}</span></div>`).join("");
    }

    animId = requestAnimationFrame(loop);
}

// 5. 存檔與退出邏輯
function saveRecord() {
    if (!player || player.length < 500) return;
    let key = `snake_rec_v10_${currentMode}`, records = JSON.parse(localStorage.getItem(key) || '[]');
    records.push({name: player.name, score: Math.floor(player.length)});
    records.sort((a,b)=>b.score - a.score);
    localStorage.setItem(key, JSON.stringify(records.slice(0, 5)));
    updateRankDisplay();
}

function exitToMenu() {
    if (started) saveRecord();
    started = false;
    cancelAnimationFrame(animId);
    document.getElementById("menu").style.display = "flex";
    document.getElementById("score-ui").style.display = "none";
    document.getElementById("ui-layer").style.display = "none";
    document.getElementById("skill-ui").style.display = "none";
    ctx.clearRect(0,0,canvas.width,canvas.height);
}

function startGame() {
    if(animId) cancelAnimationFrame(animId);
    started = true;
    player = new Snake(0, 0, "#0f4", true);
    ai_bots = []; foods = [];
    for(let i=0; i<450; i++) spawnFood();
    
    document.getElementById("menu").style.display = "none";
    document.getElementById("score-ui").style.display = "block";
    if(currentMode === 'magic') {
        document.getElementById("ui-layer").style.display = "block";
        document.getElementById("skill-ui").style.display = "flex";
    }
    loop();
}

// 6. 全面監聽器
window.addEventListener("mousedown", e => { if(e.button===0) mouse.down=true; if(e.button===2) mouse.right=true; });
window.addEventListener("mouseup", e => { if(e.button===0) mouse.down=false; if(e.button===2) mouse.right=false; });
window.addEventListener("mousemove", e => { mouse.x = e.clientX; mouse.y = e.clientY; });
window.addEventListener("keydown", e => {
    keys[e.key] = true;
    if (e.key === "Escape") exitToMenu();
    
    if (currentMode === 'magic' && started) {
        if (e.code === "Space" && cooldowns.blink <= 0) {
            player.body.forEach(p => { p.x += Math.cos(player.angle)*380; p.y += Math.sin(player.angle)*380; });
            cooldowns.blink = 5000;
        }
        if (e.key.toLowerCase() === "q" && cooldowns.syphon <= 0 && player.length > 1000) {
            let topAI = ai_bots.sort((a,b)=>b.length - a.length)[0];
            if(topAI) {
                topAI.length *= 0.55; player.length *= 0.9;
                for(let i=0; i<20; i++) spawnFood(topAI.body[0].x+(Math.random()-0.5)*400, topAI.body[0].y+(Math.random()-0.5)*400, true, topAI.color);
                cooldowns.syphon = 15000;
            }
        }
    }
});
window.addEventListener("keyup", e => keys[e.key] = false);

// 禁止右鍵選單以利技能使用
canvas.oncontextmenu = (e) => e.preventDefault();

window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
window.onresize();
updateRankDisplay();
</script>
</body>
</html>
