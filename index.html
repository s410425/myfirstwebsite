<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>Snake.io 專業修復版</title>
<style>
    body{margin:0;overflow:hidden;background:#111;font-family:sans-serif;user-select:none}
    canvas{display:block}
    #menu{position:absolute;width:100%;height:100%;background:rgba(0,0,0,0.8);display:flex;flex-direction:column;align-items:center;justify-content:center;color:white;z-index:10}
    button{font-size:26px;padding:12px 40px;border:none;border-radius:50px;background:#4CAF50;color:white;cursor:pointer;transition:0.3s}
    button:hover{background:#45a049;transform:scale(1.1)}
    #rank{position:absolute;top:20px;right:20px;background:rgba(0,0,0,0.6);padding:15px;border-radius:10px;color:white;pointer-events:none}
    #expBar{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);width:40%;height:12px;background:#333;border-radius:10px;border:2px solid #555}
    #exp{height:100%;width:0%;background:linear-gradient(90deg, #00ff00, #a2ff00);border-radius:10px;transition:0.3s}
</style>
</head>
<body>

<div id="menu">
    <h1>SNAKE.IO</h1>
    <p>使用滑鼠控制方向，按住 <b>Shift</b> 加速</p>
    <button onclick="start()">開始遊戲</button>
</div>

<div id="rank"></div>
<div id="expBar"><div id="exp"></div></div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const MAP = 2500;
const FOOD_MAX = 300;
const AI_COUNT = 20;

let started = false;
let camera = {x:0, y:0};
let foods = [], ai = [], particles = [], toDie = [];
let mouse = {x:innerWidth/2, y:innerHeight/2}, keys = {};
let score = 0;

// 初始化畫布
function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

const player = {
    body: [{x:0, y:0}],
    dir: {x:1, y:0},
    length: 100,
    speed: 3,
    color: "#00FF00",
    isPlayer: true
};

// --- 工具函式 ---
function dist2(a, b) { return (a.x - b.x)**2 + (a.y - b.y)**2; }

// --- 生成食物 ---
function spawnFood(x, y, isBig = false) {
    if (foods.length >= FOOD_MAX && x === undefined) return;
    foods.push({
        x: x ?? (Math.random() * MAP * 2 - MAP),
        y: y ?? (Math.random() * MAP * 2 - MAP),
        val: isBig ? 30 : 10,
        color: `hsl(${Math.random() * 360}, 100%, 50%)`
    });
}
for(let i=0; i<150; i++) spawnFood();

// --- 生成 AI ---
function spawnAI() {
    let x = (Math.random() * MAP * 2 - MAP);
    let y = (Math.random() * MAP * 2 - MAP);
    ai.push({
        body: [{x, y}],
        dir: {x: Math.random()-0.5, y: Math.random()-0.5},
        length: 80 + Math.random() * 300,
        speed: 2.5,
        color: `hsl(${Math.random() * 360}, 70%, 60%)`,
        isPlayer: false
    });
}
for(let i=0; i<AI_COUNT; i++) spawnAI();

// --- 核心邏輯 ---
function moveSnake(s) {
    let head = { x: s.body[0].x + s.dir.x * s.speed, y: s.body[0].y + s.dir.y * s.speed };
    s.body.unshift(head);
    
    // 根據長度裁剪身體
    let currentLen = 0;
    for (let i = 0; i < s.body.length - 1; i++) {
        currentLen += Math.sqrt(dist2(s.body[i], s.body[i+1]));
        if (currentLen > s.length) {
            s.body.splice(i + 1);
            break;
        }
    }
}

function checkCollision(s) {
    let h = s.body[0];
    
    // 1. 邊界判定
    if (Math.abs(h.x) > MAP || Math.abs(h.y) > MAP) return markDeath(s);

    // 2. 撞擊他人 (包含玩家撞 AI 或 AI 互撞)
    let allSnakes = [player, ...ai];
    for (let other of allSnakes) {
        if (other === s || toDie.some(d => d.snake === other)) continue;
        
        // 為了效能，先判斷頭部距離，太遠就不檢查身體
        if (dist2(h, other.body[0]) > (other.length + 100)**2) continue;

        for (let i = 0; i < other.body.length; i += 2) { // 跳點檢查優化效能
            if (dist2(h, other.body[i]) < 400) return markDeath(s);
        }
    }
}

function eatFood(s) {
    let h = s.body[0];
    for (let i = foods.length - 1; i >= 0; i--) {
        let f = foods[i];
        let d2 = dist2(h, f);
        if (d2 < 2500) { // 吸取範圍
            f.x += (h.x - f.x) * 0.2;
            f.y += (h.y - f.y) * 0.2;
        }
        if (d2 < 400) {
            s.length += f.val;
            if (s.isPlayer) score += f.val;
            foods.splice(i, 1);
            spawnFood();
        }
    }
}

function markDeath(s) {
    if (!toDie.some(d => d.snake === s)) {
        toDie.push({ snake: s, timer: 0 });
    }
}

function handleDeaths() {
    for (let i = toDie.length - 1; i >= 0; i--) {
        let d = toDie[i];
        // 死亡噴出能量
        for (let j = 0; j < d.snake.body.length; j += 10) {
            spawnFood(d.snake.body[j].x, d.snake.body[j].y, true);
        }
        
        if (d.snake === player) {
            player.body = [{x:0, y:0}];
            player.length = 100;
            score = 0;
        } else {
            ai.splice(ai.indexOf(d.snake), 1);
            setTimeout(spawnAI, 2000);
        }
        toDie.splice(i, 1);
    }
}

// --- 繪製 ---
function draw() {
    ctx.fillStyle = "#111";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // 畫網格背景
    ctx.strokeStyle = "#222";
    ctx.lineWidth = 1;
    let step = 100;
    for(let x = -MAP - camera.x % step; x < canvas.width; x += step) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
    }
    for(let y = -MAP - camera.y % step; y < canvas.height; y += step) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
    }

    // 畫邊界
    ctx.strokeStyle = "red";
    ctx.lineWidth = 5;
    ctx.strokeRect(-MAP - camera.x, -MAP - camera.y, MAP*2, MAP*2);

    // 畫食物
    foods.forEach(f => {
        if (f.x < camera.x - 50 || f.x > camera.x + canvas.width + 50) return;
        ctx.fillStyle = f.color;
        ctx.beginPath();
        ctx.arc(f.x - camera.x, f.y - camera.y, 5, 0, Math.PI*2);
        ctx.fill();
    });

    // 畫蛇
    [player, ...ai].forEach(s => {
        if (toDie.some(d => d.snake === s)) return;
        ctx.strokeStyle = s.color;
        ctx.lineWidth = 20;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.beginPath();
        ctx.moveTo(s.body[0].x - camera.x, s.body[0].y - camera.y);
        for(let p of s.body) ctx.lineTo(p.x - camera.x, p.y - camera.y);
        ctx.stroke();
        
        // 畫眼睛
        ctx.fillStyle = "white";
        ctx.beginPath();
        ctx.arc(s.body[0].x - camera.x, s.body[0].y - camera.y, 5, 0, Math.PI*2);
        ctx.fill();
    });
}

function update() {
    if (!started) return;

    // 玩家控制
    let targetX = mouse.x + camera.x - player.body[0].x;
    let targetY = mouse.y + camera.y - player.body[0].y;
    let angle = Math.atan2(targetY, targetX);
    player.dir.x = Math.cos(angle);
    player.dir.y = Math.sin(angle);
    
    // 加速機制
    if (keys["Shift"] && player.length > 50) {
        player.speed = 7;
        player.length -= 0.3;
    } else {
        player.speed = 3.5;
    }

    moveSnake(player);
    eatFood(player);
    checkCollision(player);

    // AI 行為
    ai.forEach(s => {
        // 簡單 AI：朝向最近的食物
        if (Math.random() > 0.95) { 
            let nearest = foods[0], minD = dist2(s.body[0], foods[0]);
            for(let i=1; i<20; i++) { // 只抽樣檢查提高效能
                let f = foods[Math.floor(Math.random()*foods.length)];
                let d = dist2(s.body[0], f);
                if (d < minD) { minD = d; nearest = f; }
            }
            let a = Math.atan2(nearest.y - s.body[0].y, nearest.x - s.body[0].x);
            s.dir.x = Math.cos(a); s.dir.y = Math.sin(a);
        }
        moveSnake(s);
        eatFood(s);
        checkCollision(s);
    });

    handleDeaths();

    // 鏡頭跟隨
    camera.x += (player.body[0].x - canvas.width/2 - camera.x) * 0.1;
    camera.y += (player.body[0].y - canvas.height/2 - camera.y) * 0.1;

    // 更新 UI
    document.getElementById("exp").style.width = Math.min(100, (player.length / 1000) * 100) + "%";
    let all = [player, ...ai].sort((a,b) => b.length - a.length);
    let rankHTML = "<b>排行榜</b><br>";
    all.slice(0, 5).forEach((s, i) => {
        rankHTML += `${i+1}. ${s.isPlayer ? "YOU" : "AI"} - ${Math.floor(s.length)}<br>`;
    });
    document.getElementById("rank").innerHTML = rankHTML;

    draw();
    requestAnimationFrame(update);
}

function start() {
    started = true;
    document.getElementById("menu").style.display = "none";
    update();
}

addEventListener("mousemove", e => { mouse.x = e.clientX; mouse.y = e.clientY; });
addEventListener("keydown", e => keys[e.key] = true);
addEventListener("keyup", e => keys[e.key] = false);

</script>
</body>
</html>
