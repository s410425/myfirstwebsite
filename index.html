<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Snake.io Pro - 極速競技場</title>
    <style>
        :root {
            --bg: #0a0a12;
            --panel: rgba(20, 20, 35, 0.85);
            --accent: #00f2ff;
            --player: #00ff88;
            --ai: #ff4466;
        }
        body { margin: 0; overflow: hidden; background: var(--bg); font-family: 'Segoe UI', sans-serif; color: white; }
        canvas { display: block; }

        /* --- 封面設計 --- */
        #overlay {
            position: absolute; inset: 0; background: radial-gradient(circle, #1a1a2e 0%, #05050a 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100;
        }
        #title {
            font-size: 85px; font-weight: 900; letter-spacing: -2px;
            background: linear-gradient(to bottom, var(--accent), #7000ff);
            -webkit-background-clip: text; color: transparent;
            filter: drop-shadow(0 0 20px rgba(0, 242, 255, 0.4));
            margin-bottom: 0;
        }
        #subtitle { color: #888; letter-spacing: 5px; margin-bottom: 40px; }
        #start-btn {
            padding: 18px 60px; font-size: 22px; background: var(--accent); color: #000;
            border: none; border-radius: 50px; cursor: pointer; font-weight: bold;
            transition: 0.3s; box-shadow: 0 0 30px rgba(0, 242, 255, 0.3);
        }
        #start-btn:hover { transform: scale(1.1); box-shadow: 0 0 50px rgba(0, 242, 255, 0.6); }

        /* --- 排行榜 --- */
        .board {
            position: absolute; background: var(--panel); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; padding: 15px; backdrop-filter: blur(10px);
        }
        #permanent-board { bottom: 40px; width: 250px; text-align: center; }
        #temp-board { top: 20px; right: 20px; width: 200px; }
        h3 { margin: 0 0 10px 0; font-size: 16px; color: var(--accent); border-bottom: 1px solid #333; padding-bottom: 5px; }
        .entry { display: flex; justify-content: space-between; font-size: 14px; margin: 4px 0; }
        .entry.me { color: var(--player); font-weight: bold; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 id="title">SNAKE.IO</h1>
        <p id="subtitle">AI ARENA EDITION</p>
        <button id="start-btn">進入戰場</button>
        <div id="permanent-board" class="board">
            <h3>🏆 傳奇排行 (永久)</h3>
            <div id="hs-content"></div>
        </div>
    </div>

    <div id="temp-board" class="board hidden">
        <h3>⚔️ 即時對戰</h3>
        <div id="temp-content"></div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const overlay = document.getElementById("overlay");
        const startBtn = document.getElementById("start-btn");
        const tempBoard = document.getElementById("temp-board");

        let snakes = [];
        let foods = [];
        let player;
        let mouse = { x: window.innerWidth/2, y: window.innerHeight/2 };
        let isRunning = false;

        // 初始化畫布
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // 滑鼠位置追蹤
        window.addEventListener('mousemove', e => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        class Food {
            constructor() { this.spawn(); }
            spawn() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.r = Math.random() * 4 + 2;
                this.color = `hsl(${Math.random() * 360}, 80%, 60%)`;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10; ctx.shadowColor = this.color;
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        class Snake {
            constructor(name, color, isPlayer) {
                this.name = name;
                this.color = color;
                this.isPlayer = isPlayer;
                this.init();
            }

            init() {
                this.segments = [];
                // AI 數值邏輯：根據玩家長度縮放，但保證大於 250
                const playerLen = player ? player.segments.length : 50;
                const baseLen = this.isPlayer ? 40 : Math.max(250, playerLen * (Math.random() * 0.9 + 0.6));
                
                const startX = Math.random() * canvas.width;
                const startY = Math.random() * canvas.height;
                this.angle = Math.random() * Math.PI * 2;
                this.speed = 3;
                this.r = 12;
                this.score = 0;

                for(let i=0; i<baseLen; i++) {
                    this.segments.push({x: startX, y: startY});
                }
            }

            update() {
                let head = { ...this.segments[0] };

                if (this.isPlayer) {
                    // 滑鼠操控：計算蛇頭到滑鼠的角度
                    let dx = mouse.x - head.x;
                    let dy = mouse.y - head.y;
                    let targetAngle = Math.atan2(dy, dx);
                    // 平滑轉動
                    let diff = targetAngle - this.angle;
                    while(diff < -Math.PI) diff += Math.PI*2;
                    while(diff > Math.PI) diff -= Math.PI*2;
                    this.angle += diff * 0.15;
                } else {
                    // AI 邏輯：簡單隨機游走 + 爭搶食物
                    this.angle += Math.sin(Date.now() * 0.001 + this.score) * 0.05;
                }

                head.x += Math.cos(this.angle) * this.speed;
                head.y += Math.sin(this.angle) * this.speed;

                // 邊界處理
                if(head.x < 0) head.x = canvas.width;
                if(head.x > canvas.width) head.x = 0;
                if(head.y < 0) head.y = canvas.height;
                if(head.y > canvas.height) head.y = 0;

                this.segments.unshift(head);
                this.segments.pop();

                // 檢查吃食物
                foods.forEach(f => {
                    if(Math.hypot(head.x - f.x, head.y - f.y) < this.r + f.r) {
                        f.spawn();
                        this.score += 10;
                        for(let i=0; i<3; i++) this.segments.push({...this.segments[this.segments.length-1]});
                    }
                });
            }

            draw() {
                ctx.save();
                for(let i = this.segments.length - 1; i >= 0; i--) {
                    if(i % 3 !== 0 && i !== 0) continue; // 優化效能，不畫每一節
                    const seg = this.segments[i];
                    ctx.beginPath();
                    ctx.arc(seg.x, seg.y, this.r, 0, Math.PI*2);
                    ctx.fillStyle = i === 0 ? this.color : this.color + "aa";
                    ctx.fill();
                    if(i === 0) { // 畫眼睛
                        ctx.fillStyle = "white";
                        ctx.beginPath();
                        ctx.arc(seg.x + Math.cos(this.angle+0.5)*8, seg.y + Math.sin(this.angle+0.5)*8, 4, 0, Math.PI*2);
                        ctx.arc(seg.x + Math.cos(this.angle-0.5)*8, seg.y + Math.sin(this.angle-0.5)*8, 4, 0, Math.PI*2);
                        ctx.fill();
                    }
                }
                ctx.restore();
            }
        }

        function start() {
            snakes = [];
            foods = Array.from({length: 80}, () => new Food());
            player = new Snake("玩家", "#00ff88", true);
            snakes.push(player);
            for(let i=0; i<6; i++) snakes.push(new Snake("AI Bot", "#ff4466", false));
            
            overlay.classList.add('hidden');
            tempBoard.classList.remove('hidden');
            isRunning = true;
            requestAnimationFrame(loop);
        }

        function loop() {
            if(!isRunning) return;
            ctx.fillStyle = "#0a0a12";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            foods.forEach(f => f.draw());

            snakes.sort((a,b) => b.score - a.score);
            let leaderboardHTML = "";

            snakes.forEach(s => {
                s.update();
                s.draw();
                leaderboardHTML += `<div class="entry ${s.isPlayer?'me':''}"><span>${s.name}</span><span>${s.score}</span></div>`;
            });

            document.getElementById("temp-content").innerHTML = leaderboardHTML;

            // 死亡判定 (撞到別人的身體)
            const head = player.segments[0];
            for(let s of snakes) {
                if(s === player) continue;
                for(let i=10; i<s.segments.length; i+=5) {
                    if(Math.hypot(head.x - s.segments[i].x, head.y - s.segments[i].y) < player.r + s.r) {
                        gameOver();
                        return;
                    }
                }
            }

            requestAnimationFrame(loop);
        }

        function gameOver() {
            isRunning = false;
            alert("遊戲結束！最終得分: " + player.score);
            updatePermanentBoard(player.score);
            overlay.classList.remove('hidden');
        }

        // 永久排行榜邏輯
        function updatePermanentBoard(score) {
            let hs = JSON.parse(localStorage.getItem('snakeHighScores') || "[]");
            hs.push({score, date: new Date().toLocaleDateString()});
            hs.sort((a,b) => b.score - a.score);
            hs = hs.slice(0, 5);
            localStorage.setItem('snakeHighScores', JSON.stringify(hs));
            renderHS();
        }

        function renderHS() {
            let hs = JSON.parse(localStorage.getItem('snakeHighScores') || "[]");
            document.getElementById("hs-content").innerHTML = hs.map((h, i) => 
                `<div class="entry"><span>#${i+1}</span><span>${h.score}分</span></div>`
            ).join('');
        }

        renderHS();
        startBtn.addEventListener('click', start);
    </script>
</body>
</html>
