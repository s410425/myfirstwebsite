<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>我的酷網站</title>
    <style>
        body {
            background: linear-gradient(to right, #74ebd5, #ACB6E5);
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        h1 {
            color: #fff;
            margin-top: 100px;
            font-size: 50px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        p {
            color: #fff;
            font-size: 20px;
        }
        button {
            margin-top: 30px;
            padding: 15px 30px;
            font-size: 18px;
            background-color: #ff7f50;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            color: #fff;
            transition: all 0.3s;
        }
        button:hover {
            background-color: #ff6347;
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <h1>歡迎來到我的網站!</h1>
    <p>這是一個有顏色背景和按鈕的範例網站</p>
    <button onclick="alert('你好！你點到按鈕啦 😎')">點我一下</button>
</body>
</html>
