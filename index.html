<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>遊戲選單範例</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        #menu {
            display: none; /* 預設隱藏 */
            margin-top: 20px;
            border: 2px solid #333;
            padding: 15px;
            width: 200px;
            background-color: #f9f9f9;
            border-radius: 8px;
        }
        #menu button {
            display: block;
            width: 100%;
            margin: 5px 0;
            padding: 8px;
            border-radius: 5px;
            cursor: pointer;
        }
        #menu button:hover {
            background-color: #ddd;
        }
    </style>
</head>
<body>
    <h1>遊戲選單範例</h1>
    <button onclick="toggleMenu()">開啟遊戲選單</button>

    <div id="menu">
        <button onclick="alert('開始新遊戲！')">開始遊戲</button>
        <button onclick="alert('讀取存檔！')">讀取遊戲</button>
        <button onclick="alert('設定畫面！')">遊戲設定</button>
        <button onclick="alert('離開遊戲！')">離開遊戲</button>
    </div>

    <script>
        function toggleMenu() {
            const menu = document.getElementById("menu");
            if(menu.style.display === "none") {
                menu.style.display = "block"; // 顯示選單
            } else {
                menu.style.display = "none"; // 隱藏選單
            }
        }
    </script>
</body>
</html>
