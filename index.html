<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>Snake.io Ultimate Edition</title>
<style>
    body{margin:0;overflow:hidden;background:#050505;font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;user-select:none}
    canvas{display:block}
    #menu{position:absolute;width:100%;height:100%;background:radial-gradient(circle, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.95) 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;color:white;z-index:100}
    h1{font-size:80px;margin:0;background:linear-gradient(90deg, #00ff44, #00ffff);-webkit-background-clip:text;color:transparent;text-shadow: 0 0 30px rgba(0,255,68,0.3)}
    button{font-size:28px;padding:15px 60px;border:none;border-radius:50px;background:linear-gradient(45deg, #00ff44, #0099ff);color:white;cursor:pointer;transition:0.3s;box-shadow: 0 0 20px rgba(0,255,68,0.4);font-weight:bold}
    button:hover{transform:scale(1.1);box-shadow: 0 0 40px rgba(0,255,68,0.7)}
    #ui-layer{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;color:white}
    #rank{position:absolute;top:20px;right:20px;background:rgba(20,20,20,0.8);padding:15px;border-radius:15px;border:1px solid rgba(255,255,255,0.1);backdrop-filter:blur(5px)}
    #expBar{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);width:500px;height:14px;background:rgba(255,255,255,0.1);border-radius:10px;overflow:hidden;border:1px solid rgba(255,255,255,0.2)}
    #exp{height:100%;width:0%;background:linear-gradient(90deg, #00ff44, #00ffff);box-shadow: 0 0 15px #00ff44;transition:0.3s}
    .stat{position:absolute;bottom:55px;left:50%;transform:translateX(-50%);font-size:14px;text-transform:uppercase;letter-spacing:2px;color:#00ff44}
</style>
</head>
<body>

<div id="menu">
    <h1>SNAKE.IO</h1>
    <p style="color: #888; margin-bottom: 40px; letter-spacing: 5px;">ULTIMATE VERSION</p>
    <button onclick="start()">START BATTLE</button>
</div>

<div id="ui-layer">
    <div id="rank"></div>
    <div class="stat" id="score-text">LENGTH: 120</div>
    <div id="expBar"><div id="exp"></div></div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const MAP = 3000;
const FOOD_MAX = 500;
const AI_COUNT = 25;

let started = false;
let camera = {x:0, y:0};
let foods = [], ai = [], toDie = [], particles = [];
let mouse = {x:innerWidth/2, y:innerHeight/2}, keys = {};

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// --- 類別定義 ---
class Snake {
    constructor(x, y, color, isPlayer = false) {
        this.body = [{x, y}];
        this.dir = {x: 1, y: 0};
        this.length = 120;
        this.speed = 4;
        this.color = color;
        this.isPlayer = isPlayer;
        this.boost = false;
        this.angle = Math.random() * Math.PI * 2;
    }

    update() {
        if (this.boost && this.length > 60) {
            this.speed = 8;
            this.length -= 0.5;
            if (Math.random() > 0.7) {
                createParticle(this.body[this.body.length-1].x, this.body[this.body.length-1].y, this.color);
            }
        } else {
            this.speed = 4;
        }

        let head = {
            x: this.body[0].x + Math.cos(this.angle) * this.speed,
            y: this.body[0].y + Math.sin(this.angle) * this.speed
        };
        this.body.unshift(head);

        let curLen = 0;
        for (let i = 0; i < this.body.length - 1; i++) {
            let d = Math.hypot(this.body[i+1].x - this.body[i].x, this.body[i+1].y - this.body[i].y);
            curLen += d;
            if (curLen > this.length) {
                this.body.splice(i + 1);
                break;
            }
        }
    }

    draw() {
        ctx.save();
        ctx.shadowBlur = 15;
        ctx.shadowColor = this.color;
        ctx.strokeStyle = this.color;
        ctx.lineWidth = 24;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        
        ctx.beginPath();
        ctx.moveTo(this.body[0].x - camera.x, this.body[0].y - camera.y);
        for(let p of this.body) ctx.lineTo(p.x - camera.x, p.y - camera.y);
        ctx.stroke();
        
        // 畫眼睛
        ctx.fillStyle = "white";
        ctx.beginPath();
        let eyeX = this.body[0].x - camera.x + Math.cos(this.angle) * 8;
        let eyeY = this.body[0].y - camera.y + Math.sin(this.angle) * 8;
        ctx.arc(eyeX, eyeY, 6, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();
    }
}

const player = new Snake(0, 0, "#00ff44", true);

// --- 粒子系統 ---
function createParticle(x, y, color) {
    particles.push({x, y, vx:(Math.random()-0.5)*2, vy:(Math.random()-0.5)*2, life:1, color});
}

function updateParticles() {
    for(let i=particles.length-1; i>=0; i--) {
        let p = particles[i];
        p.x += p.vx; p.y += p.vy; p.life -= 0.02;
        if(p.life <= 0) particles.splice(i, 1);
        else {
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x - camera.x, p.y - camera.y, 4, 4);
        }
    }
    ctx.globalAlpha = 1;
}

// --- 食物與 AI 初始化 ---
function spawnFood(x, y, big = false) {
    foods.push({
        x: x ?? (Math.random() * MAP * 2 - MAP),
        y: y ?? (Math.random() * MAP * 2 - MAP),
        val: big ? 40 : 12,
        color: `hsl(${Math.random() * 360}, 100%, 60%)`,
        s: big ? 8 : 4
    });
}
for(let i=0; i<300; i++) spawnFood();

function spawnAI() {
    let x = Math.random()*MAP*2-MAP, y = Math.random()*MAP*2-MAP;
    ai.push(new Snake(x, y, `hsl(${Math.random()*360}, 80%, 60%)`));
}
for(let i=0; i<AI_COUNT; i++) spawnAI();

// --- 核心迴圈邏輯 ---
function checkDeath(s) {
    let h = s.body[0];
    if (Math.abs(h.x) > MAP || Math.abs(h.y) > MAP) return true;
    
    let targets = [player, ...ai];
    for (let target of targets) {
        if (target === s || toDie.includes(target)) continue;
        // 距離檢查優化
        if (Math.abs(h.x - target.body[0].x) > target.length + 100) continue;
        
        for (let i = 0; i < target.body.length; i += 3) {
            let dx = h.x - target.body[i].x, dy = h.y - target.body[i].y;
            if (dx*dx + dy*dy < 500) return true;
        }
    }
    return false;
}

function updateAI(s) {
    // 1. 基礎避障
    let h = s.body[0];
    let probeX = h.x + Math.cos(s.angle) * 100;
    let probeY = h.y + Math.sin(s.angle) * 100;
    
    if (Math.abs(probeX) > MAP - 100 || Math.abs(probeY) > MAP - 100) {
        s.angle += 0.2;
    }

    // 2. 尋找食物 (簡易版)
    if (Math.random() > 0.98) {
        let f = foods[Math.floor(Math.random()*foods.length)];
        s.angle = Math.atan2(f.y - h.y, f.x - h.x);
    }
    
    s.update();
    if (checkDeath(s)) toDie.push(s);
}

function drawMinimap() {
    const size = 180, pad = 20;
    const mx = canvas.width - size - pad, my = canvas.height - size - pad;
    ctx.fillStyle = "rgba(0,0,0,0.7)";
    ctx.strokeStyle = "rgba(255,255,255,0.2)";
    ctx.strokeRect(mx, my, size, size);
    ctx.fillRect(mx, my, size, size);
    
    const scale = size / (MAP * 2);
    // 畫 AI
    ctx.fillStyle = "red";
    ai.forEach(a => {
        ctx.fillRect(mx + size/2 + a.body[0].x*scale - 1, my + size/2 + a.body[0].y*scale - 1, 3, 3);
    });
    // 畫玩家
    ctx.fillStyle = "#00ff44";
    ctx.beginPath();
    ctx.arc(mx + size/2 + player.body[0].x*scale, my + size/2 + player.body[0].y*scale, 3, 0, 7);
    ctx.fill();
}

function loop() {
    if (!started) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 背景網格
    ctx.strokeStyle = "#111";
    ctx.lineWidth = 2;
    for(let x = -camera.x % 150; x < canvas.width; x += 150) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,canvas.height); ctx.stroke(); }
    for(let y = -camera.y % 150; y < canvas.height; y += 150) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); ctx.stroke(); }

    // 食物處理
    for(let i=foods.length-1; i>=0; i--) {
        let f = foods[i];
        if (f.x > camera.x - 50 && f.x < camera.x + canvas.width + 50 && f.y > camera.y - 50 && f.y < camera.y + canvas.height + 50) {
            ctx.fillStyle = f.color;
            ctx.beginPath(); ctx.arc(f.x - camera.x, f.y - camera.y, f.s, 0, 7); ctx.fill();
            
            let dx = player.body[0].x - f.x, dy = player.body[0].y - f.y;
            if (dx*dx + dy*dy < 10000) { // 吸取
                f.x += dx * 0.2; f.y += dy * 0.2;
                if (dx*dx + dy*dy < 500) { player.length += f.val; foods.splice(i, 1); spawnFood(); }
            }
        }
    }

    // 玩家與 AI
    let targetAngle = Math.atan2(mouse.y - canvas.height/2, mouse.x - canvas.width/2);
    let diff = targetAngle - player.angle;
    while(diff < -Math.PI) diff += Math.PI*2;
    while(diff > Math.PI) diff -= Math.PI*2;
    player.angle += diff * 0.15;
    player.boost = keys["Shift"];
    player.update();
    if(checkDeath(player)) { player.body=[{x:0,y:0}]; player.length=120; }
    
    ai.forEach(updateAI);
    
    // 處理死亡噴射
    toDie.forEach(s => {
        for(let i=0; i<s.body.length; i+=10) spawnFood(s.body[i].x + Math.random()*40-20, s.body[i].y + Math.random()*40-20, true);
        if(s !== player) { ai.splice(ai.indexOf(s), 1); setTimeout(spawnAI, 3000); }
    });
    toDie = [];

    // 渲染
    camera.x += (player.body[0].x - canvas.width/2 - camera.x) * 0.1;
    camera.y += (player.body[0].y - canvas.height/2 - camera.y) * 0.1;
    
    updateParticles();
    ai.forEach(a => a.draw());
    player.draw();
    drawMinimap();

    // UI
    document.getElementById("score-text").innerText = `LENGTH: ${Math.floor(player.length)}`;
    document.getElementById("exp").style.width = (player.length % 500 / 500) * 100 + "%";
    
    let ranking = [player, ...ai].sort((a,b)=>b.length - a.length).slice(0, 5);
    document.getElementById("rank").innerHTML = "<b>LEADERBOARD</b><br>" + ranking.map((s,i)=>`<div style="color:${s.isPlayer?'#0f4':''}">${i+1}. ${s.isPlayer?'YOU':'AI'} - ${Math.floor(s.length)}</div>`).join("");

    requestAnimationFrame(loop);
}

function start() { started=true; document.getElementById("menu").style.display="none"; loop(); }
addEventListener("mousemove", e => { mouse.x = e.clientX; mouse.y = e.clientY; });
addEventListener("keydown", e => keys[e.key] = true);
addEventListener("keyup", e => keys[e.key] = false);
</script>
</body>
</html>
