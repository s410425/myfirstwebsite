<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>Advanced Snake.io</title>
<style>
body{
background:#111;
color:white;
text-align:center;
font-family:Arial;
margin:0;
}
canvas{
background:#0a0a0a;
border:2px solid #555;
margin-top:20px;
}
#menu{
margin-top:20px;
}
button{
padding:10px;
margin:5px;
font-size:16px;
cursor:pointer;
}
</style>
</head>
<body>

<h1>Snake.io 單機版</h1>

<div id="menu">
<button onclick="startGame()">開始遊戲</button>
</div>

<canvas id="gameCanvas" width="900" height="600"></canvas>

<script>

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let player;
let aiSnakes=[];
let foods=[];
let keys={};
let running=false;

function startGame(){

document.getElementById("menu").style.display="none";

player={
body:[{x:450,y:300}],
dir:{x:2,y:0},
length:120,
speed:2,
color:"lime"
};

aiSnakes=[];

for(let i=0;i<4;i++){
aiSnakes.push({
body:[{x:Math.random()*900,y:Math.random()*600}],
dir:{x:Math.random()*2-1,y:Math.random()*2-1},
length:120,
speed:2,
color:`hsl(${Math.random()*360},70%,50%)`
});
}

foods=[];
for(let i=0;i<40;i++) spawnFood();

running=true;
requestAnimationFrame(gameLoop);
}

function spawnFood(){
foods.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:6
});
}

function dist(a,b){
return Math.hypot(a.x-b.x,a.y-b.y);
}

function moveSnake(s){

const head={
x:s.body[0].x+s.dir.x*s.speed,
y:s.body[0].y+s.dir.y*s.speed
};

s.body.unshift(head);

let len=0;

for(let i=0;i<s.body.length-1;i++){
len+=dist(s.body[i],s.body[i+1]);
if(len>s.length){
s.body=s.body.slice(0,i+2);
break;
}
}

}

function drawSnake(s){

for(let i=0;i<s.body.length;i++){

let alpha=1-i/s.body.length;

ctx.fillStyle=s.color;

ctx.globalAlpha=alpha;

ctx.beginPath();
ctx.arc(s.body[i].x,s.body[i].y,8,0,Math.PI*2);
ctx.fill();

}

ctx.globalAlpha=1;

}

function drawFood(f){

let g=ctx.createRadialGradient(
f.x,f.y,0,
f.x,f.y,10
);

g.addColorStop(0,"#fff");
g.addColorStop(1,"red");

ctx.fillStyle=g;

ctx.beginPath();
ctx.arc(f.x,f.y,f.r,0,Math.PI*2);
ctx.fill();

}

function aiLogic(ai){

let target=foods[0];
let best=999999;

for(let f of foods){
let d=dist(ai.body[0],f);
if(d<best){
best=d;
target=f;
}
}

let dx=target.x-ai.body[0].x;
let dy=target.y-ai.body[0].y;
let l=Math.hypot(dx,dy);

ai.dir.x=dx/l;
ai.dir.y=dy/l;

}

function playerControl(){

let speed=keys["Shift"]?4:2;

player.speed=speed;

if(keys["ArrowUp"]) {player.dir.x=0;player.dir.y=-1;}
if(keys["ArrowDown"]) {player.dir.x=0;player.dir.y=1;}
if(keys["ArrowLeft"]) {player.dir.x=-1;player.dir.y=0;}
if(keys["ArrowRight"]) {player.dir.x=1;player.dir.y=0;}

}

function checkFoodEat(s){

for(let i=foods.length-1;i>=0;i--){

if(dist(s.body[0],foods[i])<12){

s.length+=10;

foods.splice(i,1);

spawnFood();

}

}

}

function gameLoop(){

if(!running)return;

ctx.clearRect(0,0,canvas.width,canvas.height);

playerControl();

moveSnake(player);

checkFoodEat(player);

drawSnake(player);

for(let ai of aiSnakes){

aiLogic(ai);

moveSnake(ai);

checkFoodEat(ai);

drawSnake(ai);

}

for(let f of foods) drawFood(f);

requestAnimationFrame(gameLoop);

}

document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

</script>

</body>
</html>
