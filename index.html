<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>Snake.io Arena - 真·AI 競爭版</title>
<style>
    body{margin:0;overflow:hidden;background:#050505;font-family:'Segoe UI', sans-serif;user-select:none;touch-action:none}
    canvas{display:block}
    #ui-layer{position:absolute;top:20px;right:20px;color:white;background:rgba(0,0,0,0.85);padding:15px;border-radius:12px;border:1px solid #0f4;backdrop-filter:blur(10px);pointer-events:none;min-width:180px;display:none;z-index:10}
    #permanent-rank{position:absolute;top:20px;left:20px;color:#eee;background:rgba(20,20,20,0.9);padding:15px;border-radius:12px;font-size:13px;border:1px solid #444;width:200px}
    #score-ui{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);color:#0f4;font-size:32px;font-weight:bold;text-shadow:0 0 15px #0f4;display:none;pointer-events:none}
    #skill-ui{position:absolute;bottom:20px;left:20px;display:none;flex-direction:column;gap:10px}
    .skill-slot{background:rgba(0,0,0,0.7);padding:8px 15px;border-radius:8px;border:1px solid #555;width:180px;position:relative;overflow:hidden;color:white;font-size:12px}
    .skill-bar{position:absolute;bottom:0;left:0;height:4px;background:#f0f;width:0%}
    #menu{position:absolute;width:100%;height:100%;background:rgba(0,0,0,0.98);display:flex;flex-direction:column;align-items:center;justify-content:center;color:white;z-index:100}
    #player-name{background:transparent;border:2px solid #333;border-radius:8px;padding:10px;color:#0f4;font-size:20px;text-align:center;outline:none;margin:20px;width:200px}
    .mode-group{display:flex;gap:10px;margin-bottom:20px}
    .mode-card{background:rgba(255,255,255,0.05);padding:15px;border-radius:12px;border:1px solid #333;cursor:pointer;width:80px;text-align:center}
    .mode-card.active{border-color:#0f4;background:rgba(0,255,68,0.15)}
    #start-btn{font-size:24px;padding:12px 70px;cursor:pointer;background:#0f4;border:none;border-radius:50px;font-weight:bold}
</style>
</head>
<body>

<div id="menu">
    <h1 style="font-size:50px;margin:0">SNAKE.IO <span style="color:#f0f">ARENA</span></h1>
    <input type="text" id="player-name" placeholder="YOUR NAME" maxlength="10">
    <div class="mode-group">
        <div class="mode-card active" id="m-magic" onclick="selectMode('magic', 5000)">魔法</div>
        <div class="mode-card" id="m-evo" onclick="selectMode('evo', 3000)">覺醒</div>
        <div class="mode-card" id="m-classic" onclick="selectMode('classic', 400)">經典</div>
    </div>
    <button id="start-btn" onclick="startGame()">START</button>
</div>

<div id="skill-ui">
    <div class="skill-slot">瞬移 [SPACE] <div class="skill-bar" id="bar-blink"></div></div>
    <div class="skill-slot">磁力魔球 [Q] <div class="skill-bar" id="bar-syphon"></div></div>
    <div class="skill-slot">時空緩速 [能量] <div class="skill-bar" id="bar-warp"></div></div>
</div>

<div id="permanent-rank">
    <b id="rank-title" style="color:#0f4">🏆 紀錄</b><hr>
    <div id="p-list">尚無紀錄</div>
</div>

<div id="score-ui">SCORE: 0</div>
<div id="ui-layer"></div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const MAP = 5000;
let started = false, animId, currentMode = 'magic', currentMagnet = 5000;
let player, foods = [], ai_bots = [];
let mouse = {x:0, y:0, down:false, right:false}, keys = {};
let cooldowns = { blink: 0, syphon: 0, warp: 100 };

function selectMode(m, mag) {
    currentMode = m; currentMagnet = mag;
    document.querySelectorAll('.mode-card').forEach(c => c.classList.remove('active'));
    document.getElementById(`m-${m}`).classList.add('active');
    updateRankDisplay();
}

function updateRankDisplay() {
    let rec = JSON.parse(localStorage.getItem(`snk_v11_${currentMode}`) || '[]');
    document.getElementById('p-list').innerHTML = rec.map((r,i)=>`<div>${i+1}. ${r.name} <span style="float:right">${r.score}</span></div>`).join('') || "尚無紀錄";
}

class Snake {
    constructor(x, y, color, isPlayer = false, startLen = 250) {
        this.body = [{x, y}, {x:x-1, y:y-1}];
        this.length = startLen;
        this.color = color;
        this.isPlayer = isPlayer;
        this.angle = Math.random() * 6.28;
        this.dead = false;
        this.birth = Date.now();
        this.name = isPlayer ? (document.getElementById('player-name').value || "YOU") : "AI_" + Math.floor(Math.random()*999);
    }
    get radius() { return 10 + Math.sqrt(this.length) * 0.5; }
    update(isSlowed) {
        if (this.dead) return;
        let speed = (this.isPlayer && (mouse.down || keys['Shift']) && this.length > 350) ? 9 : 4.5;
        if (isSlowed && !this.isPlayer) speed *= 0.35;
        if (this.isPlayer && speed > 4.5) this.length -= 1.0;
        this.length = Math.max(250, this.length);

        let head = { x: this.body[0].x + Math.cos(this.angle)*speed, y: this.body[0].y + Math.sin(this.angle)*speed };
        this.body.unshift(head);
        let d = 0;
        for (let i = 0; i < this.body.length - 1; i++) {
            d += Math.hypot(this.body[i+1].x - this.body[i].x, this.body[i+1].y - this.body[i].y);
            if (d > this.length) { this.body.splice(i + 1); break; }
        }
    }
    draw(camX, camY, zoom) {
        ctx.strokeStyle = this.color; ctx.lineWidth = this.radius * 2 * zoom; ctx.lineCap = "round";
        if(this.isPlayer) { ctx.shadowBlur = 15*zoom; ctx.shadowColor = this.color; }
        ctx.beginPath();
        this.body.forEach((p, i) => {
            let sx = (p.x - camX)*zoom + canvas.width/2;
            let sy = (p.y - camY)*zoom + canvas.height/2;
            if (i === 0) ctx.moveTo(sx, sy); else ctx.lineTo(sx, sy);
        });
        ctx.stroke(); ctx.shadowBlur = 0;
    }
}

function spawnFood(x, y, big = false, color = null) {
    foods.push({
        x: x ?? (Math.random()-0.5)*MAP*2, y: y ?? (Math.random()-0.5)*MAP*2,
        val: big ? 160 : 35, size: big ? 12 : 6, color: color ?? `hsl(${Math.random()*360}, 100%, 75%)`, magic: !!color
    });
}

function loop() {
    if (!started) return;
    if (cooldowns.blink > 0) cooldowns.blink -= 16;
    if (cooldowns.syphon > 0) cooldowns.syphon -= 16;
    let warping = (currentMode === 'magic' && mouse.right && cooldowns.warp > 0);
    if(warping) cooldowns.warp -= 0.6; else if(cooldowns.warp < 100) cooldowns.warp += 0.15;

    ctx.fillStyle = warping ? "#1a0025" : "#050505";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    let head = player.body[0], zoom = Math.max(0.25, 1.1 - player.length/18000);
    player.angle = Math.atan2(mouse.y - canvas.height/2, mouse.x - canvas.width/2);
    player.update(warping);

    if (Math.abs(head.x) > MAP || Math.abs(head.y) > MAP) player.dead = true;

    // AI 邏輯：覓食、成長、碰撞
    ai_bots.forEach(ai => {
        // AI 覓食：尋找最近的食物並轉向
        if (Math.random() > 0.95) {
            let target = null, minDist = 600;
            foods.slice(0, 30).forEach(f => {
                let d = Math.hypot(ai.body[0].x - f.x, ai.body[0].y - f.y);
                if (d < minDist) { minDist = d; target = f; }
            });
            if (target) ai.angle = Math.atan2(target.y - ai.body[0].y, target.x - ai.body[0].x);
        }
        ai.update(warping);

        // AI 碰撞檢測
        let snakes = [player, ...ai_bots];
        snakes.forEach(s => {
            if (ai === s || (Date.now() - ai.birth < 1500)) return;
            for (let i = 0; i < s.body.length; i += 6) {
                if (Math.hypot(ai.body[0].x - s.body[i].x, ai.body[0].y - s.body[i].y) < s.radius * 0.8) ai.dead = true;
            }
        });
        // 玩家撞 AI
        if (Date.now() - player.birth > 1500) {
            for (let i = 0; i < ai.body.length; i += 6) {
                if (Math.hypot(head.x - ai.body[i].x, head.y - ai.body[i].y) < ai.radius * 0.8) player.dead = true;
            }
        }
    });

    // 食物邏輯 (包含 AI 也能吃)
    for (let i = foods.length - 1; i >= 0; i--) {
        let f = foods[i];
        // 玩家吃食物
        let dP = Math.hypot(head.x - f.x, head.y - f.y);
        if (dP < (f.magic ? 900 : currentMagnet)) {
            f.x += (head.x - f.x)*0.2; f.y += (head.y - f.y)*0.2;
            if (dP < player.radius) { player.length += f.val; foods.splice(i, 1); if(!f.magic) spawnFood(); continue; }
        }
        // AI 吃食物
        for (let ai of ai_bots) {
            if (Math.hypot(ai.body[0].x - f.x, ai.body[0].y - f.y) < ai.radius) {
                ai.length += f.val; foods.splice(i, 1); if(!f.magic) spawnFood(); break;
            }
        }
        ctx.fillStyle = f.color; ctx.beginPath();
        ctx.arc((f.x - head.x)*zoom + canvas.width/2, (f.y - head.y)*zoom + canvas.height/2, f.size*zoom, 0, 7); ctx.fill();
    }

    if (player.dead) { exitToMenu(); return; }

    // 清理與重新生成 AI (關鍵：起始分數公式)
    ai_bots = ai_bots.filter(a => {
        if(a.dead) { for(let k=0; k<10; k++) spawnFood(a.body[0].x+(Math.random()-0.5)*300, a.body[0].y+(Math.random()-0.5)*300, true, a.color); return false; }
        return true;
    });
    while(ai_bots.length < 25) {
        let randScale = 0.1 + Math.random() * 2.4; // 0.1 ~ 2.5
        let startLen = Math.max(250, player.length * randScale);
        ai_bots.push(new Snake((Math.random()-0.5)*MAP, (Math.random()-0.5)*MAP, `hsl(${Math.random()*360}, 60%, 55%)`, false, startLen));
    }

    ai_bots.forEach(a => a.draw(head.x, head.y, zoom));
    player.draw(head.x, head.y, zoom);

    document.getElementById("score-ui").innerText = "SCORE: " + Math.floor(player.length);
    if(currentMode === 'magic') {
        document.getElementById("bar-blink").style.width = (1 - Math.max(0, cooldowns.blink)/5000)*100 + "%";
        document.getElementById("bar-syphon").style.width = (1 - Math.max(0, cooldowns.syphon)/15000)*100 + "%";
        document.getElementById("bar-warp").style.width = cooldowns.warp + "%";
        let rank = [player, ...ai_bots].sort((a,b)=>b.length - a.length).slice(0, 8);
        document.getElementById("ui-layer").innerHTML = "<b>🏆 RANKING</b><hr>" + rank.map((s,i)=>`<div>${i+1}. ${s.name} <span style="float:right">${Math.floor(s.length)}</span></div>`).join("");
    }
    animId = requestAnimationFrame(loop);
}

function exitToMenu() {
    if(started && player.length > 500) {
        let key = `snk_v11_${currentMode}`, rec = JSON.parse(localStorage.getItem(key) || '[]');
        rec.push({name: player.name, score: Math.floor(player.length)});
        localStorage.setItem(key, JSON.stringify(rec.sort((a,b)=>b.score-a.score).slice(0,5)));
    }
    started = false; cancelAnimationFrame(animId);
    document.getElementById("menu").style.display = "flex";
    document.getElementById("score-ui").style.display = "none";
    document.getElementById("ui-layer").style.display = "none";
    document.getElementById("skill-ui").style.display = "none";
    updateRankDisplay();
}

function startGame() {
    started = true; player = new Snake(0, 0, "#0f4", true); ai_bots = []; foods = [];
    for(let i=0; i<400; i++) spawnFood();
    document.getElementById("menu").style.display = "none";
    document.getElementById("score-ui").style.display = "block";
    if(currentMode === 'magic') { document.getElementById("ui-layer").style.display = "block"; document.getElementById("skill-ui").style.display = "flex"; }
    loop();
}

window.addEventListener("mousedown", e => { if(e.button===0) mouse.down=true; if(e.button===2) mouse.right=true; });
window.addEventListener("mouseup", e => { if(e.button===0) mouse.down=false; if(e.button===2) mouse.right=false; });
window.addEventListener("mousemove", e => { mouse.x = e.clientX; mouse.y = e.clientY; });
window.addEventListener("keydown", e => {
    keys[e.key] = true;
    if(e.key === "Escape") exitToMenu();
    if(started && currentMode === 'magic') {
        if(e.code === "Space" && cooldowns.blink <= 0) {
            player.body.forEach(p => { p.x += Math.cos(player.angle)*400; p.y += Math.sin(player.angle)*400; });
            cooldowns.blink = 5000;
        }
        if(e.key.toLowerCase() === "q" && cooldowns.syphon <= 0 && player.length > 1000) {
            let topAI = ai_bots.sort((a,b)=>b.length-a.length)[0];
            if(topAI) {
                topAI.length *= 0.5; player.length *= 0.9;
                for(let i=0; i<20; i++) spawnFood(topAI.body[0].x+(Math.random()-0.5)*400, topAI.body[0].y+(Math.random()-0.5)*400, true, topAI.color);
                cooldowns.syphon = 15000;
            }
        }
    }
});
window.addEventListener("keyup", e => keys[e.key] = false);
canvas.oncontextmenu = (e) => e.preventDefault();
window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
window.onresize();
updateRankDisplay();
</script>
</body>
</html>
