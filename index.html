<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>Snake.io</title>
<style>
body{margin:0;overflow:hidden;background:#111;font-family:sans-serif}
canvas{display:block}
#menu{position:absolute;width:100%;height:100%;background:#000c;display:flex;flex-direction:column;align-items:center;justify-content:center;color:white}
button{font-size:26px;padding:12px 40px;border:none;border-radius:10px;background:#555;color:white;cursor:pointer}
#rank{position:absolute;top:10px;right:10px;background:#0008;padding:10px;border-radius:10px;color:white}
#expBar{position:absolute;bottom:10px;left:10px;width:280px;height:18px;background:#333;border-radius:10px}
#exp{height:100%;width:0%;background:lime;border-radius:10px}
</style>
</head>
<body>
<div id="menu">
<h1>Snake.io</h1>
<button onclick="start()">開始遊戲</button>
</div>
<div id="rank"></div>
<div id="expBar"><div id="exp"></div></div>
<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")
canvas.width=innerWidth
canvas.height=innerHeight
const MAP=2000

let started=false
let camera={x:0,y:0}
let foods=[],ai=[],particles=[]
let mouse={x:0,y:0},keys={}
let exp=0,expMax=100
let aiRespawnQueue=[]

function dist2(a,b){let dx=a.x-b.x,dy=a.y-b.y;return dx*dx+dy*dy}
function dist(a,b){return Math.sqrt(dist2(a,b))}

const player={body:[{x:0,y:0}],dir:{x:1,y:0},length:150,speed:3,color1:"lime",color2:"yellow"}

function spawnFood(x,y){
if(x==undefined){x=(Math.random()*MAP*2)-MAP;y=(Math.random()*MAP*2)-MAP}
foods.push({x,y,life:2000})
}
for(let i=0;i<400;i++) spawnFood()

function spawnAI(){
let x,y
while(true){
x=(Math.random()*MAP*2)-MAP
y=(Math.random()*MAP*2)-MAP
let d=dist({x,y},player.body[0])
if(d>200 && d<1200) break
}
ai.push({
body:[{x,y}],
dir:{x:Math.random()-0.5,y:Math.random()-0.5},
length:150,
speed:2.5,
color1:`hsl(${Math.random()*360},70%,50%)`,
color2:`hsl(${Math.random()*360},70%,70%)`
})
}
for(let i=0;i<25;i++) spawnAI()

function moveSnake(s){
let head={x:s.body[0].x+s.dir.x*s.speed,y:s.body[0].y+s.dir.y*s.speed}
s.body.unshift(head)
let len=0
for(let i=0;i<s.body.length-1;i++){
len+=dist(s.body[i],s.body[i+1])
if(len>s.length){s.body=s.body.slice(0,i+2);break}
}
}

function drawSnake(s){
let h=s.body[0]
if(h.x<camera.x-200||h.x>camera.x+canvas.width+200||h.y<camera.y-200||h.y>camera.y+canvas.height+200) return
ctx.lineWidth=12;ctx.lineCap="round";ctx.lineJoin="round"
let g=ctx.createLinearGradient(s.body[0].x-camera.x,s.body[0].y-camera.y,s.body[s.body.length-1].x-camera.x,s.body[s.body.length-1].y-camera.y)
g.addColorStop(0,s.color1);g.addColorStop(1,s.color2)
ctx.strokeStyle=g;ctx.beginPath()
ctx.moveTo(s.body[0].x-camera.x,s.body[0].y-camera.y)
for(let p of s.body){ctx.lineTo(p.x-camera.x,p.y-camera.y)}
ctx.stroke()
}

function drawFood(f){
if(f.x<camera.x-50||f.x>camera.x+canvas.width+50||f.y<camera.y-50||f.y>camera.y+canvas.height+50) return
ctx.fillStyle="red"
ctx.beginPath()
ctx.arc(f.x-camera.x,f.y-camera.y,4,0,Math.PI*2)
ctx.fill()
}

function explode(x,y){
for(let i=0;i<12;i++){
if(particles.length<300){
particles.push({x,y,vx:(Math.random()-0.5)*4,vy:(Math.random()-0.5)*4,life:40})
}
}
}

function updateParticles(){
for(let i=particles.length-1;i>=0;i--){
let p=particles[i];p.x+=p.vx;p.y+=p.vy;p.life--
ctx.globalAlpha=p.life/40;ctx.fillStyle="orange";ctx.beginPath()
ctx.arc(p.x-camera.x,p.y-camera.y,2,0,Math.PI*2);ctx.fill()
ctx.globalAlpha=1
if(p.life<=0) particles.splice(i,1)
}
}

function eatFood(s){
for(let i=foods.length-1;i>=0;i--){
let f=foods[i]
if(dist2(s.body[0],f)>20000) continue
let d=dist(s.body[0],f)
if(d<120){f.x+=(s.body[0].x-f.x)/15;f.y+=(s.body[0].y-f.y)/15}
if(d<10){s.length+=12;exp+=5;explode(f.x,f.y);foods.splice(i,1);spawnFood();spawnFood()}
}
}

function death(s){
explode(s.body[0].x,s.body[0].y)
for(let p of s.body){spawnFood(p.x+(Math.random()-0.5)*10,p.y+(Math.random()-0.5)*10)}
if(s===player){player.body=[{x:0,y:0}];player.length=100;exp=0}else{let idx=ai.indexOf(s);if(idx!=-1) ai.splice(idx,1);aiRespawnQueue.push(120)}
}

function checkDeath(s){
let h=s.body[0]
// 撞牆
if(h.x<-MAP||h.x>MAP||h.y<-MAP||h.y>MAP){death(s)}
// 撞自己
for(let i=5;i<s.body.length;i++){if(dist2(h,s.body[i])<64){death(s)}}
// 撞其他
for(let other of [player,...ai]){
if(other===s) continue
for(let p of other.body){if(dist2(h,p)<64){death(s)}}
}
}

function aiBrain(s){
let head=s.body[0],best,bd=999999
for(let f of foods){let d=dist(head,f);if(d<bd){bd=d;best=f}}
if(best){let dx=best.x-head.x,dy=best.y-head.y,l=Math.hypot(dx,dy);s.dir.x=dx/l;s.dir.y=dy/l}
}

function playerControl(){
let dx=mouse.x+camera.x-player.body[0].x,dy=mouse.y+camera.y-player.body[0].y,l=Math.hypot(dx,dy)
player.dir.x=dx/l;player.dir.y=dy/l
player.speed=keys["Shift"]?5:3
if(keys["Shift"]) player.length-=0.2
}

function cameraUpdate(){camera.x=player.body[0].x-canvas.width/2;camera.y=player.body[0].y-canvas.height/2}

function leaderboard(){
let all=[player,...ai];all.sort((a,b)=>b.length-a.length)
let t="排行榜<br>"
for(let i=0;i<5;i++){t+=`${i+1}. ${Math.floor(all[i].length)}<br>`}
document.getElementById("rank").innerHTML=t
}

function start(){started=true;document.getElementById("menu").style.display="none";loop()}

function loop(){
if(!started) return
ctx.clearRect(0,0,canvas.width,canvas.height)
playerControl();moveSnake(player);eatFood(player);checkDeath(player)
for(let s of ai){aiBrain(s);moveSnake(s);eatFood(s);checkDeath(s)}
for(let i=foods.length-1;i>=0;i--){let f=foods[i];f.life--;if(f.life<=0){foods.splice(i,1);spawnFood();continue}drawFood(f)}
drawSnake(player);for(let s of ai) drawSnake(s)
updateParticles();cameraUpdate();leaderboard()

// AI重生計時
for(let i=aiRespawnQueue.length-1;i>=0;i--){aiRespawnQueue[i]--;if(aiRespawnQueue[i]<=0){spawnAI();aiRespawnQueue.splice(i,1)}}

exp%=expMax;document.getElementById("exp").style.width=(exp/expMax*100)+"%"
ctx.strokeStyle="white";ctx.lineWidth=3;ctx.strokeRect(-MAP-camera.x,-MAP-camera.y,MAP*2,MAP*2)
requestAnimationFrame(loop)
}

addEventListener("mousemove",e=>{mouse.x=e.clientX;mouse.y=e.clientY})
addEventListener("keydown",e=>keys[e.key]=true)
addEventListener("keyup",e=>keys[e.key]=false)
</script>
</body>
</html>
